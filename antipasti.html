<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Antipasti">
<meta name="theme-color" content="#111111">
<meta name="robots" content="noindex, nofollow">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<title>Prinz Rudolf &middot; Antipasti</title>
<style>
  :root{--bordeaux:#1c1c1c;--bordeaux-d:#000;--cream:#faf8f2;--paper:#fff;--ink:#1a1a1a;--muted:#8a8378;--line:#ececec;--gold:#c9a227;--yellow:#f5c518;--espresso:#c0392b;--giorn:#2e7d5b;--sett:#2f6fb0;--grossa:#8a5a2b;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);line-height:1.45;padding-bottom:env(safe-area-inset-bottom);}
  #lock{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center}
  #lock .mark{width:64px;height:64px;border-radius:16px;border:2px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;letter-spacing:1px;margin-bottom:18px}
  #lock h1{font-size:22px;margin:0 0 4px;font-weight:600}
  #lock p{opacity:.85;font-size:13px;margin:0 0 24px;letter-spacing:.5px}
  #lock .box{width:100%;max-width:300px}
  #lock input{width:100%;border:none;border-radius:12px;padding:14px 16px;font-size:17px;text-align:center;color:var(--ink);margin-bottom:12px}
  #lock input:focus{outline:2px solid var(--gold)}
  #lock button{width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400;cursor:pointer}
  #lock button:active{opacity:.85}
  #lock .err{color:#ffd2d2;font-size:13px;height:18px;margin-top:10px}
  #lock label{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;opacity:.9;margin-top:14px;cursor:pointer}
  #lock label input{width:auto;margin:0}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:15px;letter-spacing:.5px;flex:none}
  .brand h1{font-size:18px;margin:0;font-weight:600;letter-spacing:.3px}
  .brand small{display:block;font-size:11px;opacity:.8;font-weight:400;letter-spacing:1.5px;text-transform:uppercase}
  .search{margin-top:14px;position:relative}
  .search input{width:100%;border:none;border-radius:12px;padding:13px 14px 13px 40px;font-size:16px;background:rgba(255,255,255,.95);color:var(--ink)}
  .search input:focus{outline:2px solid var(--gold)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}
  main{max-width:760px;margin:0 auto;padding:16px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:12px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .08s;display:flex;align-items:center;gap:14px}
  .card:active{transform:scale(.99)}
  .daychip{flex:none;width:54px;height:54px;border-radius:12px;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:var(--gold);border:1px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .daychip b{font-size:18px;line-height:1}
  .card .info{min-width:0}
  .card .info h3{margin:0 0 3px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
  .card .info p{margin:0;font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .cam{font-size:12px}
  .card .chev{margin-left:auto;color:var(--gold);flex:none}
  #detail{display:none}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--bordeaux);font-size:16px;font-weight:600;padding:6px 0;margin-bottom:6px;cursor:pointer}
  .dhead{margin-bottom:16px}
  .dhead .day{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700}
  .dhead h2{margin:4px 0 0;font-size:23px;font-weight:700;line-height:1.25}
  .dishphoto{width:100%;border-radius:14px;margin-bottom:16px;display:block;box-shadow:0 2px 10px rgba(0,0,0,.15);cursor:zoom-in}
  .comp{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin-bottom:13px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .comp-h{padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#fbf8f2;border-bottom:1px solid transparent}
  .comp-h h4{margin:0;font-size:16px;font-weight:600;flex:1}
  .comp.open .comp-h{border-bottom-color:var(--line)}
  .comp-h .tog{color:var(--gold);transition:transform .2s;flex:none}
  .comp.open .comp-h .tog{transform:rotate(90deg)}
  .comp-body{display:none;padding:14px 15px}
  .comp.open .comp-body{display:block}
  .recipe{font-size:15px;white-space:pre-wrap}
  .badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.3px;color:#fff}
  .b-espresso{background:var(--espresso)} .b-giorn{background:var(--giorn)} .b-sett{background:var(--sett)} .b-grossa{background:var(--grossa)} .b-na{background:#9a9088}
.b-compra{background:#b9831a}
  .kv{margin-top:10px;font-size:13px;color:var(--muted)}
  .kv b{color:var(--ink);font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:20px}
  #viewer{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
  #viewer img{max-width:100%;max-height:100%;border-radius:8px}
  .corrbox{margin-top:14px;background:#f3f7f4;border:1px dashed #2e7d5b;border-radius:12px;padding:10px;text-transform:none}
  .corrlbl{font-size:12px;font-weight:800;color:#2e7d5b;margin-bottom:6px}
  .corrta{width:100%;border:1px solid #cfe0d6;border-radius:8px;padding:9px;font-size:14px;font-family:inherit;min-height:54px;box-sizing:border-box}
  .corrrow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .corrbtn{border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;background:#eee;color:#333}
  .corrbtn.save{background:#2e7d5b;color:#fff}.corrbtn.exp{background:#c0392b;color:#fff}
  .corrmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;padding:16px}
  .corrmbox{background:#fff;border-radius:14px;padding:16px;max-width:520px;width:100%}
  .corrmbox h3{margin:0 0 4px}.corrmbox p{margin:0 0 8px;font-size:13px;color:#777}
  .corrmbox textarea{width:100%;height:280px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace;box-sizing:border-box}
  .corrmrow{display:flex;gap:8px;margin-top:10px}.corrmrow button{flex:1}

  #atabs{display:flex;gap:8px;padding:10px 14px;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d))}
  #atabs .atab{flex:1;border:none;background:rgba(255,255,255,.14);color:#fff;border-radius:30px;padding:10px;font-size:14px;font-weight:700;cursor:pointer}
  #atabs .atab.on{background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400}
  #prodwrap iframe{display:block}
</style>
</head>
<body>
<div id="lock">
  <div class="mark">PR</div>
  <h1>Prinz Rudolf</h1>
  <p>RICETTARIO CUCINA &middot; ACCESSO RISERVATO</p>
  <div class="box">
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" enterkeyhint="go">
    <button id="enter">Entra</button>
    <div class="err" id="err"></div>
    <label><input type="checkbox" id="remember"> Ricorda su questo dispositivo</label>
  </div>
</div>
<div id="app" style="display:none">
<header>
  <div class="brand"><div class="mark">PR</div><div><small>Prinz Rudolf &middot; Cucina</small><h1 id="hTitle">Antipasti 2026</h1></div></div>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="q" type="search" placeholder="Cerca piatto o ingrediente&hellip;" autocomplete="off">
  </div>
</header>
<div id="atabs"><button id="atRic" class="atab on" onclick="showAntiView('ric')">📖 Ricette</button><button id="atProd" class="atab" onclick="showAntiView('prod')">🍅 Produzioni</button></div>
<main><div id="list"></div><div id="detail"></div></main>
<div id="prodwrap" style="display:none"><iframe id="prodframe" title="Produzioni Antipasti" style="width:100%;height:calc(100vh - 118px);border:0"></iframe></div>
<footer>Prinz Rudolf &middot; Ricettario Antipasti — uso interno cucina</footer>
</div>

(async function selfUpdate(){try{if(sessionStorage.getItem('upd_anti'))return;var r=await fetch(location.pathname+'?chk='+Date.now(),{cache:'no-store'});if(!r.ok)return;var t=await r.text();var m=t.match(/>v (\d\d\/\d\d \d\d:\d\d)</);var latest=m&&m[1];if(latest&&latest!==APP_VER){sessionStorage.setItem('upd_anti','1');location.replace(location.pathname+'?v='+Date.now());}}catch(e){}})();
(function(){if(!window.crypto||!crypto.subtle){err.textContent="Apri l'app dal sito (https), non come file locale.";return;}
  try{if(localStorage.getItem('pr_av_anti')!=='28/06 14:00'){localStorage.removeItem('pr_pw');localStorage.setItem('pr_av_anti','28/06 14:00');}}catch(_e){}let s=null;try{s=localStorage.getItem('pr_pw')}catch(e){}
  if(s){document.getElementById('remember').checked=true;tryUnlock(s,true);}else{setTimeout(()=>pw.focus(),300);}})();
function freqBadge(fr){if(!fr||fr==="—")return '';return `<span class="badge ${FREQ[fr]||'b-na'}">${fr}</span>`;}
function renderList(filter){
  filter=filter||"";const detail=document.getElementById('detail'),list=document.getElementById('list');
  detail.style.display='none';list.style.display='block';document.getElementById('hTitle').textContent='Antipasti 2026';
  const f=filter.trim().toLowerCase();let items=DISHES.map((d,i)=>({d,i}));
  if(f){items=items.filter(({d})=>((d.title+' '+d.giorno+' '+d.comps.map(c=>c.n+' '+c.r).join(' ')).toLowerCase().includes(f)));}
  if(!items.length){list.innerHTML='<div class="empty">Nessun risultato per &laquo;'+filter+'&raquo;</div>';return;}
  list.innerHTML=items.map(({d,i})=>`<div class="card" onclick="openDish(${i})">
    <div class="daychip"><b>${d.day}</b></div>
    <div class="info"><h3>${d.giorno}${d.img?'<span class="cam">📷</span>':''}</h3><p>${d.title}</p></div>
    <svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div>`).join('');
}
function openDish(i){
  const d=DISHES[i],list=document.getElementById('list'),detail=document.getElementById('detail');
  list.style.display='none';detail.style.display='block';window.scrollTo(0,0);document.getElementById('hTitle').textContent=d.giorno;
  detail.innerHTML=`<button class="back" onclick="renderList(document.getElementById('q').value)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg> Tutti gli antipasti</button>
    <div class="dhead"><div class="day">${d.giorno}</div><h2>${d.title}</h2></div>
    ${d.img?`<img class="dishphoto" src="${d.img}" alt="" onclick="zoom('${i}')">`:''}
    ${d.comps.map((c,j)=>`<div class="comp" id="c${i}-${j}">
        <div class="comp-h" onclick="toggle('c${i}-${j}')"><h4>${c.n}</h4>${freqBadge(c.fr)}
          <svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div>
        <div class="comp-body"><div class="recipe">${c.r}</div>
          ${c.q?`<div class="kv"><b>Quantità:</b> ${c.q}</div>`:''}
          ${c.note?`<div class="kv"><b>Note:</b> ${c.note}</div>`:''}</div></div>`).join('')}`+corrBox('anti|'+i);
}
function zoom(i){const d=DISHES[i];if(!d.img)return;document.getElementById('vimg').src=d.img;document.getElementById('viewer').style.display='flex';}
function toggle(id){document.getElementById(id).classList.toggle('open');}
document.getElementById('q').addEventListener('input',function(){renderList(this.value)});
function getCorr(cid){return CORR['anticorr|'+cid]||'';}
function corrBox(cid){return '<div class="corrbox"><div class="corrlbl">✏️ Modifiche / ricetta da fare</div><textarea class="corrta" placeholder="Scrivi qui la ricetta o cosa cambiare…">'+ce(getCorr(cid))+'</textarea><div class="corrrow"><button class="corrbtn save" onclick="saveCorr(\''+cid+'\',this)">Salva</button></div></div>';}
function saveCorr(cid,btn){var ta=btn.closest('.corrbox').querySelector('textarea');var v=ta.value;CORR['anticorr|'+cid]=v;var _lab='';try{_lab=(DISHES[parseInt(cid.split('|')[1],10)]||{}).title||'';}catch(e){}sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'anticorr|'+cid,v:{text:v,label:_lab,at:new Date().toISOString()}})}).catch(function(e){console.error(e);});var t=btn.textContent;btn.textContent='✓ Salvato';setTimeout(function(){btn.textContent=t;},1500);}
function exportCorr(){var out='MODIFICHE ANTIPASTI — Prinz Rudolf\n\n';var any=false;DISHES.forEach(function(d,i){var c=getCorr('anti|'+i);if(c&&c.trim()){any=true;out+='• ['+(d.giorno||'')+'] '+(d.title||'')+'\n  → '+c.trim()+'\n\n';}});if(!any)out+='(nessuna modifica scritta)';var m=document.getElementById('corrModal');m.querySelector('textarea').value=out;m.style.display='flex';}
function copyCorr(){var t=document.getElementById('corrModal').querySelector('textarea');t.select();t.setSelectionRange(0,99999);try{navigator.clipboard.writeText(t.value);}catch(e){try{document.execCommand('copy')}catch(_){}}var b=event&&event.target;if(b){var x=b.textContent;b.textContent='✓ Copiato';setTimeout(function(){b.textContent=x;},1500);}}

function showAntiView(v){var s=document.querySelector('.search'),m=document.querySelector('main'),pw=document.getElementById('prodwrap'),fr=document.getElementById('prodframe'),tr=document.getElementById('atRic'),tp=document.getElementById('atProd');
 if(v==='prod'){if(fr&&!fr.getAttribute('src'))fr.setAttribute('src','antiprod.html?embed=1');if(s)s.style.display='none';if(m)m.style.display='none';if(pw)pw.style.display='block';tr.classList.remove('on');tp.classList.add('on');window.scrollTo(0,0);}
 else{if(s)s.style.display='';if(m)m.style.display='';if(pw)pw.style.display='none';tr.classList.add('on');tp.classList.remove('on');}}
</script>
<div id="corrModal" class="corrmodal"><div class="corrmbox"><h3>📤 Modifiche da inviare</h3><p>Copia questo testo e mandalo a Gigio (o incollalo a Claude in chat).</p><textarea readonly></textarea><div class="corrmrow"><button class="corrbtn exp" onclick="copyCorr()">Copia</button><button class="corrbtn" onclick="document.getElementById('corrModal').style.display='none'">Chiudi</button></div></div></div>
