function missingFor(cook){

var _penSig=null;
function updatePenale(cook,miss){try{

  var sig=cook+'#'+((miss||[]).join('||'))+'#'+(lateEnough?'L':'E');if(sig===_penSig)return;_penSig=sig;
  var k='penale|'+today+'|'+cook,sk='pen_since_'+cook+'_'+today;
  if(miss&&miss.length&&lateEnough){var since=null;try{since=localStorage.getItem(sk);}catch(e){}if(!since){since=new Date().toISOString();try{localStorage.setItem(sk,since);}catch(e){}}
    sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:k,v:{cook:cook,n:miss.length,missing:miss,since:since,at:new Date().toISOString(),done:false}})}).catch(function(){});
  }else{try{localStorage.removeItem(sk);}catch(e){}
    sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:k,v:{cook:cook,n:0,missing:[],done:true,at:new Date().toISOString()}})}).catch(function(){});
  }
}catch(e){}}
function progressFor(cook){
  if(cook==='Gigio')return {tot:0,done:0,pct:100};
  var tot=0,done=0;
  if(cook!=='Gigio'){tot++; if(TIMBRA[cook]&&TIMBRA[cook].pIn)done++;}
  var tour=PEOPLE[cook]&&PEOPLE[cook].tournant;var cov=tour?(getCover()||badrCovers()):'';
  if(tour&&cov){tot+=puliziaFor(cov).length;done+=countDone('pulizia#'+cov);}
  else{tot+=puliziaFor(cook).length;done+=countDone('pulizia#'+cook);}
  if(RESPFISSI.indexOf(cook)>=0){tot+=APERTURA.length;done+=countDone('apertura');tot+=CHIUSURA.length;done+=countDone('chiusura');}
  if(NOSCHEDA.indexOf(cook)<0){tot++; if(ENT.filter(function(e){return e.type==='scheda'&&e.cook===cook;}).length>0)done++;}
  var pct=tot?Math.round(done/tot*100):100;if(pct>100)pct=100;if(pct<0)pct=0;
  return {tot:tot,done:done,pct:pct};
}

async function savePassList(){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'passlist',v:{items:PASSL}})});}catch(e){toast('⚠️ Not saved');console.error(e);}}
function addPass(){var c=getCook();if(!c){alert('Choose your name first.');return;}var el=document.getElementById('consIn');var t=(el.value||'').trim();if(!t)return;PASSL.push({id:'p'+Date.now()+Math.floor(Math.random()*1000),t:t,by:c,at:new Date().toISOString(),done:false});savePassList();render();openCard('ccons');setTimeout(function(){var i=document.getElementById('consIn');if(i)i.focus();},50);}
function togglePass(id){var c=getCook();if(!c){alert('Choose your name first.');return;}var x=PASSL.find(function(y){return y.id===id;});if(!x)return;x.done=!x.done;if(x.done){x.doneBy=c;x.doneAt=new Date().toISOString();}else{delete x.doneBy;delete x.doneAt;}savePassList();render();openCard('ccons');}
function clearDonePass(){if(!confirm('Remove the already-done items from the list?'))return;PASSL=PASSL.filter(function(x){return !x.done;});savePassList();render();openCard('ccons');}

}
