<style>

  #lock button{width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400;cursor:pointer}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:14px;flex:none}
  .brand h1{font-size:16px;margin:0;font-weight:600}
  .brand small{display:block;font-size:10px;opacity:.8;letter-spacing:1.5px;text-transform:uppercase}
  .who{margin-top:10px;font-size:12px;opacity:.95;display:flex;align-items:center;gap:6px;flex-wrap:wrap}

  #status{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:center}

  .card-h .t{flex:1;font-size:16px;font-weight:700}

  .card-h .tog{color:var(--gold);transition:transform .2s}

  .card-b{display:none;padding:6px 16px 16px}
  .card.open .card-b{display:block}
  .it{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .it:last-child{border-bottom:none}
  .chk{width:26px;height:26px;border:2px solid var(--gold);border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff;background:#fff;margin-top:1px}
  .chk.on{background:var(--ok);border-color:var(--ok)}
  .it .lab{flex:1;font-size:14.5px}
  .it .sig{font-size:11px;color:var(--ok);font-weight:600;margin-top:3px;display:block}
  input.txt,textarea.txt,select.txt{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:14px;font-family:inherit;margin-top:4px}
  textarea.txt{min-height:54px}
  label.fl{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-top:9px}
  .btn{border:none;border-radius:10px;padding:11px 14px;font-size:14px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400;margin-top:12px}
  .readbox{font-size:13px;color:var(--muted)}
  .ctrlbtn{width:100%;border:1.5px solid var(--gold);background:#fff;color:var(--bordeaux);border-radius:10px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px}

  .ctrlbar.okc{background:#e9f7ef;color:#1e6b46;border:1px solid #2e7d5b}
  .ctrlbar.waitc{background:#fff6da;color:#5a4600;border:1px solid var(--gold)}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff}
  .pill.ok{background:var(--ok)}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#222;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;z-index:80;pointer-events:none;max-width:90%}
  #toast.show{opacity:.95}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:18px}
</style>
</head>

const RIPOSO={Gigio:[2],Gianluca:[0,1],Alex:[3],Mattia:[6],Erjola:[2],Badr:[0],Majeet:[3]}; // 0=Dom..6=Sab; Ubaldo nessun riposo (per ora)
function isOff(cook){var wd=new Date(today+"T00:00:00").getDay();return !!(RIPOSO[cook]&&RIPOSO[cook].indexOf(wd)>=0);}
function badrCovers(){var L=["Alex","Mattia","Erjola"];for(var k=0;k<L.length;k++){if(isOff(L[k]))return L[k];}return "";}

 "Erjola":{noResp:true,noApe:true,noChiu:true,
   pulizia:["Equipment: scales, pacojet, pastry oven, pastry fridges, bimby and microwave","Fridge counter: tidy up, check dates, FIFO","Lids clean and tidy","Blast chiller front: clean","Check for dirt near the plates"],

 "Ubaldo":{pulizia:["Worktop clean and sanitised","Station equipment: slicer, pizza drawers, knives, sink, pizza display","Fridge counter: tidy up, check dates, FIFO","Lids clean and tidy","Clean pizza oven (wipe down)","Fridge and proofer always clean","Check for dirt in pizza drawers","Clean the diving-arm mixer (every day after kneading)"],puliziaSett:["Inside fridge counter / drawers (incl. seals)","Clean inside the pizza oven","Deep clean your cold room + check expiry dates","Clean pizzeria low area","Pizza display","Pizza boxes area","Pizzeria fridges and dough drawers","Small pizzeria appliances","Shared equipment: large mixers (deep clean)","Blast chiller front: clean inside and out"]},
 "Badr":{tournant:true,pulizia:["Help the stations in trouble","Help clean the stations until everyone has finished","Restock the bread in the fridge if it has run out"]},
 "Gianluca":{pulizia:["Check fingerfood/aperitif requests and organise them","Worktop clean and sanitised","Equipment: small mixer, microwave, bimby, sink, knives","Fridge counter: tidy up, check dates, FIFO","Lids clean and tidy","Stoves / griddle","Oven","Blast chiller front: clean","Central gourmet pass","Gourmet lamps","Check for dirt near the plates","Change roner water (every service day)"],puliziaSett:["Inside fridge counter / drawers (incl. seals)","Clean shelves","Gourmet freezer","Small appliances of the station","Hood filters (every 2 weeks)"]},
 "Majeet":{noResp:true,noApe:true,noChiu:true,pulizia:["Help the stations wherever needed","Help clean the stations until everyone has finished","Prepare mise en place and bases for the stations","Keep shared worktops and equipment clean","Help at the pass during service"],puliziaSett:["Deep clean the assigned shared area","Help with the weekly deep clean of the stations"]}
};
const MENU_INFO='Lunch ~30 people · Dinner ~25 people · quantities next to each dish';
const MENU_PRANZO=[
 ['Mon','Pasta with tomato and basil (~1.2 kg)','Sous-vide pork collar in sauce (~1.6 kg)','Chicken cacciatora (~0.7 kg)','Vegetable parmigiana (~0.8 kg)','Mash ~1.8 kg + vegetables ~2 kg'],
 ['Tue','Pasta with beef ragù (~1.2 kg)','Chicken curry (~1.8 kg)','—','Vegetable and chickpea curry (~0.9 kg)','Potatoes ~1.5 kg + frozen vegetables ~2 kg'],
 ['Wed','Baked pasta (~1.2 kg)','Sous-vide braised beef (~1.6 kg)','Chicken bites (~0.7 kg)','Vegetable bake (~0.8 kg)','Mash ~1.8 kg + vegetables ~2 kg'],
 ['Thu','Rice / risotto (~1.5 kg)','Turkey stew (~1.8 kg)','—','Baked pasta (veg) (~1 kg)','Roast potatoes ~1.8 kg + frozen vegetables ~2 kg'],
 ['Fri','Tuna pasta (~1.2 kg)','Fried fish (~1.8 kg)','Stewed chicken (~0.7 kg)','Couscous with vegetables (~0.9 kg)','Parsley potatoes ~1.8 kg + vegetables ~2 kg'],
 ['Sat','Pasta arrabbiata (~1.2 kg)','Sous-vide pork collar, mushroom sauce (~1.6 kg)','Stewed chicken (~0.7 kg)','Gratin vegetables (~0.8 kg)','Polenta/potatoes ~1.8 kg + frozen vegetables ~2 kg'],
 ['Sun','Mushroom rice (~1.5 kg)','Roast beef in sauce (~1.6 kg)','Roast chicken (~0.8 kg)','Gratin vegetables (~0.8 kg)','Mash ~1.8 kg + vegetables ~2 kg']
];
const MENU_PRANZO_NOTE='Always available: boiled white rice (1 kg) · salad of the day (~1 kg) · cold extra: tuna (~0.8 kg) or 12 boiled eggs · grated cheese. Trays under the pass: 6 hot (top: first course · main · alternative/veg — bottom: white rice · vegetables · potatoes/mash) + separate cold counter (salad · cold extra).';
const MENU_CENA=[
 ['Mon','Pasta salad ~1.5 kg (tuna, corn, mozzarella)','Green salad + bread','No tuna, with cheese','Majeet'],
 ['Tue','Burger in a bun (~38 pcs · 2 each for half)','Fries/croquettes ~2.5 kg + salad','Veggie burger','Alex'],
 ['Wed','Baked pasta (~1.5 kg)','Salad + bread','Vegetarian baked pasta','Mattia'],
 ['Thu','Tray pizza (~2.5 kg dough)','Salad','Vegetable pizza','Badr'],
 ['Fri','Rice salad ~1.5 kg (tuna, eggs, corn)','Salad + bread','Veg version with chickpeas/cheese','Majeet'],
 ['Sat','Chicken wrap / kebab (~38 pcs · 2 each for half)','Fries/croquettes ~2.5 kg + salad','Vegetable and cheese wrap','Badr'],
 ['Sun','Filled pita / focaccia (~38 pcs · 2 each for half)','Fries/croquettes ~2.5 kg + salad','Vegetarian version','Alex']
];
const MENU_CENA_NOTE='Assembled dishes (burger, wrap, pita): ~2 each for half the covers (~38 pcs for 25 people). Dinner: pork ok, no beef (except the Tuesday burger). Salad and white rice always available.';
function puliziaFor(cook){return (PEOPLE[cook]&&PEOPLE[cook].pulizia)||PULIZIA;}
function puliziaSettFor(cook){return (PEOPLE[cook]&&PEOPLE[cook].puliziaSett)||PULIZIA_SETT;}
function weekStart(ds){var d=new Date(ds+'T00:00:00');var k=(d.getDay()+6)%7;d.setDate(d.getDate()-k);return d.toISOString().slice(0,10);}
function itemsFor(g){return g.indexOf('pulizias#')===0?(puliziaSettFor(g.slice(9))||[]):(g.indexOf('pulizia#')===0?puliziaFor(g.slice(8)):(g.indexOf('pulizia')===0?PULIZIA:(ITEMS[g]||[])));}
function scopeId(group){var dd=group.indexOf('pulizias#')===0?weekStart(today):today;return group+'@'+dd;}
function ctrlFooter(group){var st=CTRL[scopeId(group)];if(st&&st.stato==='ok')return '<div class="ctrlbar okc">✔ Checked by the chef'+(st.chef?(' ('+esc(st.chef)+')'):'')+'</div>';if(st&&st.stato==='richiesto')return '<div class="ctrlbar waitc">⏳ Waiting for the chef to check</div>';return '<button class="ctrlbtn" onclick="requestControl(\''+group+'\')">Done → request check</button>';}
async function requestControl(group){var c=getCook();if(!c){alert('Pick your name first.');return;}var sid=scopeId(group);CTRL[sid]={stato:'richiesto',by:c,at:new Date().toISOString()};try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'ctrl|'+sid,v:CTRL[sid]})});toast('Check requested from the chef');render();}catch(e){toast('⚠️ Not sent');console.error(e);}}
function totalFor(g){return itemsFor(g).length;}
const today=new Date().toISOString().slice(0,10);
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
function now(){return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
async function sb(path,opts){opts=opts||{};const h={apikey:SB_KEY,'Content-Type':'application/json'};if(opts.headers)Object.assign(h,opts.headers);const r=await fetch(SB_URL+'/rest/v1/'+path,{method:opts.method||'GET',headers:h,body:opts.body});if(!r.ok)throw new Error('HTTP '+r.status+' '+await r.text());const txt=await r.text();return txt?JSON.parse(txt):null;}

/* state */
let CK={},ENT=[],META=null,PRESA=[],CTRL={},TIMBRA={},PREVPASS=[];
function dayShift(ds,n){var d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function getCook(){return localStorage.getItem('pr_cook')||''}
function setCook(n){localStorage.setItem('pr_cook',n);render();}

/* lock */
const pw=document.getElementById('pw'),err=document.getElementById('err');
function unlock(p,fromStore){
  if(p!==APP_PW){err.textContent='Wrong password';pw.value='';return;}
  if(document.getElementById('remember').checked||fromStore){try{localStorage.setItem('pr_kpw','1')}catch(e){}}
  document.getElementById('lock').style.display='none';document.getElementById('app').style.display='block';
  loadAll();
}
document.getElementById('enter').onclick=()=>unlock(pw.value,false);
pw.addEventListener('keydown',e=>{if(e.key==='Enter')unlock(pw.value,false)});
(function(){try{if(localStorage.getItem('pr_av_cuochien')!=='19/06 11:31'){localStorage.removeItem('pr_kpw');localStorage.setItem('pr_av_cuochien','19/06 11:31');}}catch(_e){}let s=null;try{s=localStorage.getItem('pr_kpw')}catch(e){}if(s)unlock(APP_PW,true);else setTimeout(()=>pw.focus(),300);})();

async function loadAll(){
  document.getElementById('status').textContent='Loading from cloud…';
  try{
    const[ck,ckw,ent,meta,presa,ctrl,timb,prevp]=await Promise.all([
      sb('kitchen_checks?day=eq.'+today+'&select=*'),
      sb('kitchen_checks?day=eq.'+weekStart(today)+'&grp=like.pulizias%23*&select=*'),
      sb('kitchen_entries?day=eq.'+today+'&select=*&order=at'),
      sb('kitchen_meta?k=eq.responsabile&select=*'),
      sb('kitchen_presa?select=*'),
      sb('kitchen_meta?k=like.ctrl|*&select=*'),
      sb('kitchen_meta?k=like.timbra|'+today+'*&select=*'),
      sb('kitchen_entries?day=in.('+dayShift(today,-2)+','+dayShift(today,-1)+')&type=eq.passaggio&select=*&order=at')
    ]);
    CK={};(ck||[]).concat(ckw||[]).forEach(r=>{CK[r.grp+'_'+r.idx]={by:r.cook,at:r.at};});
    ENT=ent||[];META=(meta&&meta[0])?meta[0].v:null;PRESA=presa||[];
    CTRL={};(ctrl||[]).forEach(r=>{CTRL[r.k.slice(5)]=r.v;});
    TIMBRA={};(timb||[]).forEach(r=>{var p=r.k.split('|');TIMBRA[p[2]]=r.v;});
    PREVPASS=prevp||[];
    document.getElementById('status').textContent='✓ Connected · '+today.split('-').reverse().join('/');
    render();
  }catch(e){document.getElementById('status').textContent='⚠️ Connection problem. Check the internet and reopen.';console.error(e);}
}
function tloc(iso){try{return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}catch(e){return''}}

function timbraCard(){
  var c=getCook();
  if(!c)return '<div class="card" style="border-color:var(--gold)"><div class="card-h" style="cursor:default"><div class="t">Arrival time</div></div><div class="card-b" style="display:block"><div class="readbox">Pick your name at the top to log your arrival time.</div></div></div>';
  var t=TIMBRA[c]||{};
  var inH=t.in?('<div class="row" style="display:flex;justify-content:space-between;padding:6px 0"><span>Arrival</span><span class="donerow" style="font-weight:700">'+tloc(t.in)+' &#10003;</span></div>'):'<button class="btn" style="width:100%;margin-top:0" onclick="timbraIn()">Log ARRIVAL</button>';
  return '<div class="card" style="border-color:var(--gold)"><div class="card-h" style="cursor:default"><div class="t">Arrival time &mdash; '+esc(c)+'</div></div><div class="card-b" style="display:block"><div class="readbox" style="margin-bottom:10px">⚠️ Log your arrival only when you are <b>already changed and in the kitchen</b>, not when you enter the building.</div>'+inH+'</div></div>';
}
async function timbraIn(){var c=getCook();if(!c){alert("Pick your name first.");return;}var t=TIMBRA[c]||{};if(t.in)return;t.in=new Date().toISOString();TIMBRA[c]=t;try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'timbra|'+today+'|'+c,v:t})});toast('Arrival logged: '+now());render();}catch(e){toast('⚠️ Not saved');console.error(e);}}
function whoBar(){

  document.getElementById('whoBar').innerHTML='You are: <select onchange="setCook(this.value)">'+o+'</select>';

function toggleCard(id){document.getElementById(id).classList.toggle('open')}

async function checkItem(group,idx,el){
  const c=getCook();if(!c){alert('Pick your name at the top first.');return;}
  const key=group+'_'+idx;const on=!CK[key];
  el.classList.toggle('on',on);el.textContent=on?'✓':'';
  const lab=el.parentNode.querySelector('.lab');let sig=lab.querySelector('.sig');
  if(on){CK[key]={by:c,at:new Date().toISOString()};if(!sig){sig=document.createElement('span');sig.className='sig';lab.appendChild(sig);}sig.textContent='✓ '+c+' · '+now();}
  else{delete CK[key];if(sig)sig.remove();}
  const card=el.closest('.card');const meta=card&&card.querySelector('.meta');if(meta){let d=0;Object.keys(CK).forEach(k=>{if(k.indexOf(group+'_')===0)d++});meta.textContent=d+'/'+totalFor(group);}
  const dd=group.indexOf('pulizias#')===0?weekStart(today):today;
  try{
    if(on)await sb('kitchen_checks?on_conflict=day,grp,idx',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({day:dd,grp:group,idx:idx,label:itemsFor(group)[idx],cook:c})});
    else await sb('kitchen_checks?day=eq.'+dd+'&grp=eq.'+group+'&idx=eq.'+idx,{method:'DELETE',headers:{Prefer:'return=minimal'}});
  }catch(e){toast('⚠️ Tick not saved, try again');el.classList.toggle('on',!on);console.error(e);}
}
function checklistCard(id,title,group,items){
  let d=0;Object.keys(CK).forEach(k=>{if(k.indexOf(group+'_')===0)d++});
  let rows=items.map((it,i)=>{const on=CK[group+'_'+i];return '<div class="it"><div class="chk'+(on?' on':'')+'" onclick="checkItem(\''+group+'\','+i+',this)">'+(on?'✓':'')+'</div><div class="lab">'+esc(it)+(on?'<span class="sig">✓ '+esc(on.by)+' · '+tloc(on.at)+'</span>':'')+'</div></div>';}).join('');
  return '<div class="card" id="'+id+'"><div class="card-h" onclick="toggleCard(\''+id+'\')"><div class="t">'+title+'</div><div class="meta">'+d+'/'+items.length+'</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b">'+rows+ctrlFooter(group)+'</div></div>';
}
function respCard(){
  const r=META||{};let opt='<option value="">—</option>'+RESP.map(x=>'<option '+(x[1]===r.name?'selected':'')+'>'+x[1]+'</option>').join('');
  return '<div class="card open" id="cresp"><div class="card-h" onclick="toggleCard(\'cresp\')"><div class="t">Person in charge this week</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b">'
    +'<div class="readbox" style="margin-bottom:8px">Shift 08:00–14:00 · deliveries, cold rooms, deep clean of mixers.</div>'
    +'<label class="fl">In charge this week</label><select class="txt" id="respName">'+opt+'</select>'
    +'<label class="fl">From</label><input class="txt" type="date" id="respDal" value="'+((r.dal)||'')+'">'
    +'<label class="fl">To</label><input class="txt" type="date" id="respAl" value="'+((r.al)||'')+'">'
    +'<button class="btn" onclick="saveResp()">Save person in charge</button>'
    +'<div class="readbox" style="margin-top:12px"><b>Rotation:</b> '+RESP.map(x=>x[1]).join(' · ')+'</div></div></div>';
}
async function saveResp(){const c=getCook();const v={name:document.getElementById('respName').value,dal:document.getElementById('respDal').value,al:document.getElementById('respAl').value,by:c,at:new Date().toISOString()};
  try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'responsabile',v:v})});META=v;toast('Person in charge saved');}catch(e){toast('⚠️ Not saved');console.error(e);}}
function schedaCard(){
  const list=ENT.filter(e=>e.type==='scheda');
  let rows=list.map(e=>'<div class="it"><div class="chk on">✓</div><div class="lab">'+esc(e.data.cosa)+(e.data.entro?' <span class="readbox">(by '+esc(e.data.entro)+')</span>':'')+'<span class="sig">✓ '+esc(e.cook)+' · '+tloc(e.at)+'</span></div></div>').join('');
  if(!list.length)rows='<div class="readbox">No entries yet.</div>';
  return '<div class="card" id="csch"><div class="card-h" onclick="toggleCard(\'csch\')"><div class="t">Service sheet (mise en place)</div><div class="meta">'+list.length+'</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b">'+rows
    +'<label class="fl">What and how much (e.g. "Bread: 8 kg done")</label><input class="txt" id="schCosa" placeholder="Work done…">'
    +'<label class="fl">Ready by (optional)</label><input class="txt" id="schEntro" placeholder="e.g. 12:00">'
    +'<button class="btn" onclick="addScheda()">+ Add entry</button></div></div>';
}
async function addScheda(){const c=getCook();if(!c){alert('Pick your name first.');return;}const cosa=document.getElementById('schCosa').value.trim();if(!cosa)return;
  const row={day:today,type:'scheda',cook:c,data:{cosa:cosa,entro:document.getElementById('schEntro').value.trim()}};
  try{await sb('kitchen_entries',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify(row)});ENT.push({type:'scheda',cook:c,at:new Date().toISOString(),data:row.data});render();openCard('csch');toast('Added');}catch(e){toast('⚠️ Not saved');console.error(e);}}
function passCard(){
  const list=ENT.filter(e=>e.type==='passaggio');
  let prev=list.length?'<div class="readbox" style="margin-bottom:8px"><b>Sent today:</b> '+list.map(p=>esc(p.data.partita||'?')+' ('+esc(p.cook)+')').join(', ')+'</div>':'';
  const F=[['partita','Station covered',0],['da','From (station chef)',0],['a','To (who covers)',0],['pronto','What is READY',1],['manca','What is MISSING / to finish',1],['dove','Where things are',1],['urgenti','Urgent preparations',1],['note','Notes',1]];
  let fields=F.map(f=>'<label class="fl">'+f[1]+'</label>'+(f[2]?'<textarea class="txt" id="pc_'+f[0]+'"></textarea>':'<input class="txt" id="pc_'+f[0]+'">')).join('');
  return '<div class="card" id="cpass"><div class="card-h" onclick="toggleCard(\'cpass\')"><div class="t">Handover</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b">'+prev+fields+'<button class="btn" onclick="savePass()">Send handover</button></div></div>';
}
function prevPassCard(){
  if(!PREVPASS.length)return '';
  const FL=[['pronto','READY'],['manca','MISSING / to finish'],['dove','Where things are'],['urgenti','Urgent'],['note','Notes']];
  var GG=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  function dlabel(ds){try{var x=new Date(ds+'T00:00:00');return GG[x.getDay()]+' '+ds.split('-').reverse().slice(0,2).join('/');}catch(e){return ds||'';}}
  var P=PREVPASS.slice().sort(function(a,b){if((a.day||'')!==(b.day||''))return (a.day||'')<(b.day||'')?1:-1;return ((a.at||'')<(b.at||'')?1:-1);});
  let blocks=P.map(p=>{var d=p.data||{};
    var body=FL.filter(f=>(d[f[0]]||'').trim()).map(f=>'<div style="margin-top:4px"><b>'+f[1]+':</b> '+esc(d[f[0]])+'</div>').join('');
    return '<div class="readbox" style="border:1px solid var(--line);border-radius:9px;padding:9px 11px;margin-bottom:8px;color:var(--ink)"><div style="font-size:11px;color:var(--muted);font-weight:700;margin-bottom:2px">📅 '+esc(dlabel(p.day))+'</div><div style="font-weight:700;color:var(--bordeaux)">'+esc(d.partita||'?')+(d.da?(' — from '+esc(d.da)):'')+(d.a?(' → '+esc(d.a)):'')+'</div>'+(body||'<div class="muted" style="margin-top:4px">(no details)</div>')+'</div>';
  }).join('');
  return '<div class="card open" id="cprevpass" style="border-color:var(--gold)"><div class="card-h" onclick="toggleCard(\'cprevpass\')"><div class="t">Handover</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b"><div class="readbox" style="margin-bottom:8px">What the station chefs left in the last days (most recent on top).</div>'+blocks+'</div></div>';
}
async function savePass(){const c=getCook();if(!c){alert('Pick your name first.');return;}const ids=['partita','da','a','pronto','manca','dove','urgenti','note'];const data={};ids.forEach(k=>data[k]=document.getElementById('pc_'+k).value.trim());if(!data.partita){alert('Enter at least the station.');return;}
  try{await sb('kitchen_entries',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify({day:today,type:'passaggio',cook:c,data:data})});ENT.push({type:'passaggio',cook:c,at:new Date().toISOString(),data:data});render();openCard('cpass');toast('Handover sent');}catch(e){toast('⚠️ Not sent');console.error(e);}}
function presaCard(){
  const c=getCook();const mine=PRESA.find(p=>p.cook===c);
  return '<div class="card" id="cpv"><div class="card-h" onclick="toggleCard(\'cpv\')"><div class="t">Job description acknowledgement</div>'+(mine?'<span class="pill ok">signed</span>':'')+'<svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b"><div class="readbox" style="margin-bottom:10px">I confirm I have read and understood the job description and the kitchen rules.</div>'+(mine?'<div class="pill ok">✓ Firmato da '+esc(c)+'</div>':'<button class="btn" onclick="firmaPresa()">I confirm I have read it</button>')+'</div></div>';
}
async function firmaPresa(){const c=getCook();if(!c){alert('Pick your name first.');return;}const role=(TEAM.find(t=>t[0]===c)||['',''])[1];
  try{await sb('kitchen_presa?on_conflict=cook',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({cook:c,role:role})});PRESA.push({cook:c,role:role,at:new Date().toISOString()});render();openCard('cpv');toast('Signed');}catch(e){toast('⚠️ Not saved');console.error(e);}}
function readCard(){return '<div class="card" id="cread"><div class="card-h" onclick="toggleCard(\'cread\')"><div class="t">📖 Job description & guides (to read)</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b"><div class="readbox">Here we will put the full job description, org chart, briefing, fryers, plating photos and reminders — to consult. (To be added.)</div></div></div>';}

let openIds=new Set();
function openCard(id){const e=document.getElementById(id);if(e)e.classList.add('open');}
const COVER=[["Alex","Mains (Secondi)"],["Mattia","First courses (Primi)"],["Erjola","Pastry"]];
function getCover(){return localStorage.getItem('prcover_'+today)||'';}
function setCover(st){localStorage.setItem('prcover_'+today,st);render();}
function weekdaysWork(cook){
  var off=(RIPOSO[cook]||[]).slice();
  if(cook==='Badr'){['Alex','Mattia','Erjola'].forEach(function(c){(RIPOSO[c]||[]).forEach(function(d){if(off.indexOf(d)<0)off.push(d);});});}
  return [1,2,3,4,5,6,0].filter(function(d){return off.indexOf(d)<0;});
}
function weeklyDue(cook){
  var items=puliziaSettFor(cook)||[];var wd=weekdaysWork(cook);if(!wd.length)return [];
  var group='pulizias#'+cook;var order=[1,2,3,4,5,6,0];
  var tp=order.indexOf(new Date(today+'T00:00:00').getDay());
  var res=[];items.forEach(function(it,i){var ap=order.indexOf(wd[i%wd.length]);if(ap<=tp&&!CK[group+'_'+i])res.push(i);});
  return res;
}
function weeklyTodayCard(cook){
  var idxs=weeklyDue(cook);if(!idxs.length)return '';
  var items=puliziaSettFor(cook)||[];var group='pulizias#'+cook;
  var rows=idxs.map(function(i){var on=CK[group+'_'+i];return '<div class="it"><div class="chk'+(on?' on':'')+'" onclick="checkItem(\''+group+'\','+i+',this)">'+(on?'✓':'')+'</div><div class="lab">'+esc(items[i])+(on?'<span class="sig">✓ '+esc(on.by)+' · '+tloc(on.at)+'</span>':'')+'</div></div>';}).join('');
  return '<div class="card open" id="cwtoday" style="border-color:var(--gold)"><div class="card-h" onclick="toggleCard(\'cwtoday\')"><div class="t">🧽 Today\'s weekly ('+idxs.length+')</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b"><div class="readbox" style="margin-bottom:6px">On top of the daily list, today you also do this: the weekly cleaning is spread over the days (a little each day, no big block to finish by Sunday).</div>'+rows+'</div></div>';
}
function puliziaSection(){
  var cook=getCook();
  if(CHIUSI.indexOf(cook)>=0){return '<div class="card" style="border-color:var(--gold)"><div class="card-h" style="cursor:default"><div class="t">Gourmet cleaning — 🔒 suspended</div></div><div class="card-b" style="display:block"><div class="readbox">The gourmet is closed: cleaning is suspended. Log what you produce in the <b>Service sheet</b> below.</div></div></div>';}
  if(isOff(cook)){return '<div class="card" style="border-color:var(--gold)"><div class="card-h" style="cursor:default"><div class="t">🔓 Today is your day off</div></div><div class="card-b" style="display:block"><div class="readbox">Enjoy your day off!'+(['Alex','Mattia','Erjola'].indexOf(cook)>=0?' Badr is covering your cleaning today.':'')+' You do not have to tick anything.</div></div></div>';}
  if(PEOPLE[cook]&&PEOPLE[cook].tournant){
    var cov=getCover();if(!cov)cov=badrCovers();
    var opts='<option value="">— no coverage —</option>'+COVER.map(function(x){return '<option value="'+x[0]+'" '+(x[0]===cov?'selected':'')+'>'+x[1]+' ('+x[0]+')</option>';}).join('');
    var sel='<div class="card" style="border-color:var(--gold)"><div class="card-h" style="cursor:default"><div class="t">Today you cover the station of:</div></div><div class="card-b" style="display:block">'+(badrCovers()?'<div class="readbox" style="margin-bottom:8px">🔓 Today <b>'+esc(badrCovers())+'</b> is off: cover their station.</div>':'')+'<select class="txt" onchange="setCover(this.value)">'+opts+'</select></div></div>';
    if(cov){
      var info='<div class="card" style="border-color:var(--gold)"><div class="card-h" style="cursor:default"><div class="t">🔒 Today you are on a station</div></div><div class="card-b" style="display:block"><div class="readbox">Today you cover the station of <b>'+esc(cov)+'</b>: do the <b>tasks of that station</b> below. Your tournant tasks are suspended today, you do not need to tick them.</div></div></div>';
      var covCards=checklistCard('cpul','Cleaning — '+esc(cov)+' (you cover)','pulizia#'+cov,puliziaFor(cov))+(puliziaSettFor(cov)?checklistCard('cpuls','Weekly cleaning (by SUNDAY) — '+esc(cov),'pulizias#'+cov,puliziaSettFor(cov)):'');
      return sel+info+covCards;
    }
    var base=checklistCard('cpulb','My tasks (Tournant / Bakery)','pulizia#'+cook,puliziaFor(cook));
    var mySett=weeklyTodayCard(cook);
    return base+mySett+sel;
  }
  return checklistCard('cpul','My cleaning (station chef)','pulizia#'+(cook||'_'),puliziaFor(cook||'_'))+weeklyTodayCard(cook);
}
function menuCard(){
  var p=MENU_PRANZO.map(function(d){return '<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px"><b>'+d[0]+'</b> — <b>First:</b> '+esc(d[1])+' · <b>Main:</b> '+esc(d[2])+(d[3]&&d[3]!=='—'?' · <b>Meat alt.:</b> '+esc(d[3]):'')+' · <b>Veg:</b> '+esc(d[4])+' · <b>Sides:</b> '+esc(d[5])+'</div>';}).join('');
  var c=MENU_CENA.map(function(d){return '<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px"><b>'+d[0]+'</b> — '+esc(d[1])+' · <b>Side:</b> '+esc(d[2])+' · <b>Veg:</b> '+esc(d[3])+(d[4]?' · <b>Prepares:</b> '+esc(d[4]):'')+'</div>';}).join('');
  return '<div class="card" id="cmenu"><div class="card-h" onclick="toggleCard(\'cmenu\')"><div class="t">📋 Staff menu</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b"><div class="readbox" style="margin-bottom:6px">'+MENU_INFO+'</div><div style="font-weight:700;margin:4px 0 2px">LUNCH (~30 people)</div>'+p+'<div class="readbox" style="margin-top:8px">'+MENU_PRANZO_NOTE+'</div><div style="font-weight:700;margin:12px 0 2px">DINNER (~25 people)</div>'+c+'<div class="readbox" style="margin-top:8px">'+MENU_CENA_NOTE+'</div></div></div>';
}
function render(){
  whoBar();
  var ME=getCook();
  var RN=(META&&META.name)?META.name:'';   // responsabile della settimana
  var showApe = RN ? (ME && ME===RN) : !(PEOPLE[ME]&&PEOPLE[ME].noApe);
  var apeTitle = RN ? 'Opening checklist (person in charge this week)' : 'Opening checklist';
  document.getElementById('view').innerHTML=
    timbraCard()+
    ((PEOPLE[ME]&&PEOPLE[ME].noResp)?'':respCard())
    +(showApe?checklistCard('cap',apeTitle,'apertura',APERTURA):'')
    +puliziaSection()
    +schedaCard()
    +((PEOPLE[ME]&&PEOPLE[ME].noChiu)?'':checklistCard('cch','Closing checklist','chiusura',CHIUSURA))
    +prevPassCard()
    +passCard()
    +presaCard()
    +menuCard()
    +readCard();
}
</script>
<div id="verbadge" style="position:fixed;left:6px;bottom:6px;z-index:9999;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-family:-apple-system,sans-serif;pointer-events:none">v 20/06 08:23</div>
</body>
