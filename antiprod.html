function due(it){if(it.chk)return !isChk(it.id);return !it.fresco && it.min!=null && getQ(it.id)<=it.min;}
function tabsBar(){var n=0;SEZ.forEach(s=>s.items.forEach(it=>{if(due(it))n++;}));
  const T=[['lista','➕ Lista'+(LISTA.length?' ('+LISTA.length+')':'')],['ordina','▶ Da produrre'+(n?' ('+n+')':'')],['tutto','Per antipasto']];
  document.getElementById('tabs').innerHTML=T.map(t=>'<button class="tab'+(FILT===t[0]?' on':'')+'" onclick="setFilt(\''+t[0]+'\')">'+esc(t[1])+'</button>').join('');}
function setFilt(f){FILT=f;render();window.scrollTo(0,0);}
function congPill(it){if(it.congt==='da')return '<span class="pill neve">❄️ da congelare</span>';if(it.congt==='gia')return '<span class="pill neve">❄️ surgelato (arriva così)</span>';return '';}
function tipoPill(it){
  if(it.chk)return it.congt==='gia'?'<span class="pill chk">🟣 controlla in congelatore · senno ordina</span>':'<span class="pill chk">🟣 settimanale · controlla/produci</span>';
  if(!it.fresco){var t=(it.tipo||'').toLowerCase();return '<span class="pill '+(t.indexOf('settiman')>=0?'sett':'pg')+'">'+esc(it.tipo)+'</span>';}
  var t=(it.tipo||'').toLowerCase();
  if(t.indexOf('giornal')>=0)return '<span class="pill frd">🟢 fresco del giorno</span>';
  if(t.indexOf('espress')>=0)return '<span class="pill esp">⚡ espresso al pass</span>';
  if(t.indexOf('settiman')>=0)return '<span class="pill sett">🔵 settimanale (a vista)</span>';
  if(t.indexOf('guarniz')>=0)return '<span class="pill gua">🌿 guarnizione</span>';
  return '<span class="pill">'+esc(it.tipo)+'</span>';}
function metaLine(it){var m=tipoPill(it)+congPill(it);if(it.note)m+='<span class="note">'+esc(it.note)+'</span>';return m;}
function stepper(it){return '<div class="stepper"><button class="minus" onclick="chg(\''+it.id+'\',-1)">&minus;</button><div class="val"><span class="n" id="n_'+it.id+'" onclick="setEx(\''+it.id+'\')">'+getQ(it.id)+'</span><small>'+esc(it.u||'')+'</small></div><button class="plus" onclick="chg(\''+it.id+'\',1)">+</button></div>';}
function rowStock(it){var lo=due(it);return '<div class="row'+(lo?' low':'')+'"><div class="info"><div class="nm">'+esc(it.n)+(lo?' <span class="pill ord">'+(it.congt==='gia'?'DA ORDINARE':'DA PRODURRE')+'</span>':'')+'</div><div class="meta">'+metaLine(it)+(it.min!=null?'<span style="color:var(--muted)">min '+it.min+' '+esc(it.u||'')+'</span>':'')+'</div></div>'+stepper(it)+'</div>';}
function rowCheck(it){var done=isChk(it.id);return '<div class="row'+(done?'':' low')+'"><div class="info"><div class="nm">'+esc(it.n)+(done?' <span class="pill done">✓ fatto questa settimana</span>':' <span class="pill ord">DA CONTROLLARE</span>')+'</div><div class="meta">'+metaLine(it)+'</div></div><div class="chkbox'+(done?' on':'')+'" onclick="toggleChk(\''+it.id+'\')">'+(done?'✓':'')+'</div></div>';}
function rowFresh(it){return '<div class="row frescorow"><div class="info"><div class="nm">'+esc(it.n)+'</div><div class="meta">'+metaLine(it)+'</div></div></div>';}
function rowFor(it){if(it.chk)return rowCheck(it);if(it.fresco)return rowFresh(it);return rowStock(it);}
function render(){tabsBar();const v=document.getElementById('view');let h='';
  if(FILT==='lista'){renderLista(v);return;}
  if(FILT==='ordina'){h+='<div class="hint">Mostra cosa è <b>sotto scorta</b> (da produrre o da ordinare) o <b>da controllare questa settimana</b>. Se è pieno o già fatto, non compare.</div>';
    let any=false;SEZ.forEach(s=>{var d=s.items.filter(due);if(d.length){any=true;h+='<div class="sec"><span class="gg">'+esc(s.gg)+'</span>'+esc(s.tit)+'</div>'+d.map(rowFor).join('');}});
    if(!any)h+='<div class="empty">✓ Niente da produrre adesso.</div>';v.innerHTML=h;return;}
  SEZ.forEach(s=>{h+='<div class="sec"><span class="gg">'+esc(s.gg)+'</span>'+esc(s.tit)+'</div>';
    s.items.filter(it=>!it.fresco).forEach(it=>h+=rowFor(it));
    s.items.filter(it=>it.fresco).forEach(it=>h+=rowFresh(it));});v.innerHTML=h;}
var STOP={di:1,alla:1,al:1,del:1,della:1,la:1,il:1,lo:1,le:1,i:1,e:1,a:1,in:1,da:1,per:1,con:1,su:1,salati:1,salato:1,nero:1,nera:1};
function norm(s){return (s==null?'':String(s)).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9 ]/g,' ');}
function prodWords(nm){return norm(nm).split(' ').filter(function(w){return w&&!STOP[w]&&w.length>2;});}
function matchProduct(text){var t=norm(text);var best=null,bs=0;SEZ.forEach(function(s){s.items.forEach(function(it){if(it.fresco)return;var w=prodWords(it.n);if(!w.length)return;var hit=w.filter(function(x){return t.indexOf(x)>=0;}).length;var sc=hit/w.length;if(hit>=1&&sc>=0.6&&sc>bs){bs=sc;best=it;}});});return best;}
function findItem(pid){for(var i=0;i<SEZ.length;i++)for(var j=0;j<SEZ[i].items.length;j++)if(SEZ[i].items[j].id===pid)return SEZ[i].items[j];return null;}
async function saveChkOne(id,done){var ws=weekStart();try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'antiprodchk|'+id+'|'+ws,v:{done:done}})});}catch(e){console.error(e);}}
function renderLista(v){
  var GG=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];var d=new Date();var data=GG[d.getDay()]+' '+('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2);
  var h='<div class="sec">📅 '+data+' — produzione da fare</div>';
  h+='<div class="hint">Tu o i cuochi scrivete cosa produrre. Tocca il quadratino quando è fatto: si <b>sbarra ma resta in lista</b>, così vedi sempre cosa è stato prodotto.</div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:12px"><input id="listaIn" placeholder="Cosa produrre…" enterkeyhint="done" style="flex:1;border:1px solid var(--line);border-radius:11px;padding:12px;font-size:15px"><button onclick="addLista()" style="border:none;border-radius:11px;padding:0 16px;font-size:15px;font-weight:800;background:var(--g);color:#fff;cursor:pointer">Aggiungi</button></div>';
  if(!LISTA.length){h+='<div class="empty">Niente ancora. Scrivi cosa produrre qui sopra.</div>';}
  else{var ordered=LISTA.slice().sort(function(a,b){return (a.done?1:0)-(b.done?1:0);});
    var tdy=new Date().toISOString().slice(0,10);
    h+=ordered.map(function(x){var dn=!!x.done;var ad=(x.at||'').slice(0,10);var carr=!dn&&ad&&ad<tdy;var meta='';if(x.pnm)meta+='<span class="pill" style="background:#eef3ea;color:var(--g)">🔗 '+esc(x.pnm)+'</span>';if(carr)meta+='<span class="pill" style="background:#fdecea;color:#c0392b">↩ rimasta da '+ad.slice(8,10)+'/'+ad.slice(5,7)+'</span>';if(dn&&x.doneAt)meta+='<span class="pill done">✓ fatto '+tloc(x.doneAt)+'</span>';return '<div class="row'+(carr?' low':'')+'"><div class="chkbox'+(dn?' on':'')+'" onclick="toggleLista(\''+x.id+'\')">'+(dn?'✓':'')+'</div><div class="info"><div class="nm" style="'+(dn?'text-decoration:line-through;color:var(--muted)':'')+'">'+esc(x.t)+'</div>'+(meta?'<div class="meta">'+meta+'</div>':'')+'</div></div>';}).join('');
    if(LISTA.some(function(x){return x.done;}))h+='<button onclick="pulisciLista()" style="width:100%;margin-top:10px;border:1.5px solid var(--line);background:#fff;color:var(--muted);border-radius:11px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">🗑 Pulisci i fatti</button>';}
  v.innerHTML=h;
  var inp=document.getElementById('listaIn');if(inp)inp.addEventListener('keydown',function(e){if(e.key==='Enter')addLista();});
}
function addLista(){var el=document.getElementById('listaIn');if(!el)return;var t=(el.value||'').trim();if(!t)return;var mp=matchProduct(t);LISTA.push({id:String(Date.now())+Math.floor(Math.random()*1000),t:t,done:false,at:new Date().toISOString(),pid:(mp?mp.id:null),pnm:(mp?mp.n:null)});saveLista();render();setTimeout(function(){var i=document.getElementById('listaIn');if(i)i.focus();},50);}
function toggleLista(id){var x=LISTA.find(function(y){return y.id===id;});if(!x)return;var nd=!x.done;if(nd&&x.pid){var it=findItem(x.pid);if(it){if(it.chk){CHK[it.id]=true;saveChkOne(it.id,true);}else{var n=prompt('Quanti '+(it.u||'pz')+' di "'+it.n+'" sono venuti? (li aggiungo alla giacenza · lascia vuoto per non toccarla)','');if(n!==null&&n!==''){var nn=parseInt(n,10);if(!isNaN(nn)&&nn>0){GIAC[it.id]=getQ(it.id)+nn;saveQ(it.id,GIAC[it.id]);}}}}}x.done=nd;x.doneAt=nd?new Date().toISOString():null;saveLista();render();}
function pulisciLista(){var c=prompt('Codice chef per pulire la lista:');if(c===null)return;if(c.trim().toLowerCase()!=='capo2026'){alert('Codice errato — solo lo chef può pulire.');return;}LISTA=LISTA.filter(function(x){return !x.done;});saveLista();render();}
async function saveLista(){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'antiprodlist',v:{items:LISTA}})});}catch(e){toast('⚠️ Non salvato');console.error(e);}}
async function chg(id,d){const tot=getQ(id)+d;GIAC[id]=tot<0?0:tot;const el=document.getElementById('n_'+id);if(el)el.textContent=GIAC[id];saveQ(id,GIAC[id]);tabsBar();clearTimeout(window._rr);window._rr=setTimeout(render,450);}
function setEx(id){var cur=getQ(id);var n=prompt('Giacenza attuale:',cur);if(n===null)return;n=parseInt(n,10);if(isNaN(n)||n<0)return;GIAC[id]=n;saveQ(id,n);tabsBar();render();}
async function saveQ(id,q){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'antiprod|'+id,v:{q:q}})});}catch(e){toast('⚠️ Non salvato');console.error(e);}}
async function toggleChk(id){var ws=weekStart();var done=!isChk(id);if(done)CHK[id]=true;else delete CHK[id];render();
  try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'antiprodchk|'+id+'|'+ws,v:{done:done}})});}catch(e){toast('⚠️ Non salvato');console.error(e);}}
</script>
