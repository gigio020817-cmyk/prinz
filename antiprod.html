 }

function markProd(day,id){var name=(window.NM||{})[id]||'';var q=prompt('Quanto ne hai prodotto di "'+name+'"?\n(es. 100 pz, 2 kg, 1 sifone — lascia vuoto se non serve)','');if(q===null)return;setStat(day,id,'prod',(q||'').trim());}
function markCi(day,id){setStat(day,id,'ci','');}
function clearStat(day,id){setStat(day,id,null);}
async function saveExtra(){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'apextra|'+WK,v:{byday:EXTRA}})});}catch(e){toast('⚠️ Non salvato');}}
function addExtra(){var el2=document.getElementById('addIn');if(!el2)return;var t=(el2.value||'').trim();if(!t)return;if(!EXTRA[DAY])EXTRA[DAY]=[];EXTRA[DAY].push({id:'x'+Date.now()+Math.floor(Math.random()*1000),t:t});saveExtra();render();setTimeout(function(){var i=document.getElementById('addIn');if(i)i.focus();},40);}
function rmExtra(day,id){EXTRA[day]=(EXTRA[day]||[]).filter(function(x){return x.id!==id;});saveExtra();setStat(day,id,null);}
function statRow(day,id,name,canRemove){window.NM=window.NM||{};window.NM[id]=name;
 var v=STAT[skey(day,id)];var rec=hasRec(name)?'<button class="recbtn" onclick="showRecR(\''+id+'\')">📖</button>':'';
 if(v){var lab=(v.m==='prod')?('✓ prodotto'+(v.q?(' · <b>'+esc(v.q)+'</b>'):'')):'✓ già pronto / comprato';
  return '<div class="row rowdone"><div class="info"><div class="nm struck">'+esc(name)+'</div><div class="meta">'+lab+' · a posto per la settimana</div></div>'+rec+'<button class="xbtn" onclick="clearStat(\''+day+'\',\''+id+'\')">↩</button></div>';
 }
 return '<div class="row"><div class="info"><div class="nm">'+esc(name)+'</div></div>'+rec+'<button class="cibtn" onclick="markCi(\''+day+'\',\''+id+'\')">Ci sono</button><button class="prepbtn" onclick="markProd(\''+day+'\',\''+id+'\')">✓ Prodotto</button>'+(canRemove?'<button class="xbtn" onclick="rmExtra(\''+day+'\',\''+id+'\')">×</button>':'')+'</div>';
}
function render(){
 document.getElementById('tabs').innerHTML=['LUN','MAR','MER','GIO','VEN','SAB','DOM'].map(function(g){return '<button class="tab'+(DAY===g?' on':'')+'" onclick="setDay(\''+g+'\')">'+GGSHORT[g]+'</button>';}).join('');
 window.NM={};
 var a=ANT[DAY]||{items:[],tit:''};
 var comps=a.items.map(function(n){return {id:normName(n),n:n,extra:false};});
 var extras=(EXTRA[DAY]||[]).map(function(x){return {id:x.id,n:x.t,extra:true};});
 var all=comps.concat(extras);
 var done=all.filter(function(x){return !!STAT[skey(DAY,x.id)];}).length;
 var h='';
 h+='<div class="sec"><span class="gg">'+GGSHORT[DAY]+'</span>'+(a.tit?esc(a.tit):'Antipasto')+' <span class="cnt">'+done+'/'+all.length+'</span></div>';
 h+='<div class="hint">Segna ogni voce: <b>✓ Prodotto</b> (con quanti pezzi) oppure <b>Ci sono</b> se è già pronta o comprata. Si sbarra e resta a posto per tutta la settimana.</div>';
 h+=all.map(function(x){return statRow(DAY,x.id,x.n,x.extra);}).join('');
 h+='<div class="sec2">➕ Aggiungi una voce extra</div>';
 h+='<div class="addrow"><input id="addIn" placeholder="Altra cosa da preparare…" enterkeyhint="done"><button class="addbtn" onclick="addExtra()">Aggiungi</button></div>';
 h+='<div class="foot2">🔄 Si azzera automaticamente ogni settimana (sett. '+WK+')</div>';
 document.getElementById('view').innerHTML=h;
 var i=document.getElementById('addIn');if(i)i.addEventListener('keydown',function(e){if(e.key==='Enter')addExtra();});
}

</script>
