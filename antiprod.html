let LISTA=[],DAY='';
function todayGG(){return ['DOM','LUN','MAR','MER','GIO','VEN','SAB'][new Date().getDay()];}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function tloc(iso){try{return new Date(iso).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}catch(e){return''}}
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1600);}
function ymd(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function todayStr(){return ymd(new Date());}
function weekStart(){var d=new Date();var k=(d.getDay()+6)%7;d.setDate(d.getDate()-k);return ymd(d);}
var GGMAP={dom:0,lun:1,mar:2,mer:3,gio:4,ven:5,sab:6};
function cycleDate(it){var w=GGMAP[it.id.split('_')[0]];if(w==null)return weekStart();var d=new Date(todayStr()+'T00:00:00');var diff=(w-d.getDay()+7)%7;d.setDate(d.getDate()+diff);return ymd(d);}
function chkScope(it){return it.dayreset?cycleDate(it):weekStart();}
async function sb(path,opt){opt=opt||{};const h=Object.assign({apikey:SB_KEY,'Content-Type':'application/json'},opt.headers||{});const r=await fetch(SB_URL+'/rest/v1/'+path,Object.assign({},opt,{headers:h}));if(!r.ok)throw new Error('HTTP '+r.status);const t=await r.text();return t?JSON.parse(t):[];}
function unlock(p,fs){const err=document.getElementById('err');if(p!==APP_PW){err.textContent='Password errata';document.getElementById('pw').value='';return;}if(document.getElementById('remember').checked||fs){try{localStorage.setItem('ap_pw','1')}catch(e){}}document.getElementById('lock').style.display='none';document.getElementById('app').style.display='block';loadAll();if(!window._iv)window._iv=setInterval(loadAll,45000);}
document.getElementById('enter').onclick=()=>unlock(document.getElementById('pw').value,false);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock(e.target.value,false)});
const APP_VER='28/06 16:30';
(async function selfUpdate(){try{if(sessionStorage.getItem('apupd'))return;var r=await fetch(location.pathname+'?chk='+Date.now(),{cache:'no-store'});if(!r.ok)return;var t=await r.text();var m=t.match(/>v (\d\d\/\d\d \d\d:\d\d)</);var latest=m&&m[1];if(latest&&latest!==APP_VER){sessionStorage.setItem('apupd','1');location.replace(location.pathname+'?v='+Date.now());}}catch(e){}})();
(function(){if(window.self!==window.top){unlock(APP_PW,true);return;}try{if(localStorage.getItem('pr_av_antiprod')!=='28/06 16:30'){localStorage.removeItem('ap_pw');localStorage.setItem('pr_av_antiprod','28/06 15:30');}}catch(_e){}let s=null;try{s=localStorage.getItem('ap_pw')}catch(e){}if(s)unlock(APP_PW,true);else setTimeout(()=>document.getElementById('pw').focus(),300);})();
async function loadAll(){var st=document.getElementById('status');if(st)st.textContent='Caricamento dal cloud…';
 try{var l=await sb('kitchen_meta?k=eq.antiprodlist&select=*');LISTA=(l&&l[0]&&l[0].v&&l[0].v.items)?l[0].v.items:[];
  if(st)st.textContent='✓ Collegato · '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});render();
 }catch(e){if(st)st.textContent='⚠️ Problema di collegamento. Controlla internet e riapri.';console.error(e);}}
var GGF={LUN:'Lunedì',MAR:'Martedì',MER:'Mercoledì',GIO:'Giovedì',VEN:'Venerdì',SAB:'Sabato',DOM:'Domenica'};
function normName(s){return (s||'').replace(/\s+/g,' ').trim().toLowerCase();}
var RECIPES={
 'spuma di pistacchio':{ing:['250 ml latte','150 g panna','80 g pasta di pistacchio','30 g parmigiano','2 g sale','30 g gelatina in polvere'],steps:['Scaldare il tutto nel Bimby.','Aggiungere la gelatina in polvere.','Passare al cinese.','Caricare nel sifone.','Mantenere a 54 °C nel roner.']},
 'chips di pistacchio':{ing:['1 L acqua','200 g amido di riso','200 g zucchero','sale q.b.','granella di pistacchio (dopo la stesura)'],steps:['Mescolare a freddo acqua, sale, zucchero e amido.','Portare a calore finché diventa densa e liscia.','Stendere la cialda in placca.','Adagiare sopra la granella di pistacchio.','Essiccare a 100 °C con 0 FAST DRY finché completamente secca.']}
};
function hasRec(name){return !!RECIPES[normName(name)];}
function showRec(nm){var r=RECIPES[normName(nm)];if(!r)return;var hh='<div class="rectit">📖 '+esc(nm)+'</div><div class="rech">Ingredienti</div><ul>'+r.ing.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul><div class="rech">Procedimento</div><ol>'+r.steps.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ol><button class="recclose" onclick="closeRec()">Chiudi</button>';var m=document.getElementById('recmodal');m.innerHTML='<div class="recbox">'+hh+'</div>';m.style.display='flex';}
function closeRec(){var m=document.getElementById('recmodal');m.style.display='none';m.innerHTML='';}
function showRecSugg(i){showRec((window.SUGG||[])[i]);}
function showRecById(id){var x=LISTA.find(function(y){return y.id===id;});if(x)showRec(x.t);}
var GGSHORT={LUN:'Lun',MAR:'Mar',MER:'Mer',GIO:'Gio',VEN:'Ven',SAB:'Sab',DOM:'Dom'};
var ANT={};SEZ.forEach(function(s){ANT[s.gg]={tit:s.tit,items:s.items.map(function(x){return x.n;}).filter(function(n){return !/assembl|impiatt/i.test(n);})};});
function tomorrowGG(){var d=new Date();d.setDate(d.getDate()+1);return ['DOM','LUN','MAR','MER','GIO','VEN','SAB'][d.getDay()];}
if(!DAY)DAY=tomorrowGG();
function setDay(g){DAY=g;render();window.scrollTo(0,0);}
async function saveLista(){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'antiprodlist',v:{items:LISTA}})});}catch(e){toast('⚠️ Non salvato');console.error(e);}}
function addItem(){var el2=document.getElementById('addIn');if(!el2)return;var t=(el2.value||'').trim();if(!t)return;LISTA.push({id:'p'+Date.now()+Math.floor(Math.random()*1000),t:t,giorno:DAY,at:new Date().toISOString(),done:false});saveLista();render();setTimeout(function(){var i=document.getElementById('addIn');if(i)i.focus();},40);}
function addSugg(i){var n=(window.SUGG||[])[i];if(!n)return;LISTA.push({id:'p'+Date.now()+Math.floor(Math.random()*1000),t:n,giorno:DAY,at:new Date().toISOString(),done:false});saveLista();render();}
function prodotto(id){var x=LISTA.find(function(y){return y.id===id;});if(!x)return;
 if(!x.done){var q=prompt('Quanto ne hai prodotto di "'+x.t+'"?\n(es. 100 pz, 2 kg, 1 sifone — lascia vuoto se non serve)','');if(q===null)return;x.qty=(q||'').trim();x.done=true;x.doneAt=new Date().toISOString();}
 else{x.done=false;x.doneAt=null;x.qty='';}
 saveLista();render();}
function rmItem(id){LISTA=LISTA.filter(function(y){return y.id!==id;});saveLista();render();}
function pulisci(){var c=prompt('Codice chef per pulire i prodotti:');if(c===null)return;if(c.trim().toLowerCase()!=='capo2026'){alert('Codice errato.');return;}LISTA=LISTA.filter(function(y){return !y.done;});saveLista();render();}
function render(){
 document.getElementById('tabs').innerHTML=['LUN','MAR','MER','GIO','VEN','SAB','DOM'].map(function(g){return '<button class="tab'+(DAY===g?' on':'')+'" onclick="setDay(\''+g+'\')">'+GGSHORT[g]+'</button>';}).join('');
 var open=LISTA.filter(function(x){return !x.done;});var done=LISTA.filter(function(x){return x.done;});
 var a=ANT[DAY]||{items:[],tit:''};
 var inlist={};open.forEach(function(x){inlist[(x.t||'').toLowerCase()]=1;});
 window.SUGG=a.items.filter(function(n){return !inlist[n.toLowerCase()];});
 var h='';
 h+='<div class="sec"><span class="gg">'+GGSHORT[DAY]+'</span>'+(a.tit?esc(a.tit):'Antipasto')+'</div>';
 h+='<div class="hint">Scrivi cosa produrre per '+GGF[DAY]+'. Puoi preparare anche i giorni dopo, basta segnarlo. Quando l\'hai fatto, tocca ✓ Prodotto.</div>';
 h+='<div class="addrow"><input id="addIn" placeholder="Scrivi cosa produrre…" enterkeyhint="done"><button class="addbtn" onclick="addItem()">Aggiungi</button></div>';
 if(window.SUGG.length)h+='<div class="chips">'+window.SUGG.map(function(n,i){return '<button class="chip" onclick="addSugg('+i+')">＋ '+esc(n)+'</button>'+(hasRec(n)?'<button class="chiprec" onclick="showRecSugg('+i+')">📖</button>':'');}).join('')+'</div>';
 h+='<div class="sec2">📋 Da produrre ('+open.length+')</div>';
 h+= open.length ? open.map(function(x){return '<div class="row"><div class="info"><div class="nm">'+esc(x.t)+'</div>'+(x.giorno&&x.giorno!==DAY?'<div class="meta">per '+(GGF[x.giorno]||x.giorno)+'</div>':'')+'</div>'+(hasRec(x.t)?'<button class="recbtn" onclick="showRecById(\''+x.id+'\')">📖</button>':'')+'<button class="prepbtn" onclick="prodotto(\''+x.id+'\')">✓ Prodotto</button><button class="xbtn" onclick="rmItem(\''+x.id+'\')">×</button></div>';}).join('') : '<div class="readbox">Niente da produrre. Scrivi qui sopra o tocca i suggerimenti.</div>';
 h+='<div class="sec">✅ Prodotto / in giacenza ('+done.length+')</div>';
 h+= done.length ? (done.map(function(x){return '<div class="row rowdone"><div class="info"><div class="nm" style="text-decoration:line-through;color:var(--muted)">'+esc(x.t)+'</div><div class="meta">✓ prodotto '+tloc(x.doneAt)+(x.qty?(' · <b>'+esc(x.qty)+'</b>'):'')+(x.giorno?(' · per '+(GGF[x.giorno]||x.giorno)):'')+'</div></div>'+(hasRec(x.t)?'<button class="recbtn" onclick="showRecById(\''+x.id+'\')">📖</button>':'')+'<button class="xbtn" onclick="prodotto(\''+x.id+'\')">↩</button></div>';}).join('')+'<button class="clearbtn" onclick="pulisci()">🗑 Pulisci i prodotti</button>') : '<div class="readbox">Ancora niente prodotto.</div>';
 document.getElementById('view').innerHTML=h;
 var i=document.getElementById('addIn');if(i)i.addEventListener('keydown',function(e){if(e.key==='Enter')addItem();});
}
