<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dessert">
<meta name="theme-color" content="#111111">
<meta name="robots" content="noindex, nofollow">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<title>Prinz Rudolf · Dessert</title>
<style>
  :root{--bordeaux:#1c1c1c;--bordeaux-d:#000;--cream:#faf8f2;--paper:#fff;--ink:#1a1a1a;--muted:#8a8378;--line:#ececec;--gold:#c9a227;--yellow:#f5c518;--ok:#2e7d5b;--warn:#c0392b}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);line-height:1.45;padding-bottom:env(safe-area-inset-bottom)}
  #lock{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center}
  #lock .mark{width:64px;height:64px;border-radius:16px;border:2px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;letter-spacing:1px;margin-bottom:18px}
  #lock h1{font-size:22px;margin:0 0 4px;font-weight:600}
  #lock p{opacity:.85;font-size:13px;margin:0 0 24px;letter-spacing:.5px}
  #lock .box{width:100%;max-width:300px}
  #lock input{width:100%;border:none;border-radius:12px;padding:14px 16px;font-size:17px;text-align:center;color:var(--ink);margin-bottom:12px}
  #lock button{width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400;cursor:pointer}
  #lock .err{color:#ffd2d2;font-size:13px;height:18px;margin-top:10px}
  #lock label{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;opacity:.9;margin-top:14px;cursor:pointer}
  #lock label input{width:auto;margin:0}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 12px 0;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:10px;padding:0 4px}
  .brand .mark{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:14px;flex:none}
  .brand h1{font-size:16px;margin:0;font-weight:600}
  .brand small{display:block;font-size:10px;opacity:.8;letter-spacing:1.5px;text-transform:uppercase}
  .tabs{display:flex;gap:4px;margin-top:11px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tabs button{flex:none;border:none;background:transparent;color:#fff;opacity:.7;font-size:13.5px;font-weight:700;padding:9px 12px;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
  .tabs button.on{opacity:1;border-bottom-color:var(--gold)}
  main{max-width:820px;margin:0 auto;padding:14px}
  #status{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:center}
  .wtabs{display:flex;gap:8px;margin-bottom:12px}
  .wtabs button{flex:1;border:1.5px solid var(--gold);background:#fff;color:var(--bordeaux);border-radius:10px;padding:9px;font-size:14px;font-weight:700;cursor:pointer}
  .wtabs button.on{background:var(--gold);color:#1a1400}
  .search{width:100%;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:15px;margin-bottom:12px;font-family:inherit}
  .daylab{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:700;margin:14px 0 4px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin-bottom:11px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .card-h{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#fbf8f2}
  .card-h .t{flex:1;font-size:15.5px;font-weight:700}
  .card-h .tog{color:var(--gold);font-weight:800;font-size:18px;transition:transform .2s}
  .card.open .tog{transform:rotate(90deg)}
  .card-b{display:none;padding:6px 16px 16px}
  .card.open .card-b{display:block}
  .comp{border-bottom:1px solid var(--line);padding:10px 0}
  .comp:last-child{border-bottom:none}
  .comp h4{margin:0 0 4px;font-size:14.5px}
  .recipe{white-space:pre-wrap;font-size:13.5px;color:#333}
  .muted{color:var(--muted);font-size:13px}
  .qctrl{display:flex;align-items:center;gap:10px;flex:none}
  .qctrl button{width:34px;height:34px;border:none;border-radius:9px;font-size:20px;font-weight:800;cursor:pointer;background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400;line-height:1}
  .qctrl .qn{min-width:40px;text-align:center;font-size:19px;font-weight:800;cursor:pointer}
  .back{display:inline-flex;align-items:center;gap:6px;border:none;background:transparent;color:var(--gold);font-weight:700;font-size:14px;cursor:pointer;padding:6px 0;margin-bottom:6px}
  .dhead{margin-bottom:6px}
  .dhead .day{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:700}
  .dhead h2{font-size:19px;margin:4px 0 0;line-height:1.25}
  .hint{font-size:12px;color:var(--muted);margin-bottom:10px}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:18px}
</style>
</head>

  <div class="mark">PR</div><h1>Prinz Rudolf</h1><p>DESSERT · ACCESSO RISERVATO</p>
  <div class="box">
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" enterkeyhint="go">
    <button id="enter">Entra</button>
    <div class="err" id="err"></div>

</div>

function b64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}
async function sb(path,opts){opts=opts||{};var h={apikey:SB_KEY,'Content-Type':'application/json'};if(opts.headers)Object.assign(h,opts.headers);var r=await fetch(SB_URL+'/rest/v1/'+path,{method:opts.method||'GET',headers:h,body:opts.body});if(!r.ok)throw new Error('HTTP '+r.status);var t=await r.text();return t?JSON.parse(t):null;}
async function decrypt(password){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(password),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(ENC.salt),iterations:ENC.iters,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(ENC.iv)},key,b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(p));
}
var DATA=null, SCOUNT={}, curTab='mezza', curW=0;
const TABS=[['mezza','🍮 Mezza pensione'],['vetrina','🍰 Vetrina dolci'],['gelati','🍨 Gelati'],['torte','🥧 Torte colazioni']];
const pw=document.getElementById('pw'),err=document.getElementById('err');
async function unlock(p,fromStore){
  if(p!==APP_PW){err.textContent='Password errata';pw.value='';return;}
  try{DATA=await decrypt(p);}catch(e){err.textContent='Errore dati';return;}
  if(document.getElementById('remember').checked||fromStore){try{localStorage.setItem('pr_dspw','1')}catch(e){}}
  document.getElementById('lock').style.display='none';document.getElementById('app').style.display='block';
  buildTabs();loadCounts();render();
}
document.getElementById('enter').onclick=()=>unlock(pw.value,false);
pw.addEventListener('keydown',e=>{if(e.key==='Enter')unlock(pw.value,false)});
(function(){let s=null;try{s=localStorage.getItem('pr_dspw')}catch(e){}if(s)unlock(APP_PW,true);else setTimeout(()=>pw.focus(),300);})();
function buildTabs(){document.getElementById('tabs').innerHTML=TABS.map(t=>'<button class="'+(t[0]===curTab?'on':'')+'" onclick="setTab(\''+t[0]+'\')">'+t[1]+'</button>').join('');}
function setTab(t){curTab=t;buildTabs();render();window.scrollTo(0,0);}
async function loadCounts(){
  try{var rows=await sb('kitchen_meta?k=like.dessert|*&select=*');SCOUNT={};(rows||[]).forEach(function(r){SCOUNT[r.k]=(r.v&&typeof r.v.q==='number')?r.v.q:0;});
    document.getElementById('status').textContent='✓ Collegato';if(curTab!=='mezza')render();
  }catch(e){document.getElementById('status').textContent='⚠️ Giacenze offline (le ricette funzionano comunque)';}
}
function render(){
  var v=document.getElementById('view');
  if(curTab==='mezza'){renderMezza(v);return;}
  renderSection(v,curTab);
}
function renderMezza(v){
  var html='<div class="wtabs">'+DATA.mezza.map(function(w,i){return '<button class="'+(i===curW?'on':'')+'" onclick="setW('+i+')">'+esc(w.sett)+'</button>';}).join('')+'</div>';
  var wk=DATA.mezza[curW];
  wk.dishes.forEach(function(d,i){
    html+='<div class="daylab">'+esc(d.giorno)+'</div>';
    html+='<div class="card" id="m_'+curW+'_'+i+'"><div class="card-h" onclick="tog(this.closest(\'.card\'))"><div class="t">'+esc(d.title)+'</div><span class="tog">›</span></div><div class="card-b">'+comps(d.comps)+'</div></div>';
  });
  v.innerHTML=html;
}
function setW(i){curW=i;render();window.scrollTo(0,0);}
function fmtR(r){var t=esc(r||'');if(!t)return '';return '• '+t.split(' + ').join('\n• ');}
function comps(cs){
  if(!cs||!cs.length)return '<div class="muted">Ricetta da aggiungere.</div>';
  return cs.map(function(c){return '<div class="comp"><h4>'+esc(c.n)+'</h4>'+(c.r?'<div class="recipe">'+fmtR(c.r)+'</div>':'')+'</div>';}).join('');
}
function renderSection(v,sec){
  var items=DATA[sec]||[];
  var html='<div class="hint">Tocca il nome per la ricetta. Con − / + segni la giacenza (si salva sul cloud). Tocca il numero per impostarlo.</div>';
  items.forEach(function(it){
    var key='dessert|'+sec+'|'+it.id;var q=SCOUNT[key]||0;
    html+='<div class="card" id="c_'+sec+'_'+it.id+'">'
      +'<div class="card-h">'
        +'<div class="t" onclick="tog(this.closest(\'.card\'))">'+esc(it.nm)+'</div>'
        +'<div class="qctrl">'
          +'<button onclick="chg(event,\''+sec+'\',\''+it.id+'\',-1)">−</button>'
          +'<span class="qn" id="q_'+sec+'_'+it.id+'" onclick="setQ(\''+sec+'\',\''+it.id+'\')">'+q+'</span>'
          +'<button onclick="chg(event,\''+sec+'\',\''+it.id+'\',1)">+</button>'
        +'</div>'
        +'<span class="tog" onclick="tog(this.closest(\'.card\'))">›</span>'
      +'</div>'
      +'<div class="card-b">'+comps(it.comps)+'</div></div>';
  });
  v.innerHTML=html;
}
function tog(card){card.classList.toggle('open');}
function chg(ev,sec,id,delta){ev.stopPropagation();var key='dessert|'+sec+'|'+id;var q=Math.max(0,(SCOUNT[key]||0)+delta);SCOUNT[key]=q;var el=document.getElementById('q_'+sec+'_'+id);if(el)el.textContent=q;saveQ(key,q);}
function setQ(sec,id){var key='dessert|'+sec+'|'+id;var cur=SCOUNT[key]||0;var n=prompt('Quantità prodotta:',cur);if(n===null)return;n=parseInt(n,10);if(isNaN(n)||n<0)return;SCOUNT[key]=n;var el=document.getElementById('q_'+sec+'_'+id);if(el)el.textContent=n;saveQ(key,n);}
async function saveQ(key,q){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:key,v:{q:q}})});}catch(e){console.error(e);}}
</script>
