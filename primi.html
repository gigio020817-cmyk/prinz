<style>
  :root{--bordeaux:#1c1c1c;--bordeaux-d:#000;--cream:#faf8f2;--paper:#fff;--ink:#1a1a1a;--muted:#8a8378;--line:#ececec;--gold:#c9a227;--yellow:#f5c518;--espresso:#c0392b;--giorn:#2e7d5b;--sett:#2f6fb0;--grossa:#8a5a2b;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);line-height:1.45;padding-bottom:env(safe-area-inset-bottom)}
  #lock{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center}
  #lock .mark{width:64px;height:64px;border-radius:16px;border:2px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;letter-spacing:1px;margin-bottom:18px}
  #lock h1{font-size:22px;margin:0 0 4px;font-weight:600}
  #lock p{opacity:.85;font-size:13px;margin:0 0 24px;letter-spacing:.5px}
  #lock .box{width:100%;max-width:300px}
  #lock input{width:100%;border:none;border-radius:12px;padding:14px 16px;font-size:17px;text-align:center;color:var(--ink);margin-bottom:12px}
  #lock input:focus{outline:2px solid var(--gold)}
  #lock button{width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400;cursor:pointer}
  #lock .err{color:#ffd2d2;font-size:13px;height:18px;margin-top:10px}
  #lock label{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;opacity:.9;margin-top:14px;cursor:pointer}
  #lock label input{width:auto;margin:0}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 18px 14px;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:15px;flex:none}
  .brand h1{font-size:18px;margin:0;font-weight:600}
  .brand small{display:block;font-size:11px;opacity:.8;letter-spacing:1.5px;text-transform:uppercase}
  .tabs{display:flex;gap:8px;margin-top:14px}
  .tab{flex:1;border:1.5px solid var(--gold);background:transparent;color:var(--gold);border-radius:10px;padding:10px;font-size:14px;font-weight:700;cursor:pointer}
  .tab.active{background:var(--gold);color:#1a1400}
  .search{margin-top:10px;position:relative}
  .search input{width:100%;border:none;border-radius:12px;padding:12px 14px 12px 40px;font-size:16px;background:rgba(255,255,255,.95);color:var(--ink)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}
  main{max-width:760px;margin:0 auto;padding:16px}
  .daysec{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);border-bottom:2px solid var(--gold);padding-bottom:5px;margin:20px 0 11px}
  .daysec:first-child{margin-top:2px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:11px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);display:flex;align-items:center;gap:12px}
  .card:active{transform:scale(.99)}
  .card .info{min-width:0;flex:1}
  .card .info h3{margin:0;font-size:15px;font-weight:600;line-height:1.3}
  .card .chev{color:var(--gold);flex:none}
  #detail{display:none}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--bordeaux);font-size:16px;font-weight:600;padding:6px 0;margin-bottom:6px;cursor:pointer}
  .dhead{margin-bottom:16px}
  .dhead .day{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700}
  .dhead h2{margin:4px 0 0;font-size:22px;font-weight:700;line-height:1.25}
  .comp{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin-bottom:13px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .comp-h{padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#fbf8f2;border-bottom:1px solid transparent}
  .comp-h h4{margin:0;font-size:16px;font-weight:600;flex:1}
  .comp.open .comp-h{border-bottom-color:var(--line)}
  .comp-h .tog{color:var(--gold);transition:transform .2s;flex:none}
  .comp.open .comp-h .tog{transform:rotate(90deg)}
  .comp-body{display:none;padding:14px 15px}
  .comp.open .comp-body{display:block}
  .recipe{font-size:15px;white-space:pre-wrap}
  .badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.3px;color:#fff}
  .b-espresso{background:var(--espresso)} .b-giorn{background:var(--giorn)} .b-sett{background:var(--sett)} .b-grossa{background:var(--grossa)} .b-na{background:#9a9088}
  .kv{margin-top:10px;font-size:13px;color:var(--muted)}
  .kv b{color:var(--ink);font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:36px 16px}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:18px}
.dishphoto{display:block;max-width:100%;width:auto;height:auto;max-height:78vh;margin:14px auto 8px;border-radius:16px;box-shadow:0 6px 22px rgba(0,0,0,.20);cursor:zoom-in}#lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);display:none;align-items:center;justify-content:center;padding:16px}#lightbox img{max-width:100%;max-height:100%;border-radius:10px}
.corrbox{margin:18px 0 6px;padding:14px;border:1px dashed #c9a227;border-radius:12px;background:rgba(201,162,39,.06)}.corrlbl{font-weight:700;font-size:14px;margin-bottom:8px}.corrta{width:100%;min-height:72px;border:1px solid #e0d9c8;border-radius:9px;padding:9px;font-size:14px;font-family:inherit;box-sizing:border-box}.corrrow{display:flex;gap:9px;margin-top:9px;flex-wrap:wrap}.corrbtn{border:none;border-radius:9px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;background:#eee}.corrbtn.save{background:#2e7d5b;color:#fff}.corrbtn.exp{background:linear-gradient(135deg,#f5c518,#c9a227);color:#1a1400}.corrmodal{display:none;position:fixed;inset:0;z-index:210;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:16px}.corrmbox{background:#fff;border-radius:16px;padding:18px;max-width:520px;width:100%}.corrmbox h3{margin:0 0 4px}.corrmbox p{margin:0 0 10px;font-size:13px;color:#8a8378}.corrmbox textarea{width:100%;height:240px;border:1px solid #e0d9c8;border-radius:10px;padding:10px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace;box-sizing:border-box}.corrmrow{display:flex;gap:9px;margin-top:10px}.corrmrow .corrbtn{flex:1;padding:12px}
</style>

const FREQ={"Espressa":"b-espresso","Espresso":"b-espresso","Al momento":"b-espresso","Giornaliera":"b-giorn","Settimanale":"b-sett","Produzione grossa":"b-grossa"};
let WEEKS=[],curW=0;
let CORR={};
const SB_URL="https://hxjxbpifboufolhwawkc.supabase.co";
const SB_KEY="sb_publishable_Fxh5-b2a7Qtt-Pumw0MrMg_Hpjd2m7Y";
async function sb(path,opts){opts=opts||{};var hh={apikey:SB_KEY,'Content-Type':'application/json'};if(opts.headers)Object.assign(hh,opts.headers);var r=await fetch(SB_URL+'/rest/v1/'+path,{method:opts.method||'GET',headers:hh,body:opts.body});if(!r.ok)throw new Error('HTTP '+r.status);var t=await r.text();return t?JSON.parse(t):null;}
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function decrypt(password){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(password),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(ENC.salt),iterations:ENC.iters,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(ENC.iv)},key,b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(p));
}
const pw=document.getElementById('pw'),err=document.getElementById('err');
async function tryUnlock(password,fromStore){
  try{WEEKS=await decrypt(password);
    try{var crows=await sb('kitchen_meta?k=like.primicorr|*&select=*');CORR={};(crows||[]).forEach(function(r){CORR[r.k]=(r.v&&r.v.text)||'';});}catch(_){}
    if(document.getElementById('remember').checked||fromStore){try{localStorage.setItem('pr_pw',password)}catch(e){}}
    document.getElementById('lock').style.display='none';document.getElementById('app').style.display='block';
    renderTabs();renderList();
  }catch(e){err.textContent="Password errata";pw.value="";pw.focus();try{localStorage.removeItem('pr_pw')}catch(_){}}
}
document.getElementById('enter').onclick=()=>tryUnlock(pw.value,false);
pw.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock(pw.value,false)});
(function(){if(!window.crypto||!crypto.subtle){err.textContent="Apri l'app dal sito (https).";return;}
  let s=null;try{s=localStorage.getItem('pr_pw')}catch(e){}
  if(s){document.getElementById('remember').checked=true;tryUnlock(s,true);}else{setTimeout(()=>pw.focus(),300);}})();
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function freqBadge(fr){if(!fr)return '';return '<span class="badge '+(FREQ[fr]||'b-na')+'">'+esc(fr)+'</span>';}
function renderTabs(){
  document.getElementById('tabs').innerHTML=WEEKS.map((w,i)=>'<button class="tab'+(i===curW?' active':'')+'" onclick="setWeek('+i+')">'+esc(w.sett)+'</button>').join('');
}
function setWeek(i){curW=i;renderTabs();document.getElementById('q').value='';renderList();}
function renderList(filter){
  filter=filter||"";const list=document.getElementById('list'),detail=document.getElementById('detail');
  detail.style.display='none';list.style.display='block';document.getElementById('hTitle').textContent='Primi Piatti';
  const f=filter.trim().toLowerCase();const dishes=WEEKS[curW].dishes;
  let items=dishes.map((d,i)=>({d,i}));
  if(f)items=items.filter(({d})=>((d.title+' '+d.giorno+' '+d.comps.map(c=>c.n+' '+c.r).join(' ')).toLowerCase().includes(f)));
  if(!items.length){list.innerHTML='<div class="empty">Nessun risultato.</div>';return;}
  let html='',lastday=null;
  items.forEach(({d,i})=>{
    if(d.giorno!==lastday){html+='<div class="daysec">'+esc(d.giorno)+'</div>';lastday=d.giorno;}
    html+='<div class="card" onclick="openDish('+i+')"><div class="info"><h3>'+esc(d.title)+'</h3></div>'
      +'<svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div>';
  });
  list.innerHTML=html;
}
function openDish(i){
  const d=WEEKS[curW].dishes[i],list=document.getElementById('list'),detail=document.getElementById('detail');
  list.style.display='none';detail.style.display='block';window.scrollTo(0,0);document.getElementById('hTitle').textContent=WEEKS[curW].sett;
  detail.innerHTML='<button class="back" onclick="renderList(document.getElementById(\'q\').value)">'
    +'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg> Tutti i primi</button>'
    +'<div class="dhead"><div class="day">'+esc(d.giorno)+' &middot; '+esc(WEEKS[curW].sett)+'</div><h2>'+esc(d.title)+'</h2></div>'+(d.img?'<img class="dishphoto" src="'+d.img+'" alt="" onclick="zoomImg(this.src)">':'')
    +d.comps.map((c,j)=>'<div class="comp" id="c'+i+'-'+j+'"><div class="comp-h" onclick="toggle(\'c'+i+'-'+j+'\')"><h4>'+esc(c.n)+'</h4>'+freqBadge(c.fr)
      +'<svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div>'
      +'<div class="comp-body"><div class="recipe">'+esc(c.r)+'</div>'
      +(c.q?'<div class="kv"><b>Quantità:</b> '+esc(c.q)+'</div>':'')
      +(c.note?'<div class="kv"><b>Note:</b> '+esc(c.note)+'</div>':'')+'</div></div>').join('')+'<div class="corrbox"><div class="corrlbl">✏️ Le mie correzioni</div><textarea id="corrTa" class="corrta" placeholder="Scrivi qui cosa correggere in questa ricetta…">'+esc(getCorr(curW,i))+'</textarea><div class="corrrow"><button class="corrbtn save" onclick="saveCorr('+curW+','+i+')">Salva</button><button class="corrbtn exp" onclick="exportCorr()">📤 Esporta correzioni</button></div></div>';
}
function toggle(id){document.getElementById(id).classList.toggle('open');}
document.getElementById('q').addEventListener('input',function(){renderList(this.value)});
function zoomImg(src){var lb=document.getElementById('lightbox');lb.querySelector('img').src=src;lb.style.display='flex';}

function corrKey(w,i){return 'primicorr|'+w+'|'+i;}
function getCorr(w,i){return CORR[corrKey(w,i)]||'';}
function saveCorr(w,i){var v=document.getElementById('corrTa').value;CORR[corrKey(w,i)]=v;sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:corrKey(w,i),v:{text:v}})}).catch(function(e){console.error(e);});var b=event&&event.target;if(b){var t=b.textContent;b.textContent='✓ Salvato';setTimeout(function(){b.textContent=t;},1500);}}
function exportCorr(){var out='CORREZIONI RICETTARIO PRIMI — Prinz Rudolf\n\n';var any=false;WEEKS.forEach(function(wk,w){(wk.dishes||[]).forEach(function(d,i){var c=getCorr(w,i);if(c&&c.trim()){any=true;out+='• ['+(wk.sett||('Sett '+(w+1)))+' · '+(d.giorno||'')+'] '+d.title+'\n  → '+c.trim()+'\n\n';}});});if(!any)out+='(non hai ancora scritto correzioni)';var m=document.getElementById('corrModal');m.querySelector('textarea').value=out;m.style.display='flex';}
function copyCorr(){var t=document.getElementById('corrModal').querySelector('textarea');t.select();t.setSelectionRange(0,99999);try{navigator.clipboard.writeText(t.value);}catch(e){try{document.execCommand('copy')}catch(_){}}var b=event&&event.target;if(b){var x=b.textContent;b.textContent='✓ Copiato';setTimeout(function(){b.textContent=x;},1500);}}
</script>
