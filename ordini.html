<style>

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);line-height:1.45;padding-bottom:env(safe-area-inset-bottom)}

  header{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 14px;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:10px}

  .brand h1{font-size:17px;margin:0;font-weight:600}

  .search{margin-top:10px;position:relative}

  main{max-width:760px;margin:0 auto;padding:16px}
  .sicon{flex:none;width:46px;height:46px;border-radius:12px;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:var(--gold);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}

  .card .info{min-width:0;flex:1}

  .pend{display:inline-block;margin-left:8px;background:#c0392b;color:#fff;font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;vertical-align:middle;letter-spacing:.3px}
  #reminder{display:none;background:#fff6da;border:1px solid var(--gold);color:#5a4600;padding:13px 14px;border-radius:12px;margin-bottom:14px;font-size:14px;font-weight:700}

  .pfilter{position:relative;margin-bottom:12px}

  .prow .pname{flex:1;font-size:15px;font-weight:500;min-width:0}
  .stepper{display:flex;align-items:stretch;border:1px solid var(--line);border-radius:9px;overflow:hidden;flex:none}
  .stp{width:36px;border:none;background:#f3efe6;color:var(--gold);font-size:21px;font-weight:800;cursor:pointer;line-height:1;padding:0}
  .stp:active{background:#e7dfcf}
  .prow .qty{width:46px;border:none;border-left:1px solid var(--line);border-right:1px solid var(--line);border-radius:0;padding:9px 2px;font-size:16px;text-align:center}
  .prow .unit{border:1px solid var(--line);border-radius:9px;padding:9px 6px;font-size:14px;background:#fff;cursor:pointer;min-width:60px;color:var(--ink);font-weight:600;text-align:center}
  .prow .unit:active{background:#f3efe6}
  .prow .pdel{width:30px;height:30px;flex:none;border:1px solid var(--line);background:#fff;color:#c0392b;border-radius:8px;font-size:18px;font-weight:800;line-height:1;cursor:pointer;padding:0}
  .prow .pdel:active{background:#fdecea}
  .prow .unit.set{border-color:var(--gold);color:var(--gold)}
  .prow.filled{border-color:var(--wa);background:#f0fbf4}
  .scat{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);border-bottom:2px solid var(--gold);padding:0 0 5px;margin:18px 0 11px}
  .scat:first-child{margin-top:2px}
  .altro{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px;font-size:15px;margin-bottom:9px;font-family:inherit;min-height:54px}
  .empty{text-align:center;color:var(--muted);padding:26px 16px;font-size:14px}
  .bar{position:sticky;bottom:0;background:linear-gradient(transparent,var(--cream) 22%);padding:14px 0 6px;margin-top:6px}
  .wa{width:100%;border:none;border-radius:14px;padding:16px;font-size:17px;font-weight:700;background:var(--wa);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 3px 10px rgba(37,211,102,.35)}
  .wa:active{background:var(--wa-d)}
  .reset{width:100%;border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:12px;padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-top:9px}
  .reset:active{background:#f3efe6}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:18px}
  .exportbtn{width:100%;border:1px solid var(--line);background:#fff;color:var(--bordeaux);border-radius:14px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;margin-top:9px}
  .exportbtn:active{background:#f3efe6}
  #exp{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;align-items:center;justify-content:center;padding:18px}
  .expbox{background:#fff;border-radius:16px;padding:18px;max-width:460px;width:100%}
  .expbox h3{margin:0 0 4px;font-size:18px}
  .expbox p{margin:0 0 10px;font-size:13px;color:var(--muted)}
  .expbox textarea{width:100%;height:200px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:13px;font-family:inherit}
  .expbox .row{display:flex;gap:9px;margin-top:10px}
  .expbox button{flex:1;border:none;border-radius:10px;padding:12px;font-size:15px;font-weight:700;cursor:pointer}
  .expbox .copy{background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400}
  .expbox .close{background:#eee;color:var(--ink)}
.bollesec{margin-top:22px;border-top:1px solid var(--line);padding-top:16px}
.bolletit{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.bollabtn{width:100%;border:2px dashed var(--gold);background:none;color:var(--bordeaux);border-radius:14px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:12px}
.bollabtn:active{background:#fbf3e3}
.bollatoggle{width:100%;border:1px solid var(--line);background:#fff;color:var(--bordeaux);border-radius:12px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:left}
.bollegrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.bollacard{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff}
.bollacard img{width:100%;height:96px;object-fit:cover;display:block;cursor:pointer}
.bolladate{font-size:11px;color:var(--muted);text-align:center;padding:4px 2px;font-weight:600}
#bollamodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:80;align-items:center;justify-content:center;padding:14px;flex-direction:column}
.bollafull{max-width:100%;max-height:100%;display:flex;flex-direction:column;gap:10px}
.bollafull img{max-width:100%;max-height:78vh;object-fit:contain;border-radius:8px}
.bollabar{display:flex;gap:10px}
.bollabar button{flex:1;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
.bclose{background:#fff;color:var(--ink)}
.bdel{background:#c0392b;color:#fff}
.prezzitab{border:1px solid var(--line);border-radius:10px;overflow:hidden}
.prow2{display:flex;justify-content:space-between;gap:10px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:14px}
.prow2:last-child{border-bottom:none}
.pn{flex:1;min-width:0;color:var(--ink)}
.pp{flex:none;font-weight:700;white-space:nowrap}
.pu{color:var(--muted);font-weight:500;font-size:11px}
.pup{color:#c0392b;font-weight:800}.pdn{color:#1b7a3d;font-weight:800}.psm{color:var(--muted)}
.pumis{color:#b06a00;font-weight:600}
.pnota{font-size:12px;color:var(--muted);margin-bottom:8px;font-style:italic}
.pprice{font-size:12px;color:#1b7a3d;font-weight:700;margin-top:3px}
.ppu{color:var(--muted);font-weight:500;font-size:10px}
.pline{color:var(--ink);font-weight:800}
.totord{font-weight:600;color:var(--ink);text-align:right;padding:6px 2px 10px;font-size:15px}
.preqcard{background:#fff6da;border:1px solid #c9a227;border-radius:14px;padding:12px 14px;margin-bottom:14px}
.preqhead{font-weight:800;color:#5a4600;margin-bottom:8px;font-size:15px}
.preqrow{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid rgba(201,162,39,.3)}
.preqn{flex:1;min-width:0;font-size:14px;color:#1a1a1a}
.preqwk{color:#8a8378;font-size:12px;font-weight:600}
.preqok{flex:none;border:none;background:#25d366;color:#fff;border-radius:9px;padding:8px 11px;font-size:13px;font-weight:800;cursor:pointer}
.preqx{flex:none;border:1px solid #ccc;background:#fff;color:#999;border-radius:9px;width:34px;height:34px;font-size:18px;font-weight:800;cursor:pointer}
.preqclear{width:100%;margin-top:10px;border:1px solid #c9a227;background:#fff;color:#5a4600;border-radius:10px;padding:9px;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="lock">
  <div class="mark">PR</div><h1>Prinz Rudolf</h1><p>ORDINI FORNITORI &middot; ACCESSO RISERVATO</p>

    <div class="err" id="err"></div>

<div id="app" style="display:none">
<header>
  <div class="brand"><div class="mark">PR</div><div><small>Prinz Rudolf</small><h1>Ordini Fornitori</h1></div></div>
  <div class="search" id="searchwrap">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="q" type="search" placeholder="Cerca fornitore o prodotto&hellip;" autocomplete="off">

</header>
<main><div id="reminder"></div><div id="pastinbox"></div><div id="list"></div><div id="detail"></div></main>
<footer>Prinz Rudolf &middot; Ordini &mdash; uso interno</footer>
</div>
<div id="exp"><div class="expbox"><h3>Le tue aggiunte</h3><p>Copia questo testo e incollalo a Claude: aggiorner&agrave; app ed Excel.</p><textarea id="exptxt" readonly></textarea><div class="row"><button class="copy" onclick="copyExp()">Copia</button><button class="close" onclick="document.getElementById('exp').style.display='none'">Chiudi</button></div></div></div>
<script>
const SB_URL="https://hxjxbpifboufolhwawkc.supabase.co";
const SB_KEY="sb_publishable_Fxh5-b2a7Qtt-Pumw0MrMg_Hpjd2m7Y";
const CHEF_CODE="Capo2026";
async function sb(path,opt){opt=opt||{};var hh=Object.assign({apikey:SB_KEY,'Content-Type':'application/json'},opt.headers||{});var r=await fetch(SB_URL+'/rest/v1/'+path,Object.assign({},opt,{headers:hh}));if(!r.ok)throw new Error('HTTP '+r.status);var t=await r.text();return t?JSON.parse(t):[];}
function fornKey(name){return (name||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');}
function compress(file){return new Promise(function(res){var fr=new FileReader();fr.onload=function(){var img=new Image();img.onload=function(){var max=1500;var w=img.width,hh=img.height;if(w>max||hh>max){if(w>hh){hh=Math.round(hh*max/w);w=max;}else{w=Math.round(w*max/hh);hh=max;}}var c=document.createElement('canvas');c.width=w;c.height=hh;c.getContext('2d').drawImage(img,0,0,w,hh);res(c.toDataURL('image/jpeg',0.6));};img.src=fr.result;};fr.readAsDataURL(file);});}
var BOLLE=[]; var CURFORN='';
async function addBolla(enc,input){var f=input.files&&input.files[0];if(!f)return;var name=decodeURIComponent(enc);
 try{var data=await compress(f);var key='bolla|'+fornKey(name)+'|'+Date.now();
  await sb('kitchen_meta',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify({k:key,v:{img:data,at:new Date().toISOString(),forn:name}})});
  input.value='';var bl=document.getElementById('bollelist');if(bl&&bl.style.display!=='none'){bl.dataset.loaded='';loadBolle(name);}else{countBolle(name);}
 }catch(e){alert('Errore nel salvataggio della foto. Controlla internet e riprova.');console.error(e);}}
async function countBolle(name){CURFORN=name;var tg=document.getElementById('bollatoggle');try{var rows=await sb('kitchen_meta?k=like.bolla|'+fornKey(name)+'|*&select=k');var n=(rows||[]).length;if(tg){var bl=document.getElementById('bollelist');var open=bl&&bl.style.display!=='none';tg.innerHTML='📁 Archivio bolle ('+n+') '+(open?'▾':'▸');}}catch(e){}}
function toggleBolle(){var bl=document.getElementById('bollelist'),tg=document.getElementById('bollatoggle');if(!bl)return;
 if(bl.style.display==='none'){bl.style.display='block';if(tg)tg.innerHTML=tg.innerHTML.replace('▸','▾');if(bl.dataset.loaded!=='1'){bl.innerHTML='<div class="empty" style="padding:14px">Carico archivio…</div>';loadBolle(CURFORN);}}
 else{bl.style.display='none';if(tg)tg.innerHTML=tg.innerHTML.replace('▾','▸');}}
async function loadBolle(name){CURFORN=name;var bl=document.getElementById('bollelist');if(!bl)return;
 try{var rows=await sb('kitchen_meta?k=like.bolla|'+fornKey(name)+'|*&select=k,v');BOLLE=rows||[];
  BOLLE.sort(function(a,b){return ((b.v&&b.v.at)||'').localeCompare((a.v&&a.v.at)||'');});
  var tg=document.getElementById('bollatoggle');if(tg)tg.innerHTML='📁 Archivio bolle ('+BOLLE.length+') ▾';
  if(!BOLLE.length){bl.innerHTML='<div class="empty" style="padding:14px">Ancora nessuna bolla.</div>';bl.dataset.loaded='1';return;}
  bl.innerHTML='<div class="bollegrid">'+BOLLE.map(function(r){var d=new Date(r.v.at);var ds=('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+d.getFullYear();return '<div class="bollacard"><img src="'+r.v.img+'" onclick="viewBolla(\''+encodeURIComponent(r.k)+'\')"><div class="bolladate">'+ds+'</div></div>';}).join('')+'</div>';bl.dataset.loaded='1';
 }catch(e){bl.innerHTML='<div class="empty" style="padding:14px">Problema di collegamento. Riapri la scheda.</div>';console.error(e);}}
function viewBolla(ek){var k=decodeURIComponent(ek);var r=BOLLE.find(function(x){return x.k===k;});if(!r)return;var m=document.getElementById('bollamodal');m.innerHTML='<div class="bollafull"><img src="'+r.v.img+'"><div class="bollabar"><button class="bclose" onclick="closeBolla()">Chiudi</button><button class="bdel" onclick="delBolla(\''+ek+'\')">Elimina</button></div></div>';m.style.display='flex';}
function closeBolla(){var m=document.getElementById('bollamodal');m.style.display='none';m.innerHTML='';}
async function delBolla(ek){var k=decodeURIComponent(ek);var c=prompt('Codice chef per eliminare la bolla:');if(c===null)return;if(c.trim().toLowerCase()!==CHEF_CODE.toLowerCase()){alert('Codice errato.');return;}
 try{await sb('kitchen_meta?k=eq.'+encodeURIComponent(k),{method:'DELETE',headers:{Prefer:'return=minimal'}});}catch(e){console.error(e);}
 closeBolla();var bl=document.getElementById('bollelist');if(bl)bl.dataset.loaded='';loadBolle(CURFORN);}
async function countPrezzi(name){var tg=document.getElementById('prezzitoggle');try{var r=await sb('kitchen_meta?k=eq.listino|'+fornKey(name)+'&select=v');var v=r&&r[0]&&r[0].v;var n=v&&v.items?Object.keys(v.items).length:0;if(tg){var pl=document.getElementById('prezzilist');var open=pl&&pl.style.display!=='none';tg.innerHTML='💶 Prezzi da bolle ('+n+') '+(open?'▾':'▸');}}catch(e){}}
function togglePrezzi(){var pl=document.getElementById('prezzilist'),tg=document.getElementById('prezzitoggle');if(!pl)return;if(pl.style.display==='none'){pl.style.display='block';if(tg)tg.innerHTML=tg.innerHTML.replace('▸','▾');if(pl.dataset.loaded!=='1'){pl.innerHTML='<div class="empty" style="padding:14px">Carico prezzi…</div>';loadPrezzi(CURFORN);}}else{pl.style.display='none';if(tg)tg.innerHTML=tg.innerHTML.replace('▾','▸');}}
async function loadPrezzi(name){CURFORN=name;var pl=document.getElementById('prezzilist');if(!pl)return;try{var r=await sb('kitchen_meta?k=eq.listino|'+fornKey(name)+'&select=v');var v=r&&r[0]&&r[0].v;var items=v&&v.items?v.items:null;var tg=document.getElementById('prezzitoggle');var n=items?Object.keys(items).length:0;if(tg)tg.innerHTML='💶 Prezzi da bolle ('+n+') ▾';
 if(!items){pl.innerHTML='<div class="empty" style="padding:14px">Ancora nessun prezzo registrato. Carica le bolle e dillo allo chef.</div>';pl.dataset.loaded='1';return;}
 var arr=Object.keys(items).map(function(c){return {d:items[c].d,u:items[c].u,h:items[c].hist||[]};});
 arr.sort(function(a,b){return (a.d||'').localeCompare(b.d||'');});

async function decrypt(password){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(password),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(ENC.salt),iterations:ENC.iters,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const p=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(ENC.iv)},key,b64(ENC.ct));
  return JSON.parse(new TextDecoder().decode(p));
}

 box.innerHTML='<div class="preqcard"><div class="preqhead">📥 Richieste reparti ('+PASTREQ.length+')</div>'+html+'<button class="preqclear" onclick="clearPastAll()" style="margin-top:8px">Pulisci tutto</button></div>';}

function renderList(filter){
  filter=filter||"";const list=document.getElementById('list'),detail=document.getElementById('detail');
  detail.style.display='none';list.style.display='block';document.getElementById('searchwrap').style.display='block';var _pb=document.getElementById('pastinbox');if(_pb)_pb.style.display='';
  const f=filter.trim().toLowerCase();let sup=allSuppliers();
  if(f){sup=sup.filter(s=>(s.name+' '+productsFor(s.name).map(p=>p.n).join(' ')).toLowerCase().includes(f));}
  let html=sup.map(s=>{const np=productsFor(s.name).length;const hastel=!!telFor(s);const pend=hasDraft(s.name);
    return '<div class="card" onclick="openSup(\''+encodeURIComponent(s.name)+'\')">'
      +'<div class="sicon">'+esc(s.name.charAt(0))+'</div>'
      +'<div class="info"><h3>'+esc(s.name)+(pend?'<span class="pend">da inviare</span>':'')+'</h3><p>'+(np?np+' prodotti':'nessun prodotto')+(hastel?'':' &middot; <span class="nonum">numero mancante</span>')+'</p></div>'
      +'<svg class="chev" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div>';}).join('');
  if(!sup.length) html='<div class="empty">Nessun fornitore trovato.</div>';
  html+='<button class="addbtn" onclick="addSupplier()">&#65291; Aggiungi fornitore</button>';

  list.innerHTML=html;
}
let curSupplier=null;
function getDraft(){return jget('ord_draft','{}');}
function saveDraft(o){localStorage.setItem('ord_draft',JSON.stringify(o));}
function hasDraft(name){const d=getDraft()[name];return !!(d&&((d.items&&Object.keys(d.items).length)||(d.altro&&String(d.altro).trim())));}
function pendingCount(){const all=getDraft();return Object.keys(all).filter(k=>hasDraft(k)).length;}
let _alerted=false;
function checkReminder(){const rb=document.getElementById('reminder');if(!rb)return;const now=new Date();const mins=now.getHours()*60+now.getMinutes();const pc=pendingCount();
  if(mins>=1010){if(pc>0){rb.style.display='block';rb.textContent='⏰ Sono passate le 16:50 — hai '+pc+' fornitor'+(pc>1?'i':'e')+' con ordini ancora da inviare!';if(!_alerted){_alerted=true;alert('⏰ Ricordati di inviare gli ordini!\nSono le 16:50 passate.');}}else{rb.style.display='none';}}
  else{rb.style.display='none';_alerted=false;}}
function captureRows(){const o={};document.querySelectorAll('#prows .prow').forEach(r=>{const q=r.querySelector('.qty').value;if(q)o[r.dataset.name]={q:q,u:(r.querySelector('.unit').dataset.u||'')};});return o;}
function saveCurrentDraft(){if(!curSupplier)return;const all=getDraft();const prev=(all[curSupplier]&&all[curSupplier].items)||{};const merged=Object.assign({},prev);document.querySelectorAll('#prows .prow').forEach(r=>{delete merged[r.dataset.name];});Object.assign(merged,captureRows());const al=document.getElementById('altro');all[curSupplier]={items:merged,altro:(al?al.value:'')};saveDraft(all);}
function step(b,d){const i=b.parentNode.querySelector('.qty');let v=parseFloat(i.value)||0;v=Math.max(0,Math.round((v+d)*100)/100);i.value=v?v:'';markFilled(i);}
function markFilled(i){const r=i.closest('.prow');if(r)r.classList.toggle('filled',!!i.value&&parseFloat(i.value)!==0);saveCurrentDraft();if(typeof updateTot==='function')updateTot();}
function cycleUnit(b){const cur=b.dataset.u||'';let i=UNITS.indexOf(cur);i=(i+1)%UNITS.length;const u=UNITS[i];b.dataset.u=u;b.textContent=u||'unità';b.classList.toggle('set',!!u);saveCurrentDraft();}
function openSup(enc,pfilter){
  const name=decodeURIComponent(enc);const s=allSuppliers().find(x=>x.name===name);if(!s)return;
  curSupplier=name;
  const list=document.getElementById('list'),detail=document.getElementById('detail');
  list.style.display='none';detail.style.display='block';document.getElementById('searchwrap').style.display='none';var _pb2=document.getElementById('pastinbox');if(_pb2)_pb2.style.display='none';
  const tel=telFor(s);let prods=productsFor(name);
  const pf=(pfilter||'').trim().toLowerCase();
  let shown=pf?prods.filter(p=>p.n.toLowerCase().includes(pf)):prods;
  const opt=u=>UNITS.map(x=>'<option value="'+x+'" '+(x===(u||'')?'selected':'')+'>'+(x||'unità')+'</option>').join('');
  const rowHtml=p=>'<div class="prow" data-name="'+esc(p.n)+'">'
      +'<span class="pname">'+esc(p.n)+'</span>'
      +'<div class="stepper"><button type="button" class="stp" onclick="step(this,-1)">&minus;</button>'
      +'<input class="qty" type="number" inputmode="decimal" placeholder="0" oninput="markFilled(this)">'
      +'<button type="button" class="stp" onclick="step(this,1)">+</button></div>'
      +'<button type="button" class="unit'+(p.unit?' set':'')+'" data-u="'+esc(p.unit||'')+'" onclick="cycleUnit(this)">'+esc(p.unit||'unità')+'</button>'
      +'<button type="button" class="pdel" title="Togli prodotto" onclick="delProductBtn(this)">×</button></div>';
  let rows;
  if(!prods.length){rows='<div class="empty">Ancora nessun prodotto.<br>Aggiungilo col pulsante qui sotto.</div>';}
  else if(pf){rows=shown.length?shown.map(rowHtml).join(''):'<div class="empty">Nessun prodotto per &laquo;'+esc(pfilter)+'&raquo;.</div>';}
  else{
    const groups=[],idx={};
    prods.forEach(p=>{const c=p.cat||'';if(!(c in idx)){idx[c]=groups.length;groups.push({cat:c,items:[]});}groups[idx[c]].items.push(p);});
    rows=groups.length>1
      ? groups.map(g=>'<div class="scat">'+esc(g.cat||'Altri prodotti')+'</div>'+g.items.map(rowHtml).join('')).join('')
      : prods.map(rowHtml).join('');
  }
  const telLine = tel ? ('WhatsApp: +'+tel) : '<span class="nonum">Numero WhatsApp mancante &mdash; verr&agrave; chiesto all\'invio</span>';
  const pfBox = prods.length>8 ? '<div class="pfilter"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input type="search" placeholder="Filtra prodotti&hellip;" value="'+esc(pfilter||'')+'" oninput="filterProd(\''+enc+'\',this.value)" id="pf"></div>' : '';
  detail.innerHTML='<button class="back" onclick="renderList(document.getElementById(\'q\').value)">'
    +'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg> Tutti i fornitori</button>'
    +'<div class="dhead"><h2>'+esc(s.name)+'</h2><div class="tel">'+telLine+'</div></div>'
    +'<div class="bollesec"><div class="bolletit">📷 Bolle di consegna</div>'
    +'<input type="file" id="bollafile" accept="image/*" capture="environment" style="display:none" onchange="addBolla(\''+encodeURIComponent(name)+'\',this)">'
    +'<button class="bollabtn" onclick="document.getElementById(\'bollafile\').click()">📷 Aggiungi foto bolla</button></div>'
    +pfBox
    +'<div id="prows">'+rows+'</div>'
    +'<button class="addbtn" onclick="addProduct(\''+encodeURIComponent(name)+'\')">&#65291; Aggiungi prodotto</button>'
    +'<div style="margin-top:14px"><div style="font-size:13px;color:var(--muted);margin-bottom:6px">Altro (scrivi a mano):</div>'
    +'<textarea class="altro" id="altro" placeholder="Es. 2 cassette basilico&hellip;" oninput="saveCurrentDraft()"></textarea></div>'
    +'<div class="bar"><div id="totord" class="totord"></div><button class="wa" onclick="inviaOrdine(\''+encodeURIComponent(name)+'\')">'
    +'<svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 00-8.6 15l-1.4 5 5.1-1.3A10 10 0 1012 2zm0 2a8 8 0 11-4.1 14.9l-.3-.2-3 .8.8-2.9-.2-.3A8 8 0 0112 4z"/></svg>'
    +'Crea ordine e invia su WhatsApp</button>'
    +'<button class="reset" onclick="azzera(\''+encodeURIComponent(name)+'\')">Azzera ordine</button></div>'
    +'<div class="bollesec" style="margin-top:16px"><div class="bolletit">🗂️ Archivio &amp; prezzi bolle</div><button class="bollatoggle" id="bollatoggle" onclick="toggleBolle()">📁 Archivio bolle ▸</button><div id="bollelist" style="display:none"></div><button class="bollatoggle" id="prezzitoggle" onclick="togglePrezzi()">💶 Prezzi da bolle ▸</button><div id="prezzilist" style="display:none"></div></div>';
  // ripristina quantità salvate (bozza)
  const dr=getDraft()[name]||{items:{},altro:''};
  document.querySelectorAll('#prows .prow').forEach(r=>{const d=dr.items[r.dataset.name];if(d){r.querySelector('.qty').value=d.q;const ub=r.querySelector('.unit');ub.dataset.u=d.u||'';ub.textContent=d.u||'unità';ub.classList.toggle('set',!!d.u);r.classList.add('filled');}});
  const al0=document.getElementById('altro');if(al0)al0.value=dr.altro||'';
  countBolle(name);countPrezzi(name);loadListino(name);
}
function filterProd(enc,val){saveCurrentDraft();openSup(enc,val);const pf=document.getElementById('pf');if(pf){pf.value=val;pf.focus();}}
function addSupplier(){const name=prompt("Nome nuovo fornitore:");if(!name)return;
  let tel=prompt("Numero WhatsApp (solo cifre, es. 3491234567):")||'';let d=tel.replace(/\D/g,'');if(d&&!d.startsWith('39'))d='39'+d;
  const a=customSup();a.push({name:name.trim(),tel:d,products:[]});localStorage.setItem('ord_sup',JSON.stringify(a));renderList();}
function addProduct(enc){const name=decodeURIComponent(enc);const pn=prompt("Nome prodotto:");if(!pn)return;
  let u=prompt("Unità (lascia vuoto per sceglierla all'ordine):","")||'';const all=customProd();(all[name]=all[name]||[]).push({n:pn.trim(),unit:u.trim()});localStorage.setItem('ord_prod',JSON.stringify(all));saveCurrentDraft();openSup(enc);}
function inviaOrdine(enc){const name=decodeURIComponent(enc);const s=allSuppliers().find(x=>x.name===name);
  saveCurrentDraft();
  const dr=getDraft()[name]||{items:{},altro:''};
  let lines=[];Object.keys(dr.items).forEach(n=>{const d=dr.items[n];if(d.q&&parseFloat(d.q)!==0)lines.push('- '+n+': '+d.q+(d.u?' '+d.u:''));});
  if(dr.altro&&dr.altro.trim())lines.push('Altro: '+dr.altro.trim());
  if(!lines.length){alert("Non hai segnato niente da ordinare.");return;}
  let tel=telFor(s);
  if(!tel){let t=prompt("Numero WhatsApp di "+name+" (solo cifre):");if(!t)return;let d=t.replace(/\D/g,'');if(d&&!d.startsWith('39'))d='39'+d;const m=telMap();m[name]=d;localStorage.setItem('ord_tel',JSON.stringify(m));tel=d;}
  const today=new Date().toLocaleDateString('it-IT');
  let msg="Ordine Prinz Rudolf - "+today+"\n\n"+lines.join("\n");
  window.open("https://wa.me/"+tel+"?text="+encodeURIComponent(msg),"_blank");
  try{var _items=[];Object.keys(dr.items).forEach(function(n){var d=dr.items[n];if(d.q&&parseFloat(d.q)!==0)_items.push({n:n,q:d.q,u:d.u||''});});var _d=new Date();var _ymd=_d.getFullYear()+'-'+('0'+(_d.getMonth()+1)).slice(-2)+'-'+('0'+_d.getDate()).slice(-2);sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'ordlog|'+fornKey(name)+'|'+_ymd,v:{forn:name,date:_ymd,items:_items,altro:(dr.altro||'').trim(),at:new Date().toISOString()}})}).catch(function(){});}catch(_e){}
  const all=getDraft();delete all[name];saveDraft(all);openSup(enc);
}
function azzera(enc){if(!confirm("Vuoi davvero azzerare l'ordine?\nLe quantità inserite verranno cancellate."))return;const name=decodeURIComponent(enc);const all=getDraft();delete all[name];saveDraft(all);openSup(enc);}
function buildExport(){const sup=customSup(),prod=customProd(),tel=telMap();let out='AGGIUNTE APP ORDINI - '+new Date().toLocaleDateString('it-IT')+'\n';
  if(sup.length){out+='\nNUOVI FORNITORI:\n';sup.forEach(s=>{out+='- '+s.name+(s.tel?' (tel: '+s.tel+')':'')+'\n';});}
  const pk=Object.keys(prod).filter(k=>prod[k]&&prod[k].length);
  if(pk.length){out+='\nNUOVI PRODOTTI:\n';pk.forEach(k=>{out+='['+k+']\n';prod[k].forEach(p=>{out+='- '+p.n+(p.unit?' ('+p.unit+')':'')+'\n';});});}
  const tk=Object.keys(tel);if(tk.length){out+='\nNUMERI IMPOSTATI:\n';tk.forEach(k=>{out+='- '+k+': '+tel[k]+'\n';});}
  return (sup.length||pk.length||tk.length)?out:'';}
function exportAdds(){const t=buildExport();if(!t){alert("Non hai aggiunte da esportare.\n(Le aggiunte sono i fornitori/prodotti che inserisci a mano con i pulsanti +.)");return;}document.getElementById('exptxt').value=t;document.getElementById('exp').style.display='flex';}
function copyExp(){const ta=document.getElementById('exptxt');ta.select();ta.setSelectionRange(0,99999);try{navigator.clipboard.writeText(ta.value);}catch(e){try{document.execCommand('copy');}catch(_){}}alert("Copiato! Ora incollalo a Claude in chat.");}
