<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  :root{--bordeaux:#1c1c1c;--bordeaux-d:#000;--cream:#faf8f2;--paper:#fff;--ink:#1a1a1a;--muted:#8a8378;--line:#ececec;--gold:#c9a227;--yellow:#f5c518;--ok:#2e7d5b;--warn:#c0392b}

  #lock{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center}
  #lock .mark{width:64px;height:64px;border-radius:16px;border:2px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;letter-spacing:1px;margin-bottom:18px}
  #lock h1{font-size:22px;margin:0 0 4px;font-weight:600}
  #lock p{opacity:.85;font-size:13px;margin:0 0 24px;letter-spacing:.5px}
  #lock .box{width:100%;max-width:300px}
  #lock input{width:100%;border:none;border-radius:12px;padding:14px 16px;font-size:17px;text-align:center;color:var(--ink);margin-bottom:12px}
  #lock button{width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400;cursor:pointer}
  #lock .err{color:#ffd2d2;font-size:13px;height:18px;margin-top:10px}
  #lock label{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;opacity:.9;margin-top:14px;cursor:pointer}
  #lock label input{width:auto;margin:0}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 12px;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:14px;flex:none}
  .brand h1{font-size:16px;margin:0;font-weight:600}
  .brand small{display:block;font-size:10px;opacity:.8;letter-spacing:1.5px;text-transform:uppercase}
  .ctrl{margin-top:11px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .ctrl input[type=date]{border:none;border-radius:8px;padding:7px 10px;font-size:14px}
  .ctrl button{border:1.5px solid var(--gold);background:transparent;color:var(--gold);border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer}
  main{max-width:860px;margin:0 auto;padding:16px}
  #status{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:center}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin-bottom:13px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .card-h{padding:13px 16px;display:flex;align-items:center;gap:10px;background:#fbf8f2}
  .card-h .t{flex:1;font-size:16px;font-weight:700}
  .card-h .sub{font-size:11px;color:var(--muted);font-weight:600}
  .card-b{padding:10px 16px 14px}
  .bar{height:9px;border-radius:6px;background:#eee;overflow:hidden;margin:4px 0 10px}
  .bar>i{display:block;height:100%;background:var(--ok)}
  .row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .row:last-child{border-bottom:none}
  .muted{color:var(--muted);font-size:12px;white-space:nowrap}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;color:#fff}
  .pill.ok{background:var(--ok)} .pill.no{background:var(--warn)} .pill.mid{background:var(--gold);color:#1a1400}
  .missrow{color:var(--warn);font-weight:600}
  .it{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .it:last-child{border-bottom:none}
  .chk{width:26px;height:26px;border:2px solid var(--gold);border-radius:7px;flex:none;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#fff;background:#fff;margin-top:1px}
  .chk.on{background:var(--ok);border-color:var(--ok)}
  .lab{flex:1;font-size:14.5px}
  .sig{font-size:11px;color:var(--ok);font-weight:600;margin-top:3px;display:block}
  .ctrlbtn{border:1.5px solid var(--gold);background:#fff;color:var(--bordeaux);border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer}
  .pendrow{color:var(--muted)}
  .donerow{color:var(--ink)}
  .subh{display:flex;justify-content:space-between;align-items:center;margin:12px 0 2px;font-weight:700;font-size:14px}
  .subh:first-child{margin-top:2px}
  .card.fold .card-h{cursor:pointer}
  .card.fold .card-b{display:none}
  .card.fold.open .card-b{display:block}
  .card.fold .tog{color:var(--gold);font-weight:800;font-size:18px;transition:transform .2s;margin-left:2px}
  .card.fold.open .tog{transform:rotate(90deg)}
  #rep{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:60;align-items:center;justify-content:center;padding:18px}
  .repbox{background:#fff;border-radius:16px;padding:18px;max-width:520px;width:100%}
  .repbox h3{margin:0 0 4px} .repbox p{margin:0 0 10px;font-size:13px;color:var(--muted)}
  .repbox textarea{width:100%;height:300px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace}
  .reprow{display:flex;gap:9px;margin-top:10px}.reprow button{flex:1;border:none;border-radius:10px;padding:12px;font-weight:700;cursor:pointer}
  .reprow .copy{background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400}.reprow .close{background:#eee}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:18px}
</style>
</head>

</div>
<div id="rep"><div class="repbox"><h3>Report del giorno</h3><p>Copialo e conservalo o mandalo alla direzione.</p><textarea id="reptxt" readonly></textarea><div class="reprow"><button class="copy" onclick="copyRep()">Copia</button><button class="close" onclick="document.getElementById('rep').style.display='none'">Chiudi</button></div></div></div>
<script>

const APERTURA=["Accendere le attrezzature del mattino","Controllare le PRESENZE settimanali","Ricevere e sistemare la merce (FIFO)","Controllo mise en place e scorte","Taglieri e contenitori al loro posto","Pasto del personale fuori per le 11:30","Controllare gli avanzi e stoccarli","Stracci puliti, postazioni in ordine"];
const PULIZIA=["Piano di lavoro pulito e sanificato","Attrezzatura della partita (bilance, bimby/pacojet, sottovuoto, friggitrice, microonde)","Banco frigo: riordino, controllo date, FIFO","Coperchi puliti e in ordine","Fornelli / piastra / griglia della propria zona","Forno: parte superiore e frontale","Salamandra: passata","Abbattitore davanti: pulito","Pulizia del pass (dietro, sopra, decorazioni)","Controllo sporcizia vicino ai piatti","Cambio acqua roner (carni ogni giorno)"];

function isOff(cook,dayStr){var wd=new Date((dayStr||todayStr())+"T00:00:00").getDay();return !!(RIPOSO[cook]&&RIPOSO[cook].indexOf(wd)>=0);}

];

 "Erjola":{noResp:true,

   puliziaSett:["Lavoro interno frigo pasticceria","Pulizia scaffali pasticceria","Frighi pasticceria (dentro e fuori)","Piccoli elettrodomestici della pasticceria","Riordino e pulizia scaffali con mise en place","Planetarie piccole e suo abbattitore","Planetarie grandi: se le usi, pulire subito dopo l\'uso"]},

 "Badr":{tournant:true,pulizia:["Aiutare le partite in difficoltà","Aiutare nella pulizia delle partite","Controllo produzione pane per il servizio","Controllo scorte pane e impasti","Rifornire pane e lievitati del giorno","Pulizia zona panificazione a fine servizio"]},

};
function puliziaFor(cook){return (PEOPLE[cook]&&PEOPLE[cook].pulizia)||PULIZIA;}
function puliziaSettFor(cook){return (PEOPLE[cook]&&PEOPLE[cook].puliziaSett)||PULIZIA_SETT;}
function weekStart(ds){var d=new Date(ds+'T00:00:00');var k=(d.getDay()+6)%7;d.setDate(d.getDate()-k);return d.toISOString().slice(0,10);}

const DL={apertura:14*60,pulizia:22*60,chiusura:22*60};
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function tloc(iso){try{return new Date(iso).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}catch(e){return''}}
function todayStr(){return new Date().toISOString().slice(0,10)}
function overdue(grp,day){const t=DL[grp]||(22*60);if(day<todayStr())return true;if(day>todayStr())return false;const n=new Date();return (n.getHours()*60+n.getMinutes())>=t;}
async function sb(path,opts){opts=opts||{};var h={apikey:SB_KEY};if(opts.body)h['Content-Type']='application/json';if(opts.headers)Object.assign(h,opts.headers);const r=await fetch(SB_URL+'/rest/v1/'+path,{method:opts.method||'GET',headers:h,body:opts.body});if(!r.ok)throw new Error('HTTP '+r.status);const t=await r.text();return t?JSON.parse(t):[];}
function ctrlLine(sid){var st=(window.CTRL||{})[sid];if(st&&st.stato==='ok')return '<div class="row"><span class="donerow">✔ Controllato dallo chef'+(st.chef?(' — '+esc(st.chef)):'')+'</span><span class="muted">'+(st.at?tloc(st.at):'')+'</span></div>';if(st&&st.stato==='richiesto')return '<div class="row"><span class="missrow">⏳ controllo richiesto'+(st.by?(' da '+esc(st.by)):'')+'</span><button class="ctrlbtn" onclick="setControl(\''+sid+'\')">Segna controllato</button></div>';return '';}
async function setControl(sid){var m=(window.CTRL||{})[sid]||{};m.stato='ok';m.chef='Chef';m.at=new Date().toISOString();window.CTRL[sid]=m;try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'ctrl|'+sid,v:m})});loadAll();}catch(e){alert('Errore nel salvataggio');console.error(e);}}

const pw=document.getElementById('pw'),err=document.getElementById('err');
function unlock(p,fromStore){if(p!==APP_PW){err.textContent='Password errata';pw.value='';return;}if(document.getElementById('remember').checked||fromStore){try{localStorage.setItem('pr_dpw','1')}catch(e){}}document.getElementById('lock').style.display='none';document.getElementById('app').style.display='block';document.getElementById('datePick').value=todayStr();loadAll();setInterval(()=>{if(document.getElementById('datePick').value===todayStr())loadAll(true)},30000);}
document.getElementById('enter').onclick=()=>unlock(pw.value,false);
pw.addEventListener('keydown',e=>{if(e.key==='Enter')unlock(pw.value,false)});
(function(){let s=null;try{s=localStorage.getItem('pr_dpw')}catch(e){}if(s)unlock(APP_PW,true);else setTimeout(()=>pw.focus(),300);})();
function goToday(){document.getElementById('datePick').value=todayStr();loadAll();}
function shiftDay(n){var d=new Date(document.getElementById('datePick').value+'T00:00:00');d.setDate(d.getDate()+n);document.getElementById('datePick').value=d.toISOString().slice(0,10);loadAll();}
window.FOLD=window.FOLD||{};
function toggleFold(id){window.FOLD[id]=!window.FOLD[id];var e=document.getElementById('fold'+id);if(e)e.classList.toggle('open',window.FOLD[id]);}

async function loadAll(silent){
  const day=document.getElementById('datePick').value;
  if(!silent)document.getElementById('status').textContent='Caricamento…';
  try{
    const[ck,ckw,ent,meta,presa,ctrl,note,timb,pane]=await Promise.all([
      sb('kitchen_checks?day=eq.'+day+'&select=*&order=at'),
      sb('kitchen_checks?day=eq.'+weekStart(day)+'&grp=like.pulizias%23*&select=*&order=at'),
      sb('kitchen_entries?day=eq.'+day+'&select=*&order=at'),
      sb('kitchen_meta?k=eq.responsabile&select=*'),
      sb('kitchen_presa?select=*&order=cook'),
      sb('kitchen_meta?k=like.ctrl|*&select=*'),
      sb('kitchen_meta?k=eq.notechef|'+day+'&select=*'),
      sb('kitchen_meta?k=like.timbra|'+day+'*&select=*'),
      sb('kitchen_meta?k=like.pane|*&select=*')
    ]);
    window.CTRL={};(ctrl||[]).forEach(r=>{window.CTRL[r.k.slice(5)]=r.v;});
    window.NOTE=(note&&note[0]&&note[0].v)?(note[0].v.text||''):'';
    window.NOTE_AT=(note&&note[0]&&note[0].v)?(note[0].v.at||null):null;
    window.TIMB={};(timb||[]).forEach(function(r){var p=r.k.split('|');window.TIMB[p[2]]=r.v;});
    window.PANESC={};(pane||[]).forEach(function(r){var id=r.k.slice(5);window.PANESC[id]=(r.v&&typeof r.v.scorta==='number')?r.v.scorta:0;});
    render(day,ck,ckw,ent,(meta&&meta[0])?meta[0].v:null,presa);
    renderNote();
    document.getElementById('status').textContent='✓ Aggiornato alle '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  }catch(e){document.getElementById('status').textContent='⚠️ Problema di collegamento.';console.error(e);}
}
function shared(grp,ck,day,resp){
  const items=ITEMS[grp];const dmap={};ck.filter(r=>r.grp===grp).forEach(r=>dmap[r.idx]=r);
  const done=Object.keys(dmap).length;const tot=items.length;const ov=overdue(grp,day);const p=Math.round(done/tot*100);
  let rows=items.map((it,i)=>{const r=dmap[i];
    if(r)return '<div class="row"><span class="donerow">✓ '+esc(it)+' <span class="muted">— '+esc(r.cook)+'</span></span><span class="muted">'+tloc(r.at)+'</span></div>';
    if(ov)return '<div class="row"><span class="missrow">✗ '+esc(it)+'</span><span class="muted">NON SVOLTO</span></div>';
    return '<div class="row"><span class="pendrow">◦ '+esc(it)+'</span><span class="muted">in attesa</span></div>';}).join('');
  const pill=done===tot?'ok':(ov?'no':'mid');
  const sub=resp?('Responsabile: '+esc(resp)):'';
  return '<div class="card"><div class="card-h"><div class="t">'+LABEL[grp]+'<div class="sub">'+sub+'</div></div><span class="pill '+pill+'">'+done+'/'+tot+'</span></div><div class="card-b"><div class="bar"><i style="width:'+p+'%"></i></div>'+rows+ctrlLine(grp+'@'+day)+'</div></div>';
}
function puliziaCard(ck,day){

  const byCook={};ck.filter(r=>r.grp.indexOf('pulizia#')===0).forEach(r=>{const c=r.grp.slice(8);(byCook[c]=byCook[c]||{})[r.idx]=r;});
  const cooks=[];CAPI.forEach(c=>cooks.push(c));Object.keys(byCook).forEach(c=>{if(cooks.indexOf(c)<0)cooks.push(c);});
  let body='';let totMiss=0;let anyReq=false;

  var wcooks=activeCAPI;
  var bw={};(D.ckw||[]).forEach(function(r){var cc=r.grp.slice(9);(bw[cc]=bw[cc]||{})[r.idx]=r;});
  var wDone=0,wMiss=[];wcooks.forEach(function(c){var items=puliziaSettFor(c)||[];var m=bw[c]||{};var dn=Object.keys(m).length;if(dn>=items.length){wDone++;}else{var miss=[];items.forEach(function(it,i){if(!m[i])miss.push(it);});wMiss.push(c+': '+miss.join('; '));}});
  var apMiss=[];APERTURA.forEach(function(it,i){if(!ap[i])apMiss.push(it);});
  var chMiss=[];CHIUSURA.forEach(function(it,i){if(!ch[i])chMiss.push(it);});
  var sc=D.ent.filter(function(e){return e.type==='scheda';}).length;
  var ps=D.ent.filter(function(e){return e.type==='passaggio';});
  var signed={};(D.presa||[]).forEach(function(p){signed[p.cook]=1;});
  var presaMiss=TEAM.filter(function(x){return !signed[x[0]];}).map(function(x){return x[0];});
  var hasNote=!!(window.NOTE&&window.NOTE.trim());
  var GG=['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  var data=GG[new Date(D.day+'T00:00:00').getDay()]+' '+dd;
  var schede=D.ent.filter(function(e){return e.type==='scheda';});
  var o='REPORT CUCINA · PRINZ RUDOLF\n'+data+'  ·  Resp.: '+resp+'\n';
  var fatto=[];
  if(apD>=APERTURA.length) fatto.push('Apertura completata');
  if(capDone>0) fatto.push('Pulizia partite ok: '+capDone+'/'+activeCAPI.length+' cuochi');
  if(wDone>0) fatto.push('Pulizia settimanale ok: '+wDone+'/'+wcooks.length);
  if(chD>=CHIUSURA.length) fatto.push('Chiusura completata');
  if(!presaMiss.length) fatto.push('Mansionario firmato da tutti');
  o+='\n✅ FATTO\n'+(fatto.length?fatto.map(function(x){return '• '+x+'\n';}).join(''):'• —\n');
  var ds='';
  if(apMiss.length) ds+='• Apertura ('+resp+'): '+apMiss.join('; ')+'\n';
  capMiss.forEach(function(x){ds+='• '+x+'\n';});
  wMiss.forEach(function(x){ds+='• Settimanale '+x+'\n';});
  if(chMiss.length) ds+='• Chiusura: '+chMiss.join('; ')+'\n';
  if(presaMiss.length) ds+='• Manca firma mansionario: '+presaMiss.join(', ')+'\n';
  o+='\n❌ DA SISTEMARE — chi manca cosa\n'+(ds||'• Niente, tutto a posto 👍\n');
  var prod='';
  schede.forEach(function(e){prod+='• '+(e.data.cosa||'')+(e.data.entro?(' (entro '+e.data.entro+')'):'')+' — '+e.cook+'\n';});
  var SC=window.PANESC||{};var dueP=PANE.filter(function(p){return p.soglia!=null&&(SC[p.id]||0)<=p.soglia;});
  if(dueP.length) prod+='• Pane da produrre: '+dueP.map(function(p){return p.nm+' ('+(SC[p.id]||0)+' '+p.unit+')';}).join(', ')+'\n';
  if(prod) o+='\n🍞 PRODUZIONE / LAVORO SVOLTO\n'+prod;
  if(ps.length){o+='\n🔁 PASSAGGI DI CONSEGNE\n';ps.forEach(function(p){o+='• '+(p.data.partita||'?')+': '+(p.data.da||'?')+' → '+(p.data.a||'?')+(p.data.manca?(' | manca: '+p.data.manca):'')+'\n';});}
  var arr=[];TEAM.forEach(function(x){var c=x[0];var tt=(window.TIMB||{})[c];if(tt&&tt.in)arr.push(c+' '+tloc(tt.in));});
  if(arr.length)o+='\n🕐 ARRIVI\n'+arr.join(' · ')+'\n';
  if(hasNote)o+='\n📝 LE MIE NOTE\n'+window.NOTE.trim()+'\n';
  return o;
}
function exportReport(){document.getElementById('reptxt').value=buildReport();document.getElementById('rep').style.display='flex';}
function copyRep(){const t=document.getElementById('reptxt');t.select();t.setSelectionRange(0,99999);try{navigator.clipboard.writeText(t.value);}catch(e){try{document.execCommand('copy')}catch(_){}}alert('Report copiato!');}
</script>
