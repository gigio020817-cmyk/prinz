  #lock .box{width:100%;max-width:320px}

  #status{font-size:12px;color:var(--muted);margin-bottom:10px;text-align:center;font-weight:600}

  .sec::after{content:"";flex:1;height:3px;border-radius:3px;background:var(--amber)}
  .row{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin-bottom:9px;padding:11px 13px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 3px rgba(0,0,0,.04)}

  .row .info{flex:1;min-width:0}
  .row .nm{font-size:15px;font-weight:700;line-height:1.2}
  .row .meta{font-size:11.5px;color:var(--muted);margin-top:2px}
  .row .meta b{color:var(--warn)}

  .stepper button{width:42px;height:42px;border:none;border-radius:50%;font-size:24px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .stepper .minus{background:#fff;color:var(--warn);border:2px solid var(--warn)}
  .stepper .plus{background:var(--teal);color:#fff}
  .stepper button:active{transform:scale(.9)}
  .stepper .val{min-width:38px;text-align:center}
  .stepper .val .n{font-size:22px;font-weight:900;line-height:1}
  .stepper .val small{font-size:10px;color:var(--muted);font-weight:700;display:block}

  .badge.ord{background:var(--warn);color:#fff}

  .mov{background:var(--paper);border:1px solid var(--line);border-radius:11px;margin-bottom:7px;padding:9px 12px;font-size:13px;display:flex;justify-content:space-between;gap:10px}

    const g=await sb('kitchen_meta?k=like.mag|*&select=*');
    GIAC={};(g||[]).forEach(r=>{GIAC[r.k.slice(4)]=(r.v&&typeof r.v.q==='number')?r.v.q:0;});
    const m=await sb('kitchen_entries?type=eq.mag&select=*&order=at.desc&limit=100');
    MOV=m||[];
    document.getElementById('status').textContent='✓ Collegato · '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){document.getElementById('status').textContent='⚠️ Problema di collegamento. Controlla internet e riapri.';console.error(e);}
}
function getQ(id){return GIAC[id]||0;}
function low(p){return p.min>0 && getQ(p.id)<=p.min;}

function whoBar(){
  let o='<option value="">— scegli il tuo nome —</option>'+TEAM.map(t=>'<option '+(t===getCook()?'selected':'')+'>'+t+'</option>').join('');
  document.getElementById('whoBar').innerHTML='Sei: <select onchange="setCook(this.value)">'+o+'</select>';
}
function tabsBar(){
  const due=PROD.filter(low).length;
  const T=[['ordina','▶ Da ordinare'+(due?' ('+due+')':'')],['tutto','Tutto'],['mov','Movimenti']];
  document.getElementById('tabs').innerHTML=T.map(t=>'<button class="tab'+(FILT===t[0]?' on':'')+'" onclick="setFilt(\''+t[0]+'\')">'+esc(t[1])+'</button>').join('');
}
function setFilt(f){FILT=f;render();window.scrollTo(0,0);}

function stepper(p){
  return '<div class="stepper"><button class="minus" onclick="chg(\''+p.id+'\',-1)">&minus;</button>'
    +'<div class="val"><span class="n" id="n_'+p.id+'" onclick="setExact(\''+p.id+'\')">'+getQ(p.id)+'</span><small>'+esc(p.u||'')+'</small></div>'
    +'<button class="plus" onclick="chg(\''+p.id+'\',1)">+</button></div>';
}
function prodRow(p,showRep){
  const lo=low(p);
  return '<div class="row'+(lo?' low':'')+'"><div class="info"><div class="nm">'+esc(p.nm)+'</div>'
    +'<div class="meta">'+(p.u?esc(p.u)+' · ':'')+esc(p.forn||'')+(p.min>0?' · min '+p.min:'')+(lo?' · <b>DA ORDINARE'+(p.ord>0?' '+p.ord+' '+esc(p.u||''):'')+'</b>':'')+'</div></div>'
    +stepper(p)+'</div>';
}
function render(){
  tabsBar();
  const v=document.getElementById('view');
  if(FILT==='mov'){renderMov(v);return;}
  if(FILT==='ordina'){
    const due=PROD.filter(low);
    if(!due.length){v.innerHTML='<div class="empty">✓ Niente sotto scorta.<br><span style="font-size:12px">(Imposta le scorte minime per attivare gli avvisi.)</span></div>';return;}
    const byF={};due.forEach(p=>{(byF[p.forn||'—']=byF[p.forn||'—']||[]).push(p);});
    let h='';Object.keys(byF).sort().forEach(f=>{
      const list=byF[f];
      h+='<div class="fornblock"><h3>'+esc(f)+' <button class="copybtn" onclick="copyOrd(\''+encodeURIComponent(f)+'\')">Copia ordine</button></h3>'
        +list.map(p=>prodRow(p,false)).join('')+'</div>';
    });
    v.innerHTML=h;return;
  }
  // tutto, per reparto
  let h='';
  REPARTI.forEach(rep=>{
    const list=PROD.filter(p=>p.rep===rep);
    if(!list.length)return;
    h+='<div class="sec">'+esc(rep)+'</div>'+list.map(p=>prodRow(p,false)).join('');
  });
  v.innerHTML=h;
}
function renderMov(v){
  if(!MOV.length){v.innerHTML='<div class="empty">Nessun movimento ancora.</div>';return;}
  v.innerHTML=MOV.map(m=>{const d=m.data||{};const out=d.seg==='-';
    return '<div class="mov"><span><span class="seg '+(out?'out':'in')+'">'+(out?'− prelievo':'+ carico')+'</span> '+esc(d.nm||'')+' <b>'+(d.q||1)+' '+esc(d.u||'')+'</b> · '+esc(m.cook||'?')+'</span><span class="when">'+tloc(m.at)+'</span></div>';
  }).join('');
}
async function chg(id,delta){
  const cook=getCook();if(!cook){toast('Prima scegli il tuo nome in alto');return;}
  const p=PROD.find(x=>x.id===id);if(!p)return;
  let q=getQ(id)+delta;if(q<0)q=0;GIAC[id]=q;
  const el=document.getElementById('n_'+id);if(el)el.textContent=q;
  const seg=delta<0?'-':'+';
  saveQ(id,q);logMov(p,1,seg,cook);
  tabsBar();
  if(FILT==='ordina'&&!low(p)){setTimeout(render,250);}
  if(FILT==='ordina'&&low(p)){/* resta */}
}
function setExact(id){
  const cook=getCook();if(!cook){toast('Prima scegli il tuo nome in alto');return;}
  const p=PROD.find(x=>x.id===id);if(!p)return;
  const cur=getQ(id);const n=prompt('Giacenza attuale di '+p.nm+':',cur);if(n===null)return;
  let v=parseInt(n,10);if(isNaN(v)||v<0)return;GIAC[id]=v;
  const el=document.getElementById('n_'+id);if(el)el.textContent=v;
  saveQ(id,v);logMov(p,v,'=',cook);tabsBar();render();
}
async function saveQ(id,q){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'mag|'+id,v:{q:q}})});}catch(e){toast('⚠️ Non salvato');console.error(e);}}
async function logMov(p,q,seg,cook){
  const row={day:today,type:'mag',cook:cook,data:{id:p.id,nm:p.nm,q:q,seg:seg,u:p.u||''}};
  MOV.unshift(Object.assign({at:new Date().toISOString()},row));
  try{await sb('kitchen_entries',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify(row)});}catch(e){console.error(e);}
}
function copyOrd(fenc){
  const f=decodeURIComponent(fenc);
  const list=PROD.filter(p=>low(p)&&(p.forn||'—')===f);
  let out='ORDINE — '+f+'\n';
  list.forEach(p=>{out+='• '+p.nm+(p.ord>0?(' — '+p.ord+' '+(p.u||'')):'')+'\n';});
  const ta=document.createElement('textarea');ta.value=out;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();ta.setSelectionRange(0,99999);
  try{navigator.clipboard.writeText(out);}catch(e){}try{document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);toast('Ordine copiato ✓');
}
</script>
