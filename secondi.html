<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Secondi">
<meta name="theme-color" content="#111111">
<meta name="robots" content="noindex, nofollow">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<title>Prinz Rudolf &middot; Secondi</title>
<style>
  :root{--bordeaux:#1c1c1c;--bordeaux-d:#000;--cream:#faf8f2;--paper:#fff;--ink:#1a1a1a;--muted:#8a8378;--line:#ececec;--gold:#c9a227;--yellow:#f5c518;--espresso:#c0392b;--giorn:#2e7d5b;--sett:#2f6fb0;--grossa:#8a5a2b;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--cream);color:var(--ink);line-height:1.45;padding-bottom:env(safe-area-inset-bottom);}
  #lock{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center}
  #lock .mark{width:64px;height:64px;border-radius:16px;border:2px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;letter-spacing:1px;margin-bottom:18px}
  #lock h1{font-size:22px;margin:0 0 4px;font-weight:600}
  #lock p{opacity:.85;font-size:13px;margin:0 0 24px;letter-spacing:.5px}
  #lock .box{width:100%;max-width:300px}
  #lock input{width:100%;border:none;border-radius:12px;padding:14px 16px;font-size:17px;text-align:center;color:var(--ink);margin-bottom:12px}
  #lock input:focus{outline:2px solid var(--gold)}
  #lock button{width:100%;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400;cursor:pointer}
  #lock button:active{opacity:.85}
  #lock .err{color:#ffd2d2;font-size:13px;height:18px;margin-top:10px}
  #lock label{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;opacity:.9;margin-top:14px;cursor:pointer}
  #lock label input{width:auto;margin:0}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px;box-shadow:0 2px 14px rgba(0,0,0,.18)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{width:34px;height:34px;border-radius:8px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--gold);font-size:15px;letter-spacing:.5px;flex:none}
  .brand h1{font-size:18px;margin:0;font-weight:600;letter-spacing:.3px}
  .brand small{display:block;font-size:11px;opacity:.8;font-weight:400;letter-spacing:1.5px;text-transform:uppercase}
  .search{margin-top:14px;position:relative}
  .search input{width:100%;border:none;border-radius:12px;padding:13px 14px 13px 40px;font-size:16px;background:rgba(255,255,255,.95);color:var(--ink)}
  .search input:focus{outline:2px solid var(--gold)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}
  main{max-width:760px;margin:0 auto;padding:16px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 16px;margin-bottom:12px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:transform .08s;display:flex;align-items:center;gap:14px}
  .card:active{transform:scale(.99)}
  .daychip{flex:none;width:54px;height:54px;border-radius:12px;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d));color:var(--gold);border:1px solid var(--gold);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .daychip b{font-size:18px;line-height:1}
  .card .info{min-width:0}
  .card .info h3{margin:0 0 3px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:6px}
  .card .info p{margin:0;font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .cam{font-size:12px}
  .card .chev{margin-left:auto;color:var(--gold);flex:none}
  #detail{display:none}
  .back{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--bordeaux);font-size:16px;font-weight:600;padding:6px 0;margin-bottom:6px;cursor:pointer}
  .dhead{margin-bottom:16px}
  .dhead .day{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-weight:700}
  .dhead h2{margin:4px 0 0;font-size:23px;font-weight:700;line-height:1.25}
  .dishphoto{width:100%;border-radius:14px;margin-bottom:16px;display:block;box-shadow:0 2px 10px rgba(0,0,0,.15);cursor:zoom-in}
  .comp{background:var(--paper);border:1px solid var(--line);border-radius:14px;margin-bottom:13px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .comp-h{padding:13px 15px;display:flex;align-items:center;gap:10px;cursor:pointer;background:#fbf8f2;border-bottom:1px solid transparent}
  .comp-h h4{margin:0;font-size:16px;font-weight:600;flex:1}
  .comp.open .comp-h{border-bottom-color:var(--line)}
  .comp-h .tog{color:var(--gold);transition:transform .2s;flex:none}
  .comp.open .comp-h .tog{transform:rotate(90deg)}
  .comp-body{display:none;padding:14px 15px}
  .comp.open .comp-body{display:block}
  .recipe{font-size:15px;white-space:pre-wrap}
  .badge{font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.3px;color:#fff}
  .b-espresso{background:var(--espresso)} .b-giorn{background:var(--giorn)} .b-sett{background:var(--sett)} .b-grossa{background:var(--grossa)} .b-na{background:#9a9088}
.b-compra{background:#b9831a}
.b-scorta{background:#5a6f7d}
  .kv{margin-top:10px;font-size:13px;color:var(--muted)}
  .kv b{color:var(--ink);font-weight:600}
  .empty{text-align:center;color:var(--muted);padding:40px 20px}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:20px}
  #viewer{position:fixed;inset:0;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}
  #viewer img{max-width:100%;max-height:100%;border-radius:8px}
  .corrbox{margin-top:14px;background:#f3f7f4;border:1px dashed #2e7d5b;border-radius:12px;padding:10px;text-transform:none}
  .corrlbl{font-size:12px;font-weight:800;color:#2e7d5b;margin-bottom:6px}
  .corrta{width:100%;border:1px solid #cfe0d6;border-radius:8px;padding:9px;font-size:14px;font-family:inherit;min-height:54px;box-sizing:border-box}
  .corrrow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .corrbtn{border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;background:#eee;color:#333}
  .corrbtn.save{background:#2e7d5b;color:#fff}.corrbtn.exp{background:#c0392b;color:#fff}
  .corrmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;padding:16px}
  .corrmbox{background:#fff;border-radius:14px;padding:16px;max-width:520px;width:100%}
  .corrmbox h3{margin:0 0 4px}.corrmbox p{margin:0 0 8px;font-size:13px;color:#777}
  .corrmbox textarea{width:100%;height:280px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace;box-sizing:border-box}
  .corrmrow{display:flex;gap:8px;margin-top:10px}.corrmrow button{flex:1}

  /* ===== Controllo Carne ===== */
  #sectabs{display:flex;gap:6px;padding:10px 12px 12px;background:linear-gradient(160deg,var(--bordeaux),var(--bordeaux-d))}
  #sectabs .sectab{flex:1;border:none;background:rgba(255,255,255,.14);color:#fff;border-radius:30px;padding:9px 4px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap}
  #sectabs .sectab.on{background:linear-gradient(135deg,var(--yellow),var(--gold));color:#1a1400}
  #meatview{max-width:760px;margin:0 auto;padding:14px}
  .mchint{background:#fbf3da;border:1px solid #e7d49a;border-radius:11px;padding:10px 12px;font-size:12.5px;color:#7a5d00;margin-bottom:12px}
  .mccat{font-size:14px;font-weight:800;color:var(--bordeaux);margin:16px 4px 8px;border-bottom:3px solid var(--gold);padding-bottom:4px}
  .mcrow{background:var(--paper);border:1px solid var(--line);border-radius:13px;margin-bottom:9px;padding:11px 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .mcrow.low{border-color:#c0392b;border-width:2px;background:#fff8f7}
  .mcinfo{flex:1;min-width:150px}
  .mcnm{font-size:14.5px;font-weight:700;line-height:1.2}
  .mcmeta{font-size:11.5px;color:var(--muted);margin-top:5px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .mcmin{color:var(--gold);font-weight:700;cursor:pointer;text-decoration:underline}
  .mcpill{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:20px;background:#c0392b;color:#fff;margin-left:4px}
  .mcstep{display:flex;align-items:center;gap:8px;flex:none}
  .mcstep button{width:40px;height:40px;border:none;border-radius:50%;font-size:24px;font-weight:900;cursor:pointer;line-height:1}
  .mcminus{background:#fff;color:#c0392b;border:2px solid #c0392b}
  .mcplus{background:var(--bordeaux);color:#fff}
  .mcstep button:active{transform:scale(.9)}
  .mcval{min-width:48px;text-align:center;cursor:pointer}
  .mcval .mcn{font-size:21px;font-weight:900;display:block;line-height:1}
  .mcval small{font-size:10px;color:var(--muted);font-weight:700}
  .mcprod{border:none;background:var(--bordeaux);color:#fff;border-radius:10px;padding:10px 12px;font-size:13px;font-weight:800;cursor:pointer;white-space:nowrap}
  .mcprod:active{transform:scale(.97)}

  .dayhdr{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);margin:18px 4px 8px;border-bottom:2px solid rgba(0,0,0,.08);padding-bottom:5px}

/* --- Ordini (lista spesa) --- */
#ordfab{position:fixed;right:16px;bottom:16px;z-index:60;background:linear-gradient(135deg,#c9a227,#a8841a);color:#1a1400;border:none;border-radius:28px;padding:14px 20px;font-size:16px;font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,.3);cursor:pointer}
#ordov{position:fixed;inset:0;z-index:120;background:#faf7f0;display:none;flex-direction:column}
.ordtop{display:flex;align-items:center;gap:12px;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;background:linear-gradient(160deg,#6a1f2b,#4a1720);color:#fff}
.ordtop h2{font-size:17px;margin:0;flex:1;font-weight:700}
.ordclose{background:rgba(255,255,255,.16);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:14px;font-weight:700;cursor:pointer}
.ordwrap{max-width:760px;margin:0 auto;padding:14px 16px 90px}
.ordintro{font-size:13px;color:#7a6f5c;margin:6px 0}
.ordcat{width:100%;text-align:left;background:#fff;border:1px solid #e6ddc8;border-radius:12px;padding:12px 14px;margin:8px 0 0;font-size:15px;font-weight:700;color:#5b3a2e;cursor:pointer;display:flex;align-items:center;gap:8px}
.ordcat .catn{margin-left:auto;background:#efe7d3;border-radius:20px;padding:2px 9px;font-size:12px;font-weight:700}
.ordcatbox{padding:2px 0 4px}
.ordrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid #f0ead9}
.ordrow.on{background:#fbf3d6}
.ordrow .ordnm{flex:1;font-size:14px}
.ostep{display:flex;align-items:center;gap:8px}
.ostep button{width:30px;height:30px;border-radius:8px;border:1px solid #d8cba8;background:#fff;font-size:18px;font-weight:700;cursor:pointer;line-height:1}
.ostep span{min-width:22px;text-align:center;font-weight:700}
.ounit{border:1px solid #d8cba8;background:#fff;border-radius:8px;padding:5px 8px;font-size:12px;font-weight:700;cursor:pointer;min-width:46px}
.ordnote{width:100%;min-height:60px;border:1px solid #e0d9c8;border-radius:9px;padding:10px;margin-top:8px;font-size:14px;box-sizing:border-box}
.ordsend{display:block;width:100%;margin:16px 0 0;background:#25D366;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer}

.ordsec{font-size:15px;font-weight:800;letter-spacing:.5px;color:#6a1f2b;margin:18px 0 4px;padding-bottom:5px;border-bottom:2px solid #d8b23a}
</style>
</head>
<body>
<div id="lock">
  <div class="mark">PR</div>
  <h1>Prinz Rudolf</h1>
  <p>RICETTARIO CUCINA &middot; ACCESSO RISERVATO</p>
  <div class="box">
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" enterkeyhint="go">
    <button id="enter">Entra</button>
    <div class="err" id="err"></div>
    <label><input type="checkbox" id="remember"> Ricorda su questo dispositivo</label>
  </div>
</div>
<div id="app" style="display:none">
<header>
  <div class="brand"><div class="mark">PR</div><div><small>Prinz Rudolf &middot; Cucina</small><h1 id="hTitle">Secondi 2026</h1></div></div>

  </div>
</header>
<div id="sectabs"><button id="tabW1" class="sectab on" onclick="showSecView('w1')">Sett. 1</button><button id="tabW2" class="sectab" onclick="showSecView('w2')">Sett. 2</button><button id="tabVeg" class="sectab" onclick="showSecView('veg')">🌱 Veggie</button><button id="tabCarne" class="sectab" onclick="showSecView('carne')">🥩 Carne</button></div>
<main><div id="list"></div><div id="detail"></div></main>
<div id="meatview" style="display:none"></div>
<footer>Prinz Rudolf &middot; Ricettario Secondi — uso interno cucina</footer>
<button id="ordfab" onclick="openOrd()">🛒 Ordini</button>
<div id="ordov"><div class="ordtop"><h2>🛒 Lista della spesa — Secondi</h2><button class="ordclose" onclick="closeOrd()">✕ Chiudi</button></div><div id="ordbody" style="flex:1;overflow:auto;-webkit-overflow-scrolling:touch"></div></div>
</div>
<div id="viewer" onclick="this.style.display='none'"><img id="vimg" src=""></div>

  CATEG.order.forEach(function(cat){var inCat=items.filter(function(p){return CATEG.p2c[p]===cat;});if(!inCat.length)return;
   h+='<button class="ordcat" onclick="ordToggleCat(this)"><span class="catar">\u25b8</span> '+_esc(cat)+' <span class="catn">'+inCat.length+'</span></button>';
   h+='<div class="ordcatbox" style="display:none">'+inCat.map(function(p){var k=ordKey(wk,p);var o=ordGet(k);return '<div class="ordrow'+(o.q>0?' on':'')+'" id="or_'+k+'"><span class="ordnm">'+_esc(p)+'</span><div class="ostep"><button onclick="ordChg(\''+k+'\',-1)">\u2212</button><span id="oq_'+k+'">'+(o.q||0)+'</span><button onclick="ordChg(\''+k+'\',1)">+</button></div><button class="ounit" id="ou_'+k+'" onclick="ordUnit(\''+k+'\')">'+(o.u||'pz')+'</button></div>';}).join('')+'</div>';});
  h+='<div class="ordintro" style="margin-top:10px">\ud83d\udcdd Note '+_esc(gname)+' \u2014 prodotti dimenticati / da aggiungere</div><textarea class="ordnote" placeholder="Es. manca il porro\u2026" oninput="ordNote(\''+wk+'\',this.value)">'+_esc(WKNOTE[wk]||'')+'</textarea>';
 });
 h+='<button class="ordsend" onclick="inviaOrdineChef()">\ud83d\udce4 Invia l\'ordine allo chef</button></div>';
 v.innerHTML=h;}
async function inviaOrdineChef(){var add=[];var WK={s1:'Sett.1',s2:'Sett.2'};
 _GRP.forEach(function(g){var gname=g[0],wk=g[1];(ORDLIST[gname]||[]).forEach(function(p){var k=ordKey(wk,p);var o=ORD[k];if(o&&o.q>0)add.push({n:p,q:o.q,u:o.u||'pz',src:_SRC,wk:WK[wk]});});});
 var notes=[];Object.keys(WKNOTE).forEach(function(wk){var t=(WKNOTE[wk]||'').trim();if(t)notes.push({n:'\ud83d\udcdd Nota '+_SRC+' '+(WK[wk]||'')+': '+t,q:'',u:'',src:_SRC,wk:WK[wk]});});
 if(!add.length&&!notes.length){alert('Segna prima le quantit\u00e0 con le freccette.');return;}
 if(!confirm('Inviare l\'ordine allo chef? ('+add.length+' prodotti)'))return;
 try{var r=await sb('kitchen_meta?k=eq.pastreq&select=v');var cur=(r&&r[0]&&r[0].v&&r[0].v.items)?r[0].v.items:[];var at=new Date().toISOString();add.concat(notes).forEach(function(x){x.at=at;cur.push(x);});
 await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'pastreq',v:{items:cur}})});
 ORD={};WKNOTE={};ordSave();alert('Ordine inviato allo chef \u2713');renderOrd();}catch(e){alert('Errore invio, riprova.');}}
