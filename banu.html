<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#6b1f2a">
<title>Banu · Prinz Rudolf</title>
<style>
  :root{--wine:#6b1f2a;--wine2:#8a2a37;--gold:#c9a227;--cream:#faf6ee;--ink:#2a2119;--line:#e7ddca}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center}
  header{width:100%;background:var(--wine);color:#fff;text-align:center;padding:26px 16px 22px;border-bottom:4px solid var(--gold)}
  header .hi{font-size:14px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700}
  header h1{margin:6px 0 2px;font-size:26px;font-weight:800}
  header .sub{font-size:13.5px;opacity:.85}
  main{width:100%;max-width:520px;padding:20px 16px 40px;display:flex;flex-direction:column;gap:16px}
  a.card{display:flex;align-items:center;gap:16px;text-decoration:none;color:var(--ink);
    background:#fff;border:1px solid var(--line);border-left:6px solid var(--gold);border-radius:16px;
    padding:20px 18px;box-shadow:0 3px 10px rgba(0,0,0,.06);transition:transform .08s,box-shadow .08s}
  a.card:active{transform:scale(.98);box-shadow:0 1px 4px rgba(0,0,0,.08)}
  a.card .ic{font-size:34px;line-height:1;width:46px;text-align:center;flex:0 0 auto}
  a.card .tx .t{font-size:19px;font-weight:800;margin-bottom:2px}
  a.card .tx .d{font-size:13.5px;color:#6b6257}
  a.card .go{margin-left:auto;color:var(--wine);font-size:24px;font-weight:800}
  footer{margin-top:auto;padding:16px;font-size:12px;color:#9a9082;text-align:center}
</style>
</head>
<body>
  <header>
    <div class="hi">Prinz Rudolf</div>
    <h1>Ciao Banu 👋</h1>
    <div class="sub">Le tue app della cucina — tocca per aprire</div>
  </header>
  <main>
    <a class="card" href="cuochi.html?chi=Banu">
      <div class="ic">🍳</div>
      <div class="tx"><div class="t">Cucina — i miei compiti</div><div class="d">Entrata, pulizia, note e passaggio consegne. Si apre sul tuo nome.</div></div>
      <div class="go">›</div>
    </a>
    <a class="card" href="antiprod.html">
      <div class="ic">🥗</div>
      <div class="tx"><div class="t">Antipasti — produzione</div><div class="d">Segna gli antipasti man mano che li prepari.</div></div>
      <div class="go">›</div>
    </a>
  </main>
  <footer>Prinz Rudolf · Merano — uso interno cucina</footer>
</body>
</html>
