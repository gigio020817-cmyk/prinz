function ymd(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function weekStart(ds){var d=new Date(ds+'T00:00:00');var k=(d.getDay()+6)%7;d.setDate(d.getDate()-k);return ymd(d);}
function itemsFor(g){return g.indexOf('pulizias#')===0?(puliziaSettFor(g.slice(9))||[]):(g.indexOf('pulizia#')===0?puliziaFor(g.slice(8)):(g.indexOf('pulizia')===0?PULIZIA:(ITEMS[g]||[])));}
function scopeId(group){var dd=group.indexOf('pulizias#')===0?weekStart(today):today;return group+'@'+dd;}
function ctrlFooter(group){var st=CTRL[scopeId(group)];if(st&&st.stato==='ok')return '<div class="ctrlbar okc">✔ Controllato dallo chef'+(st.chef?(' ('+esc(st.chef)+')'):'')+'</div>';if(st&&st.stato==='richiesto')return '<div class="ctrlbar waitc">⏳ In attesa di controllo dello chef</div>';return '<button class="ctrlbtn" onclick="requestControl(\''+group+'\')">Ho finito → chiedi controllo</button>';}
async function requestControl(group){var c=getCook();if(!c){alert('Prima scegli il tuo nome.');return;}var sid=scopeId(group);CTRL[sid]={stato:'richiesto',by:c,at:new Date().toISOString()};try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'ctrl|'+sid,v:CTRL[sid]})});toast('Controllo richiesto allo chef');render();}catch(e){toast('⚠️ Non inviato');console.error(e);}}
function totalFor(g){return itemsFor(g).length;}

function now(){return new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
async function sb(path,opts){opts=opts||{};const h={apikey:SB_KEY,'Content-Type':'application/json'};if(opts.headers)Object.assign(h,opts.headers);const r=await fetch(SB_URL+'/rest/v1/'+path,{method:opts.method||'GET',headers:h,body:opts.body});if(!r.ok)throw new Error('HTTP '+r.status+' '+await r.text());const txt=await r.text();return txt?JSON.parse(txt):null;}

async function loadAll(){
  document.getElementById('status').textContent='Caricamento dal cloud…';
  try{
    const[ck,ckw,ent,meta,presa,ctrl,timb,prevp,ncuoco,pausa]=await Promise.all([
      sb('kitchen_checks?day=eq.'+today+'&select=*'),
      sb('kitchen_checks?day=eq.'+weekStart(today)+'&grp=like.pulizias%23*&select=*'),
      sb('kitchen_entries?day=eq.'+today+'&select=*&order=at'),
      sb('kitchen_meta?k=eq.responsabile&select=*'),
      sb('kitchen_presa?select=*'),
      sb('kitchen_meta?k=like.ctrl|*&select=*'),
      sb('kitchen_meta?k=like.timbra|'+today+'*&select=*'),
      sb('kitchen_entries?day=gte.'+dayShift(today,-3)+'&day=lt.'+today+'&type=eq.passaggio&select=*&order=at'),
      sb('kitchen_meta?k=like.notacuoco|*&select=*'),
      sb('kitchen_meta?k=like.pausa|'+today+'*&select=*')
    ]);
    CK={};(ck||[]).concat(ckw||[]).forEach(r=>{CK[r.grp+'_'+r.idx]={by:r.cook,at:r.at};});
    ENT=ent||[];META=(meta&&meta[0])?meta[0].v:null;PRESA=presa||[];
    CTRL={};(ctrl||[]).forEach(r=>{CTRL[r.k.slice(5)]=r.v;});
    TIMBRA={};(timb||[]).forEach(r=>{var p=r.k.split('|');TIMBRA[p[2]]=r.v;});
    PREVPASS=prevp||[];
    NOTECUOCO={};(ncuoco||[]).forEach(function(r){NOTECUOCO[r.k]=(r.v&&r.v.text)||'';});
    PAUSE=(pausa||[]).map(function(r){return {key:r.k,n:(r.v&&r.v.n)||'',out:(r.v&&r.v.out)||null,in:(r.v&&r.v.in)||null};}).sort(function(a,b){return (a.out||'').localeCompare(b.out||'');});
    document.getElementById('status').textContent='✓ Collegato · '+today.split('-').reverse().join('/');
    render();

  var p=MENU_PRANZO.map(function(d){return '<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px"><b>'+d[0]+'</b> — <b>Primo:</b> '+esc(d[1])+' · <b>Secondo:</b> '+esc(d[2])+(d[3]&&d[3]!=='—'?' · <b>Alt. carne:</b> '+esc(d[3]):'')+' · <b>Veg:</b> '+esc(d[4])+' · <b>Contorni:</b> '+esc(d[5])+'</div>';}).join('');
  var c=MENU_CENA.map(function(d){return '<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px"><b>'+d[0]+'</b> — '+esc(d[1])+' · <b>Contorno:</b> '+esc(d[2])+' · <b>Veg:</b> '+esc(d[3])+(d[4]?' · <b>Prepara:</b> '+esc(d[4]):'')+'</div>';}).join('');
  return '<div class="card" id="cmenu"><div class="card-h" onclick="toggleCard(\'cmenu\')"><div class="t">📋 Menu del personale</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b"><div class="readbox" style="margin-bottom:6px">'+MENU_INFO+'</div><div style="font-weight:700;margin:4px 0 2px">PRANZO (~30 pax)</div>'+p+'<div class="readbox" style="margin-top:8px">'+MENU_PRANZO_NOTE+'</div><div style="font-weight:700;margin:12px 0 2px">CENA (~25 pax)</div>'+c+'<div class="readbox" style="margin-top:8px">'+MENU_CENA_NOTE+'</div></div></div>';
}
function notaCard(){
  var cook=getCook();
  if(['Alex','Gianluca'].indexOf(cook)<0) return '';
  var key='notacuoco|'+cook+'|'+today;var cur=NOTECUOCO[key]||'';
  return '<div class="card open" id="cnota" style="border-color:var(--gold)"><div class="card-h" onclick="toggleCard(\'cnota\')"><div class="t">📝 Note del giorno</div><svg class="tog" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 6l6 6-6 6"/></svg></div><div class="card-b"><div class="readbox" style="margin-bottom:6px">Scrivi qui problemi, segnalazioni o cose da dire allo chef. Le legge e le analizza lui.</div><textarea class="txt" id="notaTxt" placeholder="Scrivi qui…">'+esc(cur)+'</textarea><button class="btn" onclick="saveNota()">Salva nota</button></div></div>';
}
async function saveNota(){
  var cook=getCook();if(!cook){alert('Prima scegli il tuo nome.');return;}
  var v=document.getElementById('notaTxt').value;var key='notacuoco|'+cook+'|'+today;NOTECUOCO[key]=v;
  try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:key,v:{text:v,cook:cook,at:new Date().toISOString()}})});toast('Nota salvata');}catch(e){toast('⚠️ Non salvata');console.error(e);}
}
function render(){
  whoBar();
  var ME=getCook();
  var RN=(META&&META.name)?META.name:'';   // responsabile della settimana
  var showApe = RN ? (ME && ME===RN) : !(PEOPLE[ME]&&PEOPLE[ME].noApe);
  var showChiu = RN ? (ME && ME===RN) : !(PEOPLE[ME]&&PEOPLE[ME].noChiu);
  var apeTitle = RN ? 'Check-list apertura (responsabile della settimana)' : 'Check-list apertura';
  var chiTitle = RN ? 'Check-list chiusura (responsabile della settimana)' : 'Check-list chiusura';
  document.getElementById('view').innerHTML=
    timbraCard()+
    pausaCard()+
    ((PEOPLE[ME]&&PEOPLE[ME].noResp)?'':respCard())
    +(showApe?checklistCard('cap',apeTitle,'apertura',APERTURA):'')
    +puliziaSection()
    +schedaCard()
    +notaCard()
    +(showChiu?checklistCard('cch',chiTitle,'chiusura',CHIUSURA):'')
    +prevPassCard()
    +passCard()
    +presaCard()
    +menuCard()
    +readCard();
}
</script>
