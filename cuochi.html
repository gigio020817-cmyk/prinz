async function loadAll(){
  document.getElementById('status').textContent='Caricamento dal cloud…';
  try{
    const[ck,ckw,ent,meta,presa,ctrl,timb,prevp,ncuoco,pausa]=await Promise.all([
      sb('kitchen_checks?day=eq.'+today+'&select=*'),
      sb('kitchen_checks?day=eq.'+weekStart(today)+'&grp=like.pulizias%23*&select=*'),
      sb('kitchen_entries?day=eq.'+today+'&select=*&order=at'),
      sb('kitchen_meta?k=eq.responsabile&select=*'),
      sb('kitchen_presa?select=*'),
      sb('kitchen_meta?k=like.ctrl|*&select=*'),
      sb('kitchen_meta?k=like.timbra|'+today+'*&select=*'),
      sb('kitchen_entries?day=gte.'+dayShift(today,-3)+'&day=lt.'+today+'&type=eq.passaggio&select=*&order=at'),
      sb('kitchen_meta?k=like.notacuoco|*&select=*'),
      sb('kitchen_meta?k=like.pausa|'+today+'*&select=*')
    ]);
    CK={};(ck||[]).concat(ckw||[]).forEach(r=>{CK[r.grp+'_'+r.idx]={by:r.cook,at:r.at};});
    ENT=ent||[];META=(meta&&meta[0])?meta[0].v:null;PRESA=presa||[];
    CTRL={};(ctrl||[]).forEach(r=>{CTRL[r.k.slice(5)]=r.v;});
    TIMBRA={};(timb||[]).forEach(r=>{var p=r.k.split('|');TIMBRA[p[2]]=r.v;});
    PREVPASS=prevp||[];
    NOTECUOCO={};(ncuoco||[]).forEach(function(r){NOTECUOCO[r.k]=(r.v&&r.v.text)||'';});
    PAUSE=(pausa||[]).map(function(r){return {key:r.k,n:(r.v&&r.v.n)||'',out:(r.v&&r.v.out)||null,in:(r.v&&r.v.in)||null};}).sort(function(a,b){return (a.out||'').localeCompare(b.out||'');});
    try{var _co=await sb('kitchen_meta?k=eq.chefordini|'+today+'&select=v');CHEFORD=(_co&&_co[0]&&_co[0].v&&_co[0].v.items)?_co[0].v.items:[];}catch(e){CHEFORD=[];}
    try{var _pl=await sb('kitchen_meta?k=eq.passlist&select=*');PASSL=(_pl&&_pl[0]&&_pl[0].v&&_pl[0].v.items)?_pl[0].v.items:[];}catch(e){PASSL=[];}
    document.getElementById('status').textContent='✓ Collegato · '+today.split('-').reverse().join('/');
    render();
  }catch(e){document.getElementById('status').textContent='⚠️ Problema di collegamento. Controlla internet e riapri.';console.error(e);}
}

async function checkItem(group,idx,el){
  const c=getCook();if(!c){alert('Prima scegli il tuo nome in alto.');return;}
  const key=group+'_'+idx;const on=!CK[key];
  el.classList.toggle('on',on);el.textContent=on?'✓':'';
  const lab=el.parentNode.querySelector('.lab');let sig=lab.querySelector('.sig');
  if(on){CK[key]={by:c,at:new Date().toISOString()};if(!sig){sig=document.createElement('span');sig.className='sig';lab.appendChild(sig);}sig.textContent='✓ '+c+' · '+now();}
  else{delete CK[key];if(sig)sig.remove();}
  const card=el.closest('.card');const meta=card&&card.querySelector('.meta');if(meta){let d=0;Object.keys(CK).forEach(k=>{if(k.indexOf(group+'_')===0)d++});meta.textContent=d+'/'+totalFor(group);}
  const dd=group.indexOf('pulizias#')===0?weekStart(today):today;
  try{
    if(on)await sb('kitchen_checks?on_conflict=day,grp,idx',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({day:dd,grp:group,idx:idx,label:itemsFor(group)[idx],cook:c})});
    else await sb('kitchen_checks?day=eq.'+dd+'&grp=eq.'+group+'&idx=eq.'+idx,{method:'DELETE',headers:{Prefer:'return=minimal'}});
  }catch(e){toast('⚠️ Spunta non salvata, riprova');el.classList.toggle('on',!on);console.error(e);}
}

function weekdaysWork(cook){
  var off=(RIPOSO[cook]||[]).slice();
  if(cook==='Badr'){['Alex','Mattia','Erjola'].forEach(function(c){(RIPOSO[c]||[]).forEach(function(d){if(off.indexOf(d)<0)off.push(d);});});}
  return [1,2,3,4,5,6,0].filter(function(d){return off.indexOf(d)<0;});
}

function missingFor(cook){

  else{var g2='pulizia#'+cook,tot2=puliziaFor(cook).length,d2=countDone(g2);if(d2<tot2)miss.push({t:(tour?"Compiti tournant":"La mia pulizia")+" ("+d2+"/"+tot2+")",from:DUE_PULIZIA});var wd=weeklyDue(cook);if(wd.length)miss.push({t:"Pulizia settimanale di oggi ("+wd.length+")",from:DUE_PULIZIA});}

  var nsch=ENT.filter(function(e){return e.type==='scheda'&&e.cook===cook;}).length;

var _penSig=null;
function updatePenale(cook,miss){try{

    sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:k,v:{cook:cook,n:miss.length,missing:miss,since:since,at:new Date().toISOString(),done:false}})}).catch(function(){});
  }else{try{localStorage.removeItem(sk);}catch(e){}
    sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:k,v:{cook:cook,n:0,missing:[],done:true,at:new Date().toISOString()}})}).catch(function(){});

function progressFor(cook){
  if(cook==='Gigio')return {tot:0,done:0,pct:100};
  var tot=0,done=0;
  if(cook!=='Gigio'){tot++; if(TIMBRA[cook]&&TIMBRA[cook].in)done++;}
  var tour=PEOPLE[cook]&&PEOPLE[cook].tournant;var cov=tour?(getCover()||badrCovers()):'';
  if(tour&&cov){tot+=puliziaFor(cov).length;done+=countDone('pulizia#'+cov);}
  else{tot+=puliziaFor(cook).length;done+=countDone('pulizia#'+cook);}
  if(RESPFISSI.indexOf(cook)>=0){tot+=APERTURA.length;done+=countDone('apertura');tot+=CHIUSURA.length;done+=countDone('chiusura');}
  if(NOSCHEDA.indexOf(cook)<0){tot++; if(ENT.filter(function(e){return e.type==='scheda'&&e.cook===cook;}).length>0)done++;}
  var pct=tot?Math.round(done/tot*100):100;if(pct>100)pct=100;if(pct<0)pct=0;
  return {tot:tot,done:done,pct:pct};
}

async function savePassList(){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'passlist',v:{items:PASSL}})});}catch(e){toast('⚠️ Non salvato');console.error(e);}}
function addPass(){var c=getCook();if(!c){alert('Prima scegli il tuo nome.');return;}var el=document.getElementById('consIn');var t=(el.value||'').trim();if(!t)return;PASSL.push({id:'p'+Date.now()+Math.floor(Math.random()*1000),t:t,by:c,at:new Date().toISOString(),done:false});savePassList();render();openCard('ccons');setTimeout(function(){var i=document.getElementById('consIn');if(i)i.focus();},50);}
function togglePass(id){var c=getCook();if(!c){alert('Prima scegli il tuo nome.');return;}var x=PASSL.find(function(y){return y.id===id;});if(!x)return;x.done=!x.done;if(x.done){x.doneBy=c;x.doneAt=new Date().toISOString();}else{delete x.doneBy;delete x.doneAt;}savePassList();render();openCard('ccons');}
function clearDonePass(){if(!confirm('Togliere le voci già fatte dalla lista?'))return;PASSL=PASSL.filter(function(x){return !x.done;});savePassList();render();openCard('ccons');}
function render(){
  whoBar();
  var ME=getCook();
  var isResp = RESPFISSI.indexOf(ME)>=0;   // responsabili fissi: Gianluca e Ubaldo
  var showApe = isResp;
  var showChiu = isResp;
  var apeTitle = 'Check-list apertura (responsabile)';
  var chiTitle = 'Check-list chiusura (responsabile)';
  document.getElementById('view').innerHTML=
    penaleBanner(ME)+
    chefOrdCard()+
    timbraCard()+
    pausaCard()+
    (RESPFISSI.indexOf(ME)>=0?respCard():'')
    +(showApe?checklistCard('cap',apeTitle,'apertura',APERTURA):'')
    +puliziaSection()
    +schedaCard()
    +notaCard()
    +(showChiu?checklistCard('cch',chiTitle,'chiusura',CHIUSURA):'')
    +consegneCard()
    +presaCard()
    +menuCard()
    +readCard()
    +fineTurnoCard();
}
</script>
