function saveLog(idx){grab();var t=((el('f_editlog')&&el('f_editlog').value)||'').trim();if(!t){toast('Il testo non può essere vuoto');return;}CUR.log=Array.isArray(CUR.log)?CUR.log:[];if(CUR.log[idx]){CUR.log[idx].t=t;}CUR._editLog=null;renderForm(CUR._isnew);toast('Aggiornamento modificato');}
function compress(file){return new Promise(function(res){
 if((file.type||'').indexOf('image')!==0){var fr=new FileReader();fr.onload=function(){res({mime:file.type||'application/octet-stream',data:fr.result,name:file.name});};fr.readAsDataURL(file);return;}
 var fr=new FileReader();fr.onload=function(){var img=new Image();img.onload=function(){var max=1400;var w=img.width,hh=img.height;if(w>max||hh>max){if(w>hh){hh=Math.round(hh*max/w);w=max;}else{w=Math.round(w*max/hh);hh=max;}}var c=document.createElement('canvas');c.width=w;c.height=hh;c.getContext('2d').drawImage(img,0,0,w,hh);res({mime:'image/jpeg',data:c.toDataURL('image/jpeg',0.7),name:(file.name||'foto')});};img.src=fr.result;};fr.readAsDataURL(file);
});}
function addAtt(input,kind){var f=input.files&&input.files[0];if(!f)return;grab();compress(f).then(function(a){a.kind=kind;a.at=new Date().toISOString();CUR.allegati=CUR.allegati||[];CUR.allegati.push(a);renderForm(CUR._isnew);});}
function rmAtt(idx){grab();CUR.allegati.splice(idx,1);renderForm(CUR._isnew);}
function viewAtt(idx){var a=CUR.allegati[idx];if(!a)return;showViewer(a.mime,a.data,a.name||a.kind||'');}
async function save(){grab();if(!CUR.macchinario&&!CUR.problema){toast('Scrivi almeno il macchinario o il problema');return;}CUR.updatedAt=new Date().toISOString();if(!CUR.createdAt)CUR.createdAt=CUR.updatedAt;
 var rec=Object.assign({},CUR);delete rec._id;delete rec._isnew;delete rec._draftLog;
 try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'manut|'+CUR._id,v:rec})});
  var ex=ITEMS.find(function(i){return i._id===CUR._id;});var stored=Object.assign({},rec);stored._id=CUR._id;if(ex){Object.assign(ex,stored);}else{ITEMS.push(stored);}
  el('detail').style.display='none';CUR=null;render();toast('✓ Salvato');
 }catch(e){toast('⚠️ Non salvato, controlla internet');console.error(e);}
}
async function delRec(){var c=prompt('Codice chef per eliminare:');if(c===null)return;if(c.trim().toLowerCase()!==CHEF_CODE.toLowerCase()){alert('Codice errato.');return;}if(!confirm('Eliminare questo intervento? (resta archiviato nel cloud ma sparisce dalla lista)'))return;
 var rec=Object.assign({},CUR);delete rec._id;delete rec._isnew;delete rec._draftLog;rec.deleted=true;rec.updatedAt=new Date().toISOString();
 try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'manut|'+CUR._id,v:rec})});ITEMS=ITEMS.filter(function(i){return i._id!==CUR._id;});el('detail').style.display='none';CUR=null;render();toast('Eliminato');}catch(e){toast('⚠️ Non riuscito');console.error(e);}
}
/* ===== Rubrica fornitori ===== */
function openForn(){el('forn').style.display='block';el('detail').style.display='none';window.scrollTo(0,0);renderForn();}
function renderForn(){var h='';
 h+='<div class="addforn"><div class="row2"><div class="field" style="margin-bottom:8px"><label>Nuovo fornitore</label><input id="nf_nome" placeholder="es. Tecnico forno Rational"></div><div class="field" style="margin-bottom:8px"><label>Telefono</label><input id="nf_tel" type="tel" placeholder="es. 349 1234567"></div></div><button class="newbtn" style="width:100%" onclick="addForn()">＋ Aggiungi alla rubrica</button></div>';
 if(!FORN.length){h+='<div class="empty">Nessun fornitore salvato. Aggiungine uno qui sopra.</div>';}
 else{FORN.slice().sort(function(a,b){return (a.nome||'').localeCompare(b.nome||'');}).forEach(function(f){var d=waDigits(f.tel);
   h+='<div class="frow"><div class="fi"><div class="fn">'+esc(f.nome||'(senza nome)')+'</div><div class="ft">'+esc(f.tel||'—')+'</div></div>'+
   (f.tel?'<a class="ic call" href="tel:'+esc((f.tel||'').replace(/\s/g,''))+'">📞</a>':'')+
   (d?'<a class="ic wa" href="https://wa.me/'+d+'" target="_blank">💬</a>':'')+
   '<button class="ic edit" onclick="editForn(\''+f.id+'\')">✎</button>'+
   '<button class="ic del" onclick="delForn(\''+f.id+'\')">🗑</button></div>';
 });}
 el('fbody').innerHTML=h;
}
async function saveForn(){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'manutfornlist',v:{items:FORN}})});}catch(e){toast('⚠️ Non salvato');console.error(e);}}
function addForn(){var n=el('nf_nome').value.trim();var t=el('nf_tel').value.trim();if(!n){toast('Scrivi il nome');return;}FORN.push({id:'f'+Date.now(),nome:n,tel:t});saveForn();renderForn();toast('✓ Aggiunto');}
function editForn(id){var f=FORN.find(function(x){return x.id===id;});if(!f)return;var n=prompt('Nome fornitore:',f.nome||'');if(n===null)return;var t=prompt('Telefono:',f.tel||'');if(t===null)return;f.nome=n.trim();f.tel=t.trim();saveForn();renderForn();}
function delForn(id){var f=FORN.find(function(x){return x.id===id;});if(!confirm('Eliminare "'+((f&&f.nome)||'')+'" dalla rubrica?'))return;FORN=FORN.filter(function(x){return x.id!==id;});saveForn();renderForn();}
</script>
