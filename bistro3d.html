var MENU=[{"cat": "ANTIPASTI", "dishes": [{"name": "Tartare di manzo con anguria marinata al balsamico e gelato al caprino", "comp": [{"n": "Tartare di manzo (Duchessa The Wolf)", "r": "Ricetta da definire"}, {"n": "Marinatura della tartare", "r": "240 ml olio evo + 90 g salsa di soia + 60 g scalogno + 45 g senape di Digione + 30 g capperi + 30 g succo di limone + 15 g miele + 12 g sale + 6 g pepe nero + 6 g tabasco. Frullare tutto, passare al cinese e mettere in biberon. Dura max 5 giorni a +4°C."}, {"n": "Cubetti di mela Granny", "r": "Mela Granny pelata e tagliata a cubetti al momento, per il condimento della tartare. Lavorazione espressa, da controllare giorno per giorno."}, {"n": "Anguria marinata al balsamico", "r": "500 g anguria Perla Nera pulita a rettangoli + 50 g aceto balsamico + 20 g olio evo + 10 g zucchero + 2 g sale. Emulsionare i liquidi e mettere sottovuoto facendo due cicli di sgasatura; lasciare riposare dalle 2 alle 12 ore (ottimale). Aprire la busta, scolare, asciugare e servire. Questa lavorazione dura massimo 3 giorni (dopo l'anguria inizia a perdere liquidi)."}, {"n": "Gelato al caprino", "r": "250 g caprino + 200 ml latte + 150 ml panna + 30 g zucchero + 10 g miele + sale + 1 limone grattugiato. A pacojet."}, {"n": "Pan brioche alle mandorle", "r": "500 g farina manitoba + 100 g farina di mandorle + 60 g zucchero + 12 g sale + 15 g lievito di birra + 250 g uova (5) + 100 ml latte + 200 g burro morbido + 50 g pasta di mandorle. Impastare farina, farina di mandorle, zucchero, lievito, uova e latte; aggiungere il sale, poi il burro morbido a pezzi e la pasta di mandorle; impastare fino a incordatura. Lievitare fino al raddoppio, mettere in stampo da plumcake, spennellare con uovo e cospargere di granella di mandorle. Cottura 170°C per 25-30 min. Al servizio: tagliare a cubi e abbrustolire, da mettere direttamente nel piatto. Enzima al 1% del peso totale della farina: ENZIMATICO oppure VIVO PLUS (mettere uno o l'altro); segnalare allo chef quale dà la resa migliore."}]}, {"name": "Calamaro CBT laccato all'umami di pomodoro ripieno alla mediterranea", "comp": [{"n": "Calamaro CBT (pulito e cotto)", "r": "Cottura CBT del calamaro ripieno: 64°C per 1 ora."}, {"n": "Laccatura all'umami di pomodoro", "r": "Prendere il calamaro leggermente scottato e metterlo in padella con dell'umami di pomodoro, del burro freddo, del basilico e una grattata di limone; nappare. Non è quantificabile in ricetta: bisogna prenderci la mano."}, {"n": "Ripieno alla mediterranea", "r": "900 g pane raffermo (pane pugliese, da ordinare) + 180 g pecorino + 180 g parmigiano + 240 g tentacoli di calamaro tritati + 180 ml olio evo + 90 g prezzemolo tritato + 50 g aglio tritato finemente + 30 g scorza di limone + 60 ml succo di limone + 150 ml latte + 12 g sale + 6 g pepe nero macinato. Rosolare l'aglio nell'olio evo, aggiungere i tentacoli di calamaro e saltare 2 minuti, far raffreddare. Aggiungere tutto agli altri ingredienti e formare il ripieno che servirà per riempire il calamaro, che andrà cotto sottovuoto."}, {"n": "Salsa di burrata al limone", "r": "400 g burrata + 100 ml panna + 20 g succo di limone + scorza di limone + 5 g sale. Frullare fino a salsa liscia; mettere in biberon e tenere in frigo. Va dressata sotto il calamaro."}, {"n": "Polvere di olive nere", "r": "Seccare le olive nere in forno a 100°C tutta la notte; appena fredde frullare a piccoli colpi (altrimenti rilasciano l'olio e diventano pasta)."}, {"n": "Olio verde al basilico", "r": "200 g basilico sbollentato e raffreddato + 300 ml olio di semi. Frullare bene, filtrare al cinese e mettere in biberon."}]}, {"name": "Insalata acquaponica con mango, pomodorini, carote, mais e finocchio, dressing alla senape (3 varianti)", "comp": [{"n": "Insalata acquaponica (mango, pomodorini, carote, mais, finocchio)", "r": "Da ordinare settimanalmente. Linea: mango a cubetti, carote grattugiate, mais, pomodorini a 1/4, finocchio tagliato fine all'affettatrice in acqua e ghiaccio. Controllare la linea ogni giorno e riempirla."}, {"n": "Dressing alla senape", "r": "100 g senape di Digione + 50 g miele (o sciroppo d'agave) + 60 g aceto di mele (o succo di limone) + 30 ml acqua + 5 g sale + 1 g xantano + 250 ml olio di semi. Frullare al minipimer senape, miele, aceto, acqua, sale e xantano; aggiungere l'olio a filo continuando a frullare fino a emulsione liscia e densa. Lo xantano stabilizza l'emulsione (non si divide). Tenere in biberon in frigorifero, pronta per il servizio (dura diversi giorni)."}, {"n": "Variante: petto di pollo alla griglia", "r": "Marinare con sale bilanciato 70/30: il 3% di questo sale per kg di carne (es. 30 g di sale bilanciato per 1 kg). Spezie: aglio, timo, paprika affumicata oltre al sale bilanciato. Cottura del pollo sottovuoto (CBT) 60°C per 90 minuti, poi griglia al servizio."}, {"n": "Variante: gamberi alla griglia al prezzemolo e limone", "r": "Gamberi congelati: marinare con sale, zucchero, aglio, pepe e olio evo, poi cottura sottovuoto (CBT 52°C per 8 min). Al momento del servizio grigliare in padella 6 pz per porzione; appena ben rosolati metterli in una ciotolina con prezzemolo tritato e una grattata di limone e servire in fila vicino all'insalata."}, {"n": "Variante: falafel di ceci", "r": "FALAFEL VEGANE (dosi per 2 kg di ceci): 2 kg ceci secchi messi in ammollo 24 ore (NON cotti: i ceci ammollati crudi tengono la frittura e non si sfaldano, quelli cotti diventano molli) + 400 g cipolla + 50 g aglio + 120 g prezzemolo e coriandolo freschi + 16 g cumino + 16 g coriandolo in polvere + 36 g sale + 6 g pepe + 20 g bicarbonato + 160 g farina (di ceci, oppure farina 00, semola rimacinata o pangrattato — serve solo a legare). Passare tutto al tritacarne con maglia fine (impasto granuloso, senza uova, sono vegane); far riposare l'impasto in frigo e formare le polpette. Si possono surgelare crude su placca e friggere direttamente da congelate a 170°C fino a doratura."}]}, {"name": "Salmone marinato al kefir e yuzu con guacamole di avocado, crostone di pane alla cipolla rossa caramellata e zuppetta di mango e menta", "comp": [{"n": "Salmone marinato al kefir e yuzu", "r": "600 g salmone senza pelle + 250 g kefir + 30 g succo di yuzu + 8 g scorza di lime + 12 g sale + 8 g zucchero + 5 g zenzero grattugiato + 2 g pepe bianco. Disporre il salmone sottovuoto con la marinata e lasciare marinare in frigorifero per 4 ore (range massimo 6 ore, dopo l'acidità inizia a cuocerlo). Passato il tempo sciacquare e asciugare bene, rimettere sottovuoto e tagliare a sashimi al momento."}, {"n": "Guacamole di avocado", "r": "1 kg avocado + 30 g succo di lime + 50 g olio evo + 10 g basilico + 15 g sale + 15 g sciroppo d'agave + 200 g cipolla agrodolce + 200 g pomodorini confit + 50 g liquido dei pomodorini confit. Schiacciare l'avocado maturo e aggiungere tutti gli ingredienti precedentemente tagliati finemente (sia cipolla che pomodori); mescolare bene il tutto e mettere in barattoli piccoli Bormioli, sgasare 2 volte sul sottovuoto. Durata max da chiuso 7 giorni."}, {"n": "Crostone di pane alla cipolla rossa caramellata", "r": "PANE A FILONE: 1 kg farina 0 (do gusto pane) + 650 ml acqua + 20 g sale + 8 g lievito di birra + 20 g olio evo. Impastare e far lievitare fino al raddoppio; incorporare 300 g di cipolla rossa caramellata, formare a filone, far lievitare e cuocere a 220°C con vapore per 25-30 min. CIPOLLA ROSSA CARAMELLATA: stufare lentamente la cipolla rossa con olio evo, un pizzico di sale, 30 g zucchero e 30 g aceto balsamico fino a caramellare. Al servizio: affettare il pane e abbrustolire. Enzima al 1% del peso totale della farina: ENZIMATICO oppure VIVO PLUS (mettere uno o l'altro); segnalare allo chef quale dà la resa migliore."}, {"n": "Zuppetta di mango e menta", "r": "SALSA: 500 g purea di mango + 50 g zucchero + 30 g aceto di mele + 20 g succo di lime + peperoncino q.b. (o sriracha) + 1 g zenzero grattugiato + 1 pizzico di sale + 0,5 g xantano. Frullare e filtrare al cinese: profilo agrodolce e leggermente piccante. Al servizio aggiungere cubetti di mango e una julienne di menta."}, {"n": "Caviale di tapioca allo yuzu (giallo)", "r": "CAVIALE DI TAPIOCA ALLO YUZU (giallo). Perle: 100 g perle di tapioca piccole bollite in abbondante acqua 12-15 min finché diventano trasparenti, scolare e raffreddare in acqua fredda. RIDUZIONE ALLO YUZU: 200 g succo di yuzu + 100 ml acqua + 80 g zucchero, ridurre a sciroppo leggero; aggiungere colorante alimentare giallo idrosolubile q.b. (oppure un pizzico di curcuma per il giallo naturale). Marinare le perle nella riduzione: assorbono colore e sapore e diventano un caviale giallo allo yuzu. Conservare in contenitore/biberon e dressare al servizio."}]}]}, {"cat": "PRIMI", "dishes": [{"name": "Risotto al prezzemolo con polipo alla brace, pomodori confit, zucchine alla scapece e gelato di ricotta di anacardi", "comp": [{"n": "Risotto al prezzemolo", "r": "Precottura: tostare il riso Carnaroli a secco con un pizzico di sale grosso, sfumare con vino bianco, bagnare con brodo vegetale caldo e cuocere solo 8 minuti. Stendere in placca, sgranare e raffreddare subito (blocca la cottura). Al momento finire la cottura con il brodo e mantecare FUORI dal fuoco con burro al prezzemolo + parmigiano e buccia di limone; regolare l'acidita con succo di limone (deve restare verde e cremoso).\nBurro al prezzemolo (verde): 250 g burro morbido + 60 g prezzemolo sbollentato e strizzato + 20 g olio evo + buccia di 1 limone + 3 g sale -> frullare fino a crema liscia."}, {"n": "Polipo alla brace", "r": "Polipo pulito, cottura sottovuoto CBT 72 °C x 7 h; abbattere e tenere in linea. Al momento: porzionare i tentacoli, condire con olio e sale e segnarli bene alla brace/griglia caldissima fino a crosticina croccante. Finire con olio evo e qualche goccia di limone."}, {"n": "Pomodori confit", "r": "Comprati. Tagliati a meta e usati per decorazione del piatto."}, {"n": "Zucchine alla scapece", "r": "Rondelle fritte + olio al prezzemolo/aglio/limone. DECORATIVE: una parte a finitura nell'impiattamento finale, una parte in mantecazione del risotto."}, {"n": "Crema di zucchine", "r": "1 kg zucchine tagliate fini + 1 spicchio aglio + punta di bicarbonato + sale + pepe + poca acqua di cottura + olio evo. Stufare/sbollentare le zucchine mantenendo il verde, frullare nel Bimby con poca acqua ed emulsionare con olio evo; passare al cinese. Base di colore alla base del piatto."}, {"n": "Gelato di ricotta di anacardi", "r": "800 g di anacardi (messi in ammollo per 2 ore e poi scolati) + 25 g aceto di mele + 25 g succo di lime + 570 ml acqua (270 + 300) + 20 g sale + 20 ml olio d'oliva. Dopo aver scolato gli anacardi, frullare prima tutto al Bimby fino a crema liscia; poi versare nei due bicchieri pacojet, congelare e frullare 2 volte al pacojet."}, {"n": "Anacardi caramellati", "r": "Anacardi tostati e poi caramellati in padella con zucchero a velo e un pizzico di sale. A decorazione del piatto."}]}, {"name": "Raviolo alla capricciosa: ripieno di prosciutto cotto del contadino, carciofi fritti, salsa al datterino fredda, spuma di mozzarella e brodo di pizza", "comp": [{"n": "Raviolo (pasta + ripieno di prosciutto cotto del contadino)", "r": "Pasta al tuorlo: 1,4 kg farina 00 + 400 g semola + 1500 g tuorlo + sale. Ripieno: 500 g ricotta + 300 g prosciutto del contadino + 150 g parmigiano + noce moscata.\nEFFETTO CORNICIONE DI PIZZA: pasta bicolore -> sopra un velo di pasta grigia (stesso impasto + un pizzico di carbone vegetale) per simulare il bordo bruciacchiato della pizza.\nFORMA: ravioli chiusi bombati e serviti IN ALTEZZA (in verticale) per dare volume."}, {"n": "Carciofi fritti", "r": "Spicchi della pizzeria, fritti al momento."}, {"n": "Salsa al datterino fredda", "r": "500 g datterini rossi maturi (+100 g gialli, opz.) + 60 ml olio evo + 1 spicchio aglio in camicia + 6-8 foglie basilico + 4 g sale + 2 g zucchero + qualche goccia di aceto. Frullare i datterini a crudo, passare al cinese fine, regolare l'acidita. Biberon a +4, si usa fredda."}, {"n": "Spuma di mozzarella", "r": "Spuma di mozzarella di bufala (a caldo, cremosa). Per un sifone da 0,5 l: 250 g mozzarella di bufala + 250 ml latte + 150 ml panna + 2,5 g xantano + sale. Scaldare latte e panna, frullare con la mozzarella a pezzi e lo xantano fino a liscio; regolare di sale e passare al cinese fine. Sifone con 2 cariche, tenere a 54 °C (mantenitore/bagnomaria). Servire calda."}, {"n": "Brodo di pizza", "r": "Deve sapere di PIZZA margherita, non di brodo vegetale (niente carote/sedano/cipolla). Base: 1,5 l acqua (meglio se acqua di pomodoro/mozzarella) + 500 g pomodoro San Marzano o datterino. Tostare BENE in forno ~150 g di basi di pizza/pane (crosta ben dorata = gusto 'forno'). Scaldare acqua e pomodoro con: le basi tostate, 1 crosta di parmigiano (~30 g), 2-3 spicchi aglio, 3 g origano secco, un rametto di basilico, filo d'olio evo, sale (opz. 1 acciuga per umami). Sobbollire ~25-30 min, poi filtrare fine. Aggiustare origano/sale finche sa di pizza. Servito caldo attorno al raviolo."}, {"n": "Cialda di pane arrosto", "r": "Fette sottili di pane (o base pizza) condite con olio evo e sale, tostate in forno fino a croccante e ben dorato: ricorda la pizza al forno. A decorazione."}, {"n": "Crescione", "r": "Crescione fresco a decorazione, tocco finale."}]}, {"name": "Spaghettone all'acqua di parmigiano e pepe verde (cacio e pepe estiva)", "comp": [{"n": "Spaghettone", "r": "Pasta acqua e farina al PEPE VERDE: 2 kg semola + ~820 ml acqua a 50 °C (ridotta, il pepe aggiunge umidita) + 160 ml albume + 40 g sale + 60 ml olio evo + 50 g pepe verde in salamoia scolato e frullato (da il gusto direttamente nella pasta). Colore: per un verde piu deciso aggiungere clorofilla (estratto di spinaci/prezzemolo) o un pizzico di colorante verde. Impastare, riposare, tirare e formare lo spaghettone. Nido/porzione: 200 g a piatto."}, {"n": "Acqua di parmigiano", "r": "1 l acqua + 300 g parmigiano reggiano 24 mesi + 0,5 g xantano. Portare a 80°C a velocità 3 nel Bimby e mantenere per 30 minuti senza superare gli 85°C. Trasferire in un contenitore e far riposare 2 ore in frigorifero: il grasso affiora e la parte proteica precipita sul fondo. Recuperare la parte liquida passando al cinese ed eliminare il grasso in superficie. Frullare 500 g di acqua di parmigiano con lo xantano."}, {"n": "Pepe verde", "r": "Pepe verde in salamoia: va direttamente NELL'IMPASTO della pasta (~50 g scolato e frullato per 2 kg di semola). Non piu tritato in mantecatura."}, {"n": "Finitura e impiatto", "r": "Cuocere lo spaghettone in acqua, poi trasferirlo in padella con l'acqua di parmigiano e risottare. Fuori dal fuoco mantecare con burro freddo. Impiattare con scorza di limone e un filo di olio evo (il pepe verde e gia nella pasta)."}, {"n": "Pecorino Romano DOP (microplane)", "r": "Pecorino Romano DOP grattugiato al momento con la microplane, sopra il piatto a finitura."}, {"n": "Polvere di pepe verde", "r": "Metodo maltodestrina: 100 g pepe verde in salamoia scolato -> frullare a pasta (con 10-15 g olio evo se serve). Incorporare 100 g maltodestrina poco per volta mescolando, fino a una 'sabbia' asciutta (se resta umido aggiungere maltodestrina fino a ~150 g, cioe 1:1 -> 1:1,5). Stendere ed essiccare a ~60 °C fino a completamente secco. Frullare fine e setacciare. Sale q.b. (opz). A finitura del piatto."}]}, {"name": "Mezze maniche a cucchiaio con fagioli cannellini, cozze, gamberi, vongole, peperoncino e limone", "comp": [{"n": "Mezze maniche", "r": "Mezze maniche (pasta al torchio all'uovo): 2 kg farina Manitoba + 1 kg semola + 1 kg farina Rieper gialla + 800 ml acqua + 880 g tuorlo. Impastare, far riposare, trafilare al torchio nel formato mezze maniche."}, {"n": "Crema di fagioli cannellini", "r": "Crema di fagioli cannellini: soffriggere in olio evo una mirepoix (100 g carota + 100 g sedano + 100 g cipolla) con 1-2 spicchi aglio; sfumare con 100 ml vino bianco. Aggiungere 800 g fagioli cannellini precotti scolati + 1 rametto di rosmarino, coprire con ~500 ml brodo vegetale, sale e pepe; cuocere 15-20 min. Togliere il rosmarino, frullare la maggior parte fino a crema liscia emulsionando con olio evo e passare al cinese; tenere da parte una quota di fagioli interi. Sposa bene con il pesce."}, {"n": "Cozze e vongole", "r": "Cozze e vongole: aprirle in padella con aglio, olio evo e un goccio di vino bianco; sgusciarle (tenerne alcune col guscio per decoro). Filtrare e tenere l'acqua di apertura per insaporire la mantecatura."}, {"n": "Finitura: peperoncino e limone", "r": "Cuocere le mezze maniche e mantecarle in padella con la crema di cannellini, un po' di bisque e l'acqua di cozze/vongole; fuori dal fuoco aggiungere i gamberi C1, le cozze e le vongole. Finire con peperoncino fresco, scorza e succo di limone e un filo d'olio evo."}, {"n": "Gamberi C1 (CBT)", "r": "Gamberi C1 puliti (tenere teste e carapaci per la bisque). Marinare leggeri con olio evo, sale e scorza di limone; cuocere sottovuoto CBT a 50-52 °C per ~12-15 min, poi abbattere. Al momento aggiungerli a mantecatura della pasta, FUORI dal fuoco, per non stracuocerli (restano morbidi)."}, {"n": "Bisque piccante al limone", "r": "Bisque leggermente piccante e profumata al limone (dai carapaci dei gamberi): tostare bene teste e carapaci in olio evo; aggiungere un soffritto leggero (1 scalogno o cipolla + poca carota e sedano) + 1 spicchio aglio + 1 peperoncino; sfumare con vino bianco (o un goccio di brandy), unire 1 cucchiaio di concentrato di pomodoro, coprire con acqua/fumetto e sobbollire 30-40 min. Filtrare fine schiacciando bene i carapaci, poi ridurre fino a consistenza. A fine cottura profumare con scorza e succo di limone; regolare piccantezza e sale. Usare per mantecare la pasta o a specchio."}]}]}, {"cat": "SECONDI", "dishes": [{"name": "Mezzo galletto con broccolo selvatico alla brace, patatine fritte e maionese all'aglio nero e miso", "comp": [{"n": "Mezzo galletto", "r": "Cottura CBT 64 °C per ~2 h (pollame, in sicurezza). Abbattere. RIGENERO: riportare in temperatura (bagno CBT 60-62 °C o forno) e finire alla brace/griglia per pelle croccante."}, {"n": "Broccolo selvatico alla brace", "r": "Broccolo selvatico: semplicemente sbollentato in acqua salata, poi passato alla brace."}, {"n": "Patatine fritte", "r": "Patatine fritte: comprate, fritte al momento."}, {"n": "Maionese all'aglio nero e miso", "r": "Maionese all'aglio nero e miso: in attesa della ricetta dal cuoco."}]}, {"name": "Controfiletto di manzo con broccolo selvatico alla brace, patatine fritte e maionese all'aglio nero e miso", "comp": [{"n": "Controfiletto di manzo", "r": "Cottura CBT 54 °C per ~1 h (media al sangue). Abbattere. RIGENERO: riportare a ~50-52 °C, poi scottare bene alla brace e far riposare."}, {"n": "Broccolo selvatico alla brace", "r": "Broccolo selvatico: semplicemente sbollentato in acqua salata, poi passato alla brace."}, {"n": "Patatine fritte", "r": "Patatine fritte: comprate, fritte al momento."}, {"n": "Maionese all'aglio nero e miso", "r": "Maionese all'aglio nero e miso: in attesa della ricetta dal cuoco."}]}, {"name": "Filetto di manzo con broccolo selvatico alla brace, patatine fritte e maionese all'aglio nero e miso", "comp": [{"n": "Filetto di manzo", "r": "Cottura CBT 54 °C per ~45-60 min. Abbattere. RIGENERO: riportare a ~50-52 °C, poi scottare alla brace e far riposare."}, {"n": "Broccolo selvatico alla brace", "r": "Broccolo selvatico: semplicemente sbollentato in acqua salata, poi passato alla brace."}, {"n": "Patatine fritte", "r": "Patatine fritte: comprate, fritte al momento."}, {"n": "Maionese all'aglio nero e miso", "r": "Maionese all'aglio nero e miso: in attesa della ricetta dal cuoco."}]}, {"name": "Costine di maiale BBQ con cipollotto verde e cipolla croccante, broccolo selvatico alla brace, patatine fritte e maionese all'aglio nero e miso", "comp": [{"n": "Costine di maiale BBQ", "r": "Cottura CBT 75 °C per 12-24 h (morbide, si stacca dall'osso). Abbattere. RIGENERO: riscaldare, glassare con salsa BBQ e finire alla brace."}, {"n": "Cipollotto verde", "r": "Ricetta da definire"}, {"n": "Cipolla croccante", "r": "Ricetta da definire"}, {"n": "Broccolo selvatico alla brace", "r": "Broccolo selvatico: semplicemente sbollentato in acqua salata, poi passato alla brace."}, {"n": "Patatine fritte", "r": "Patatine fritte: comprate, fritte al momento."}, {"n": "Maionese all'aglio nero e miso", "r": "Maionese all'aglio nero e miso: in attesa della ricetta dal cuoco."}]}, {"name": "Patata dolce alla brace con salsa ai peperoni affumicati e fungo portobello grigliato (vegetariano)", "comp": [{"n": "Patata dolce alla brace", "r": "Ricetta da definire"}, {"n": "Salsa ai peperoni affumicati", "r": "Ricetta da definire"}, {"n": "Fungo portobello grigliato", "r": "Ricetta da definire"}]}]}, {"cat": "DESSERT", "dishes": [{"name": "Tiramisù 2.0", "comp": [{"n": "Tiramisù 2.0 (nostra ricetta)", "r": "Ricetta da definire"}]}, {"name": "Panna cotta al pomodoro con gaspacho di fragole e gelato al basilico", "comp": [{"n": "Panna cotta al pomodoro", "r": "ACQUA DI POMODORO: 1500 g pomodori ramati maturi + 8 g sale. Frullare con il sale, versare in etamina e filtrare in frigo 12 h senza pressare (resa ~500 g). PANNA COTTA: 250 g acqua di pomodoro + 250 g panna fresca + 8 g gelatina in fogli + 4 g sale + 6 g zucchero. Ammollare la gelatina in acqua fredda. Scaldare la panna con sale e zucchero a 60°C, sciogliere la gelatina strizzata; fuori dal fuoco unire l'acqua di pomodoro a temperatura ambiente, mescolare e colare negli stampi. Riposo in frigo minimo 4 h."}, {"n": "Gaspacho di fragole", "r": "Ricetta da definire"}, {"n": "Gelato al basilico", "r": "Ricetta da definire"}]}, {"name": "Cheesecake fredda alla vaniglia, albicocche, melone e menta", "comp": [{"n": "Cheesecake fredda alla vaniglia", "r": "BASE: 240 g biscotti digestivi + 110 g burro + un pizzico di cannella (tritare i biscotti, unire il burro fuso e pressare in stampo). CREMA FREDDA: 1000 g Philadelphia + 200 g panna fresca + 200 g zucchero a velo + 10 g gelatina in fogli + vaniglia. Ammollare la gelatina in acqua fredda, strizzarla e scioglierla con poca panna scaldata. MONTARE bene tutto il composto (Philadelphia, panna, zucchero a velo, vaniglia + gelatina sciolta) fino a spuma liscia e areata: il composto va montato PRIMA di congelarlo. Colare sulla base e congelare."}, {"n": "Albicocche", "r": "GLASSA (freeze-thaw, senza glucosio): 350 g purea di albicocca + 150 g succo di melone (dagli scarti, frullati e filtrati) + 110 g zucchero + 40 g destrosio + 10 g pectina NH + 20 g succo di limone + 1 g sale. Scaldare purea di albicocca e succo di melone a 40°C. Mescolare a secco pectina + zucchero + destrosio, unirli a pioggia con la frusta; portare a bollore 1 min. Fuori dal fuoco unire limone e sale, mixare a immersione senza incorporare aria. Usare a 35–40°C sulle porzioni di cheesecake fredde, far rapprendere e congelare. Scongelo in frigo 3–4 h."}, {"n": "Melone", "r": "MARINATURA: 200 g acqua + 100 g zucchero + 80 g succo di lime + 40 g aceto di mele + 3 g sale + zest di 1 lime + 10 g zenzero fresco a fette + 6 foglie di menta. Portare a bollore acqua e zucchero, spegnere, unire zenzero e zest, infusione 15 min, raffreddare completamente. Unire succo di lime, aceto, sale e menta. Tagliare il melone a porzioni, coprire con la marinatura fredda in busta e sottovuoto al 100%. Riposo minimo 12 h; conservazione a 0–2°C fino a 7 giorni, aprire la busta solo al servizio."}, {"n": "Menta", "r": "Ricetta da definire"}]}]}];

function mkTex(txt,bg,fg){var s=2,wpx=320,hpx=92;var c=document.createElement('canvas');c.width=wpx*s;c.height=hpx*s;var x=c.getContext('2d');x.scale(s,s);x.clearRect(0,0,wpx,hpx);x.font='700 27px -apple-system,Arial';var words=txt.split(' '),line='',lines=[];for(var i=0;i<words.length;i++){var t=line+words[i]+' ';if(x.measureText(t).width>wpx-30){lines.push(line);line=words[i]+' ';}else line=t;}lines.push(line);var lh=31,bh=lines.length*lh+16,bw=0;for(var j=0;j<lines.length;j++){bw=Math.max(bw,x.measureText(lines[j].trim()).width);}bw+=28;var bx=(wpx-bw)/2,by=(hpx-bh)/2,r=13;x.fillStyle=bg;x.beginPath();x.moveTo(bx+r,by);x.arcTo(bx+bw,by,bx+bw,by+bh,r);x.arcTo(bx+bw,by+bh,bx,by+bh,r);x.arcTo(bx,by+bh,bx,by,r);x.arcTo(bx,by,bx+bw,by,r);x.closePath();x.fill();x.lineWidth=1.5;x.strokeStyle='#00000033';x.stroke();x.fillStyle=fg;x.textAlign='center';x.textBaseline='middle';for(var k=0;k<lines.length;k++){x.fillText(lines[k].trim(),wpx/2,by+12+lh/2+k*lh);}var tex=new T.CanvasTexture(c);tex.anisotropy=4;return tex;}

function refreshContent(u){if(u.userData.content){var t=contents[u.userData.n];setSprite(u.userData.content,(t&&t.trim())?t:'(vuoto — scrivi cosa metterci)',(t&&t.trim())?'#e7f6e2F2':'#fff3cdF2',(t&&t.trim())?'#1e6b46':'#5a4600');}}
function setIsolate(u){iso=true;sel=u;units.forEach(function(m){var on=(m===u);m.visible=on;m.userData.label.visible=on;if(m.userData.door)m.userData.door.visible=on;if(m.userData.content)m.userData.content.visible=on&&m.userData.openst;if(m.userData.extra)m.userData.extra.visible=on;});lamps.forEach(function(l){l.visible=(u===isolaMesh);});extras.forEach(function(e){e.visible=false;});goalT.copy(u.position);goalR=u.userData.dim*2.0+0.7;anim=true;}
function unIsolate(){iso=false;sel=null;units.forEach(function(m){m.visible=true;m.userData.label.visible=true;if(m.userData.door)m.userData.door.visible=true;if(m.userData.content)m.userData.content.visible=m.userData.openst;if(m.userData.extra)m.userData.extra.visible=true;});lamps.forEach(function(l){l.visible=true;});extras.forEach(function(e){e.visible=true;});goalT.set(0,0.4,0);goalR=DEF.rad;th=DEF.th;ph=DEF.ph;anim=true;panel.style.display='none';el('savest').textContent='';}

dom.addEventListener('pointermove',function(e){if(ptrs[e.pointerId])ptrs[e.pointerId]=[e.clientX,e.clientY];var k=Object.keys(ptrs);if(k.length>=2){var a=ptrs[k[0]],b=ptrs[k[1]];var d=Math.hypot(a[0]-b[0],a[1]-b[1]);if(pinchD)rad*=pinchD/d;rad=Math.max(2,Math.min(14,rad));goalR=rad;pinchD=d;place();moved=true;return;}if(drag){var dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;if(Math.abs(dx)+Math.abs(dy)>2)moved=true;th-=dx*0.006;ph-=dy*0.006;ph=Math.max(0.14,Math.min(1.46,ph));place();return;}var r=dom.getBoundingClientRect();m2.x=((e.clientX-r.left)/r.width)*2-1;m2.y=-((e.clientY-r.top)/r.height)*2+1;rc.setFromCamera(m2,cam);var vis=units.filter(function(u){return u.visible;});dom.style.cursor=rc.intersectObjects(vis).length?'pointer':'grab';});

function tick(){requestAnimationFrame(tick);if(anim){live.lerp(goalT,0.16);rad+=(goalR-rad)*0.16;if(live.distanceTo(goalT)<0.015&&Math.abs(rad-goalR)<0.02)anim=false;}place();for(var i=0;i<units.length;i++){var u=units[i];if(u.userData.door){var d=u.userData.door;var tg=u.userData.openst?1:0;d.userData.t+=(tg-d.userData.t)*0.16;d.position.lerpVectors(d.userData.base,d.userData.open,d.userData.t);}}if(!iso){var _pl=[];var _ar=units.slice().sort(function(a,b){return a.position.distanceTo(cam.position)-b.position.distanceTo(cam.position);});for(var _q=0;_q<_ar.length;_q++){var _lb=_ar[_q].userData.label;if(!_lb)continue;var _pp=_lb.position.clone().project(cam);if(_pp.z>1){_lb.visible=false;continue;}var _sx=(_pp.x*0.5+0.5)*W,_sy=(-_pp.y*0.5+0.5)*H;var _hd=false;for(var _w=0;_w<_pl.length;_w++){if(Math.abs(_sx-_pl[_w][0])<92&&Math.abs(_sy-_pl[_w][1])<24){_hd=true;break;}}if(_hd){_lb.visible=false;}else{_lb.visible=true;_pl.push([_sx,_sy]);}}}rnd.render(scene,cam);}
