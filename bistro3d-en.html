(async function selfUpdate(){try{if(sessionStorage.getItem('upd_b3d'))return;var r=await fetch(location.pathname+'?chk='+Date.now(),{cache:'no-store'});if(!r.ok)return;var t=await r.text();var m=t.match(/>v (\d\d\/\d\d \d\d:\d\d)</);var latest=m&&m[1];if(latest&&latest!==APP_VER){sessionStorage.setItem('upd_b3d','1');location.replace(location.pathname+'?v='+Date.now());}}catch(e){}})();

var MENU=[{"cat": "STARTERS", "dishes": [{"name": "Beef tartare with balsamic-marinated watermelon and goat's cheese gelato", "comp": [{"n": "Beef tartare (Duchessa The Wolf)", "r": "Recipe to be defined"}, {"n": "Tartare marinade", "r": "240 ml EVO oil + 90 g soy sauce + 60 g shallot + 45 g Dijon mustard + 30 g capers + 30 g lemon juice + 15 g honey + 12 g salt + 6 g black pepper + 6 g Tabasco. Blend everything, pass through a chinois and put in a squeeze bottle. Keeps max 5 days at +4°C."}, {"n": "Granny Smith apple cubes", "r": "Granny Smith apple peeled and cubed à la minute, for dressing the tartare. Prepared to order, check day by day."}, {"n": "Balsamic-marinated watermelon", "r": "500 g Perla Nera watermelon trimmed into rectangles + 50 g balsamic vinegar + 20 g EVO oil + 10 g sugar + 2 g salt. Emulsify the liquids and vacuum-seal running two gassing-out cycles; let rest 2 to 12 hours (optimal). Open the bag, drain, dry and serve. This keeps max 3 days (after that the watermelon starts losing liquid)."}, {"n": "Goat's cheese gelato", "r": "250 g goat's cheese + 200 ml milk + 150 ml cream + 30 g sugar + 10 g honey + salt + 1 grated lemon. In the pacojet."}, {"n": "Almond brioche bread", "r": "500 g manitoba flour + 100 g almond flour + 60 g sugar + 12 g salt + 15 g fresh yeast + 250 g eggs (5) + 100 ml milk + 200 g soft butter + 50 g almond paste. Knead flour, almond flour, sugar, yeast, eggs and milk; add the salt, then the soft butter in pieces and the almond paste; knead until the dough comes together. Let rise until doubled, place in a loaf tin, brush with egg and sprinkle with chopped almonds. Bake 170°C for 25-30 min. To serve: cut into cubes and toast, placing them straight on the plate. Enzyme at 1% of the total flour weight: ENZIMATICO or VIVO PLUS (use one or the other); tell the chef which gives the better result."}]}, {"name": "Sous-vide calamari glazed with tomato umami, Mediterranean stuffing", "comp": [{"n": "Sous-vide calamari (cleaned and cooked)", "r": "Sous-vide cooking of the stuffed calamari: 64°C for 1 hour."}, {"n": "Tomato umami glaze", "r": "Take the lightly seared calamari and put it in a pan with tomato umami, cold butter, basil and a grating of lemon; nappe. It cannot be quantified in a recipe: you have to get the feel for it."}, {"n": "Mediterranean stuffing", "r": "900 g stale bread (Apulian bread, to be ordered) + 180 g pecorino + 180 g parmesan + 240 g chopped calamari tentacles + 180 ml EVO oil + 90 g chopped parsley + 50 g finely chopped garlic + 30 g lemon zest + 60 ml lemon juice + 150 ml milk + 12 g salt + 6 g ground black pepper. Sweat the garlic in the EVO oil, add the calamari tentacles and sauté 2 minutes, let cool. Add everything to the other ingredients and form the stuffing that will be used to fill the calamari, which is then cooked sous-vide."}, {"n": "Lemon burrata sauce", "r": "400 g burrata + 100 ml cream + 20 g lemon juice + lemon zest + 5 g salt. Blend to a smooth sauce; put in a squeeze bottle and keep in the fridge. Dress under the calamari."}, {"n": "Black olive powder", "r": "Dry the black olives in the oven at 100°C overnight; once cold, blend in short pulses (otherwise they release their oil and turn to paste)."}, {"n": "Green basil oil", "r": "200 g blanched and cooled basil + 300 ml seed oil. Blend well, strain through a chinois and put in a squeeze bottle."}]}, {"name": "Aquaponic salad with mango, cherry tomatoes, carrots, corn and fennel, mustard dressing (3 variations)", "comp": [{"n": "Aquaponic salad (mango, cherry tomatoes, carrots, corn, fennel)", "r": "To be ordered weekly. Line: cubed mango, grated carrots, corn, cherry tomatoes quartered, fennel sliced thin on the slicer in iced water. Check the line every day and refill it."}, {"n": "Mustard dressing", "r": "100 g Dijon mustard + 50 g honey (or agave syrup) + 60 g apple cider vinegar (or lemon juice) + 30 ml water + 5 g salt + 1 g xanthan + 250 ml seed oil. Blend mustard, honey, vinegar, water, salt and xanthan with the stick blender; add the oil in a thin stream while blending until a smooth, thick emulsion. The xanthan stabilises the emulsion (it does not split). Keep in a squeeze bottle in the fridge, ready for service (keeps several days)."}, {"n": "Variation: grilled chicken breast", "r": "Marinate with 70/30 balanced salt: 3% of this salt per kg of meat (e.g. 30 g balanced salt per 1 kg). Spices: garlic, thyme, smoked paprika in addition to the balanced salt. Sous-vide the chicken 60°C for 90 minutes, then grill at service."}, {"n": "Variation: grilled prawns with parsley and lemon", "r": "Frozen prawns: marinate with salt, sugar, garlic, pepper and EVO oil, then sous-vide (52°C for 8 min). At service, sear in a pan 6 pcs per portion; once nicely seared put them in a small bowl with chopped parsley and a grating of lemon and serve in a row next to the salad."}, {"n": "Variation: chickpea falafel", "r": "VEGAN FALAFEL (quantities for 2 kg chickpeas): 2 kg dried chickpeas soaked 24 hours (NOT cooked: raw soaked chickpeas hold the fry and don't fall apart, cooked ones go soft) + 400 g onion + 50 g garlic + 120 g fresh parsley and coriander + 16 g cumin + 16 g ground coriander + 36 g salt + 6 g pepper + 20 g bicarbonate + 160 g flour (chickpea, or 00 flour, re-milled semolina or breadcrumbs — only to bind). Pass everything through the mincer with a fine plate (grainy mix, no eggs, they are vegan); rest the mix in the fridge and shape the patties. They can be frozen raw on a tray and fried straight from frozen at 170°C until golden."}]}, {"name": "Kefir- and yuzu-marinated salmon with avocado guacamole, caramelised red onion bread crouton and mango-mint soup", "comp": [{"n": "Kefir- and yuzu-marinated salmon", "r": "600 g skinless salmon + 250 g kefir + 30 g yuzu juice + 8 g lime zest + 12 g salt + 8 g sugar + 5 g grated ginger + 2 g white pepper. Arrange the salmon vacuum-sealed with the marinade and marinate in the fridge for 4 hours (max range 6 hours, after which the acidity starts to cook it). Once the time is up, rinse and dry well, re-seal under vacuum and slice sashimi-style to order."}, {"n": "Avocado guacamole", "r": "1 kg avocado + 30 g lime juice + 50 g EVO oil + 10 g basil + 15 g salt + 15 g agave syrup + 200 g sweet-and-sour onion + 200 g confit cherry tomatoes + 50 g confit cherry tomato liquid. Mash the ripe avocado and add all the finely chopped ingredients (both onion and tomatoes); mix everything well and put in small Bormioli jars, gas out twice on the vacuum sealer. Keeps max 7 days sealed."}, {"n": "Caramelised red onion bread crouton", "r": "LOAF BREAD: 1 kg 0 flour (do gusto bread) + 650 ml water + 20 g salt + 8 g fresh yeast + 20 g EVO oil. Knead and let rise until doubled; work in 300 g caramelised red onion, shape into a loaf, let rise and bake at 220°C with steam for 25-30 min. CARAMELISED RED ONION: slowly stew the red onion with EVO oil, a pinch of salt, 30 g sugar and 30 g balsamic vinegar until caramelised. At service: slice the bread and toast. Enzyme at 1% of the total flour weight: ENZIMATICO or VIVO PLUS (use one or the other); tell the chef which gives the better result."}, {"n": "Mango-mint soup", "r": "SAUCE: 500 g mango purée + 50 g sugar + 30 g apple cider vinegar + 20 g lime juice + chilli to taste (or sriracha) + 1 g grated ginger + 1 pinch of salt + 0.5 g xanthan. Blend and strain through a chinois: sweet-and-sour profile, slightly spicy. At service add mango cubes and a julienne of mint."}, {"n": "Yuzu tapioca caviar (yellow)", "r": "YUZU TAPIOCA CAVIAR (yellow). Pearls: 100 g small tapioca pearls boiled in plenty of water 12-15 min until they turn transparent, drain and cool in cold water. YUZU REDUCTION: 200 g yuzu juice + 100 ml water + 80 g sugar, reduce to a light syrup; add water-soluble yellow food colouring to taste (or a pinch of turmeric for natural yellow). Marinate the pearls in the reduction: they absorb colour and flavour and become a yellow yuzu caviar. Store in a container/squeeze bottle and dress at service."}]}]}, {"cat": "FIRST COURSES", "dishes": [{"name": "Parsley risotto with grilled octopus, confit tomatoes, escabeche courgettes and cashew ricotta gelato", "comp": [{"n": "Parsley risotto", "r": "Pre-cook: toast the Carnaroli rice dry with a pinch of coarse salt, deglaze with white wine, moisten with hot vegetable stock and cook only 8 minutes. Spread on a tray, loosen the grains and cool immediately (stops the cooking). At service finish cooking with the stock and cream OFF the heat with parsley butter + parmesan and lemon zest; adjust the acidity with lemon juice (it must stay green and creamy).\nParsley butter (green): 250 g soft butter + 60 g blanched and squeezed parsley + 20 g EVO oil + zest of 1 lemon + 3 g salt -> blend to a smooth cream."}, {"n": "Grilled octopus", "r": "Cleaned octopus, sous-vide 72 °C x 7 h; blast-chill and hold on the line. At service: portion the tentacles, dress with oil and salt and mark them well on very hot embers/grill until a crisp crust forms. Finish with EVO oil and a few drops of lemon."}, {"n": "Confit tomatoes", "r": "Bought. Halved and used to garnish the plate."}, {"n": "Escabeche courgettes", "r": "Fried rounds + parsley/garlic/lemon oil. DECORATIVE: part as a finish in the final plating, part in creaming the risotto."}, {"n": "Courgette purée", "r": "1 kg courgettes sliced thin + 1 garlic clove + a tip of bicarbonate + salt + pepper + a little cooking water + EVO oil. Stew/blanch the courgettes keeping the green, blend in the Bimby with a little water and emulsify with EVO oil; pass through a chinois. Base of colour at the bottom of the plate."}, {"n": "Cashew ricotta gelato", "r": "800 g cashews (soaked for 2 hours then drained) + 25 g apple cider vinegar + 25 g lime juice + 570 ml water (270 + 300) + 20 g salt + 20 ml olive oil. After draining the cashews, first blend everything in the Bimby until smooth; then pour into the two pacojet beakers, freeze and blend twice in the pacojet."}, {"n": "Caramelised cashews", "r": "Toasted cashews then caramelised in a pan with icing sugar and a pinch of salt. To garnish the plate."}]}, {"name": "Capricciosa raviolo: farmhouse cooked ham filling, fried artichokes, cold datterino sauce, mozzarella foam and pizza broth", "comp": [{"n": "Raviolo (pasta + farmhouse cooked ham filling)", "r": "Egg-yolk pasta: 1.4 kg 00 flour + 400 g semolina + 1500 g yolk + salt. Filling: 500 g ricotta + 300 g farmhouse ham + 150 g parmesan + nutmeg.\nPIZZA CRUST EFFECT: two-tone pasta -> over it a thin veil of grey pasta (same dough + a pinch of vegetable charcoal) to mimic the charred edge of the pizza.\nSHAPE: ravioli closed dome-shaped and served UPRIGHT (vertical) to give volume."}, {"n": "Fried artichokes", "r": "Wedges from the pizzeria, fried to order."}, {"n": "Cold datterino sauce", "r": "500 g ripe red datterino tomatoes (+100 g yellow, opt.) + 60 ml EVO oil + 1 garlic clove in its skin + 6-8 basil leaves + 4 g salt + 2 g sugar + a few drops of vinegar. Blend the datterino tomatoes raw, pass through a fine chinois, adjust the acidity. Squeeze bottle at +4, used cold."}, {"n": "Mozzarella foam", "r": "Buffalo mozzarella foam (hot, creamy). For a 0.5 l siphon: 250 g buffalo mozzarella + 250 ml milk + 150 ml cream + 2.5 g xanthan + salt. Heat milk and cream, blend with the mozzarella in pieces and the xanthan until smooth; adjust for salt and pass through a fine chinois. Siphon with 2 charges, hold at 54 °C (holding cabinet/bain-marie). Serve hot."}, {"n": "Pizza broth", "r": "It must taste of margherita PIZZA, not vegetable stock (no carrots/celery/onion). Base: 1.5 l water (better if tomato/mozzarella water) + 500 g San Marzano or datterino tomato. Toast WELL in the oven ~150 g pizza/bread bases (well-browned crust = 'oven' flavour). Heat water and tomato with: the toasted bases, 1 parmesan rind (~30 g), 2-3 garlic cloves, 3 g dried oregano, a sprig of basil, a drizzle of EVO oil, salt (opt. 1 anchovy for umami). Simmer ~25-30 min, then strain fine. Adjust oregano/salt until it tastes of pizza. Served hot around the raviolo."}, {"n": "Roasted bread crisp", "r": "Thin slices of bread (or pizza base) dressed with EVO oil and salt, toasted in the oven until crisp and well browned: recalls oven-baked pizza. To garnish."}, {"n": "Watercress", "r": "Fresh watercress to garnish, final touch."}]}, {"name": "Spaghettone in parmesan water and green pepper (summer cacio e pepe)", "comp": [{"n": "Spaghettone", "r": "Water-and-flour pasta with GREEN PEPPER: 2 kg semolina + ~820 ml water at 50 °C (reduced, the pepper adds moisture) + 160 ml egg white + 40 g salt + 60 ml EVO oil + 50 g brined green pepper drained and blended (gives the flavour straight into the pasta). Colour: for a stronger green add chlorophyll (spinach/parsley extract) or a pinch of green colouring. Knead, rest, roll out and form the spaghettone. Nest/portion: 200 g per plate."}, {"n": "Parmesan water", "r": "1 l water + 300 g parmigiano reggiano 24 months + 0.5 g xanthan. Bring to 80°C at speed 3 in the Bimby and hold for 30 minutes without exceeding 85°C. Transfer to a container and rest 2 hours in the fridge: the fat rises and the protein part settles on the bottom. Recover the liquid part by passing through a chinois and discard the fat on the surface. Blend 500 g of parmesan water with the xanthan."}, {"n": "Green pepper", "r": "Brined green pepper: goes straight INTO the pasta DOUGH (~50 g drained and blended per 2 kg semolina). No longer chopped in during creaming."}, {"n": "Finishing and plating", "r": "Cook the spaghettone in water, then transfer it to a pan with the parmesan water and risotto it. Off the heat, cream with cold butter. Plate with lemon zest and a drizzle of EVO oil (the green pepper is already in the pasta)."}, {"n": "Pecorino Romano DOP (microplane)", "r": "Pecorino Romano DOP grated to order with the microplane, over the dish as a finish."}, {"n": "Green pepper powder", "r": "Maltodextrin method: 100 g brined green pepper drained -> blend to a paste (with 10-15 g EVO oil if needed). Work in 100 g maltodextrin a little at a time, mixing, until a dry 'sand' (if it stays moist add maltodextrin up to ~150 g, i.e. 1:1 -> 1:1.5). Spread and dry at ~60 °C until completely dry. Blend fine and sift. Salt to taste (opt). As a finish to the plate."}]}, {"name": "Spoon mezze maniche with cannellini beans, mussels, prawns, clams, chilli and lemon", "comp": [{"n": "Mezze maniche", "r": "Mezze maniche (egg pasta extruded): 2 kg Manitoba flour + 1 kg semolina + 1 kg Rieper yellow flour + 800 ml water + 880 g yolk. Knead, rest, extrude through the die in the mezze maniche shape."}, {"n": "Cannellini bean purée", "r": "Cannellini bean purée: sweat in EVO oil a mirepoix (100 g carrot + 100 g celery + 100 g onion) with 1-2 garlic cloves; deglaze with 100 ml white wine. Add 800 g pre-cooked drained cannellini beans + 1 sprig of rosemary, cover with ~500 ml vegetable stock, salt and pepper; cook 15-20 min. Remove the rosemary, blend most of it to a smooth cream emulsifying with EVO oil and pass through a chinois; keep aside a portion of whole beans. Pairs well with fish."}, {"n": "Mussels and clams", "r": "Mussels and clams: open them in a pan with garlic, EVO oil and a splash of white wine; shell them (keep some in the shell for garnish). Strain and keep the opening liquid to flavour the creaming."}, {"n": "Finishing: chilli and lemon", "r": "Cook the mezze maniche and cream them in a pan with the cannellini purée, a little bisque and the mussel/clam liquid; off the heat add the C1 prawns, the mussels and the clams. Finish with fresh chilli, lemon zest and juice and a drizzle of EVO oil."}, {"n": "C1 prawns (sous-vide)", "r": "Cleaned C1 prawns (keep heads and shells for the bisque). Marinate lightly with EVO oil, salt and lemon zest; sous-vide at 50-52 °C for ~12-15 min, then blast-chill. At service add them while creaming the pasta, OFF the heat, so they don't overcook (they stay tender)."}, {"n": "Spicy lemon bisque", "r": "Lightly spicy, lemon-scented bisque (from the prawn shells): toast the heads and shells well in EVO oil; add a light soffritto (1 shallot or onion + a little carrot and celery) + 1 garlic clove + 1 chilli; deglaze with white wine (or a splash of brandy), add 1 tablespoon tomato paste, cover with water/fish stock and simmer 30-40 min. Strain fine pressing the shells well, then reduce to consistency. At the end of cooking scent with lemon zest and juice; adjust spiciness and salt. Use to cream the pasta or as a pool."}]}]}, {"cat": "MAIN COURSES", "dishes": [{"name": "Half poussin with grilled wild broccoli, fries and black garlic-miso mayonnaise", "comp": [{"n": "Half poussin", "r": "Sous-vide 64 °C for ~2 h (poultry, for safety). Blast-chill. REGENERATE: bring back to temperature (sous-vide bath 60-62 °C or oven) and finish on the embers/grill for crispy skin."}, {"n": "Grilled wild broccoli", "r": "Wild broccoli: simply blanched in salted water, then passed over the embers."}, {"n": "Fries", "r": "Fries: bought, fried to order."}, {"n": "Black garlic-miso mayonnaise", "r": "Black garlic-miso mayonnaise: awaiting the recipe from the cook."}]}, {"name": "Beef sirloin with grilled wild broccoli, fries and black garlic-miso mayonnaise", "comp": [{"n": "Beef sirloin", "r": "Sous-vide 54 °C for ~1 h (medium-rare). Blast-chill. REGENERATE: bring back to ~50-52 °C, then sear well on the embers and let rest."}, {"n": "Grilled wild broccoli", "r": "Wild broccoli: simply blanched in salted water, then passed over the embers."}, {"n": "Fries", "r": "Fries: bought, fried to order."}, {"n": "Black garlic-miso mayonnaise", "r": "Black garlic-miso mayonnaise: awaiting the recipe from the cook."}]}, {"name": "Beef fillet with grilled wild broccoli, fries and black garlic-miso mayonnaise", "comp": [{"n": "Beef fillet", "r": "Sous-vide 54 °C for ~45-60 min. Blast-chill. REGENERATE: bring back to ~50-52 °C, then sear on the embers and let rest."}, {"n": "Grilled wild broccoli", "r": "Wild broccoli: simply blanched in salted water, then passed over the embers."}, {"n": "Fries", "r": "Fries: bought, fried to order."}, {"n": "Black garlic-miso mayonnaise", "r": "Black garlic-miso mayonnaise: awaiting the recipe from the cook."}]}, {"name": "BBQ pork ribs with spring onion and crispy onion, grilled wild broccoli, fries and black garlic-miso mayonnaise", "comp": [{"n": "BBQ pork ribs", "r": "Sous-vide 75 °C for 12-24 h (tender, falls off the bone). Blast-chill. REGENERATE: reheat, glaze with BBQ sauce and finish on the embers."}, {"n": "Spring onion", "r": "Recipe to be defined"}, {"n": "Crispy onion", "r": "Recipe to be defined"}, {"n": "Grilled wild broccoli", "r": "Wild broccoli: simply blanched in salted water, then passed over the embers."}, {"n": "Fries", "r": "Fries: bought, fried to order."}, {"n": "Black garlic-miso mayonnaise", "r": "Black garlic-miso mayonnaise: awaiting the recipe from the cook."}]}, {"name": "Grilled sweet potato with smoked pepper sauce and grilled portobello mushroom (vegetarian)", "comp": [{"n": "Grilled sweet potato", "r": "Recipe to be defined"}, {"n": "Smoked pepper sauce", "r": "Recipe to be defined"}, {"n": "Grilled portobello mushroom", "r": "Recipe to be defined"}]}]}, {"cat": "DESSERT", "dishes": [{"name": "Tiramisù 2.0", "comp": [{"n": "Tiramisù 2.0 (our recipe)", "r": "Recipe to be defined"}]}, {"name": "Tomato panna cotta with strawberry gazpacho and basil gelato", "comp": [{"n": "Tomato panna cotta", "r": "TOMATO WATER: 1500 g ripe ramato tomatoes + 8 g salt. Blend with the salt, pour into a muslin cloth and let it filter in the fridge for 12 h without pressing (yield ~500 g). PANNA COTTA: 250 g tomato water + 250 g fresh cream + 8 g leaf gelatine + 4 g salt + 6 g sugar. Soak the gelatine in cold water. Heat the cream with salt and sugar to 60°C, dissolve the squeezed gelatine; off the heat add the tomato water at room temperature, stir and pour into moulds. Rest in the fridge at least 4 h."}, {"n": "Strawberry gazpacho", "r": "Recipe to be defined"}, {"n": "Basil gelato", "r": "Recipe to be defined"}]}, {"name": "Cold vanilla cheesecake, apricots, melon and mint", "comp": [{"n": "Cold vanilla cheesecake", "r": "BASE: 240 g digestive biscuits + 110 g butter + a pinch of cinnamon (crush the biscuits, mix in the melted butter and press into the mould). COLD CREAM: 1000 g Philadelphia + 200 g fresh cream + 200 g icing sugar + 10 g leaf gelatine + vanilla. Soak the gelatine in cold water, squeeze it and dissolve it in a little warmed cream. WHIP the whole mixture well (Philadelphia, cream, icing sugar, vanilla + dissolved gelatine) to a smooth, airy foam: the mixture must be whipped BEFORE freezing. Pour over the base and freeze."}, {"n": "Apricots", "r": "GLAZE (freeze-thaw stable, glucose-free): 350 g apricot purée + 150 g melon juice (from the trimmings, blended and strained) + 110 g sugar + 40 g dextrose + 10 g NH pectin + 20 g lemon juice + 1 g salt. Heat the apricot purée and melon juice to 40°C. Mix the pectin + sugar + dextrose dry and sprinkle in while whisking; bring to the boil for 1 min. Off the heat add lemon and salt, blend with a hand blender without incorporating air. Use at 35–40°C on cold cheesecake portions, let it set and freeze. Thaw in the fridge for 3–4 h."}, {"n": "Melon", "r": "MARINADE: 200 g water + 100 g sugar + 80 g lime juice + 40 g apple cider vinegar + 3 g salt + zest of 1 lime + 10 g fresh ginger, sliced + 6 mint leaves. Bring water and sugar to the boil, turn off, add ginger and zest, infuse 15 min, cool completely. Add lime juice, vinegar, salt and mint. Cut the melon into portions, cover with the cold marinade in a bag and vacuum-seal at 100%. Rest at least 12 h; store at 0–2°C for up to 7 days, open the bag only at service."}, {"n": "Mint", "r": "Recipe to be defined"}]}]}];

box({n:'Scaffale chiuso (2 scomparti)',x:-0.6,z:-0.95,sx:0.55,sz:0.26,h:0.8,by:0,c:STEELL,rep:R.stoc,wall:'N',op:true});
box({n:'Scaffale a L',x:0.2,z:1.60,sx:3.3,sz:0.28,h:0.42,by:1.5,c:STEELL,rep:R.stoc,wall:'S',op:true});
box({n:'Scaffale sotto lavandino',x:1.62,z:1.2,sx:0.28,sz:1.0,h:0.42,by:1.5,c:STEELL,rep:R.stoc,wall:'E'});
var extras=[];
var uf=new T.Mesh(new T.PlaneGeometry(0.66,1.05),new T.MeshBasicMaterial({color:0x86cc9c,transparent:true,opacity:0.6}));uf.rotation.x=-Math.PI/2;uf.position.set(1.74,0.014,-1.18);scene.add(uf);extras.push(uf);
var postM=new T.MeshLambertMaterial({color:0x2f7a48});
function frame(x,y,z,sx,sy,sz){var g=new T.BoxGeometry(sx,sy,sz);var mm=new T.Mesh(g,postM);mm.position.set(x,y,z);mm.add(new T.LineSegments(new T.EdgesGeometry(g),new T.LineBasicMaterial({color:0x0d0d0d})));scene.add(mm);extras.push(mm);}
frame(2.08,1.05,-0.66,0.07,2.1,0.07);frame(2.08,1.05,-1.70,0.07,2.1,0.07);frame(2.08,2.07,-1.18,0.07,0.09,1.11);
var uscSp=newSprite('Uscita → cucina principale','#dff3e6F5','#135c32',1.34);uscSp.position.set(1.5,1.25,-1.18);scene.add(uscSp);extras.push(uscSp);
var rc=new T.Raycaster(),m2=new T.Vector2(),sel=null,iso=false,saveT=null;
var panel=el('panel'),pname=el('pname'),pnote=el('pnote');
function refreshContent(u){if(u.userData.content){var t=contents[u.userData.n];setSprite(u.userData.content,(t&&t.trim())?t:'(vuoto — scrivi cosa metterci)',(t&&t.trim())?'#e7f6e2F2':'#fff3cdF2',(t&&t.trim())?'#1e6b46':'#5a4600');}}
function setIsolate(u){iso=true;sel=u;units.forEach(function(m){var on=(m===u);m.visible=on;m.userData.label.visible=on;if(m.userData.door)m.userData.door.visible=on;if(m.userData.content)m.userData.content.visible=on&&m.userData.openst;if(m.userData.extra)m.userData.extra.visible=on;});lamps.forEach(function(l){l.visible=(u===isolaMesh);});extras.forEach(function(e){e.visible=false;});goalT.copy(u.position);goalR=u.userData.dim*2.0+0.7;anim=true;}
function unIsolate(){iso=false;sel=null;units.forEach(function(m){m.visible=true;m.userData.label.visible=true;if(m.userData.door)m.userData.door.visible=true;if(m.userData.content)m.userData.content.visible=m.userData.openst;if(m.userData.extra)m.userData.extra.visible=true;});lamps.forEach(function(l){l.visible=true;});extras.forEach(function(e){e.visible=true;});goalT.set(0,0.4,0);goalR=DEF.rad;th=DEF.th;ph=DEF.ph;anim=true;panel.style.display='none';el('savest').textContent='';}
function selectMesh(u){setIsolate(u);pname.textContent=u.userData.n;pnote.value=contents[u.userData.n]||'';el('savest').textContent='';panel.style.display='block';if(u.userData.door){u.userData.openst=true;refreshContent(u);u.userData.content.visible=true;}}
pnote.addEventListener('input',function(){if(sel){contents[sel.userData.n]=pnote.value;if(sel.userData.openst)refreshContent(sel);clearTimeout(saveT);var nm=sel.userData.n,val=pnote.value;saveT=setTimeout(function(){saveContent(nm,val);},700);}});
el('pclose').onclick=function(){unIsolate();};
el('popen').onclick=function(){if(sel&&sel.userData.door){sel.userData.openst=!sel.userData.openst;sel.userData.content.visible=sel.userData.openst;if(sel.userData.openst)refreshContent(sel);}};
el('reset').onclick=function(){unIsolate();th=DEF.th;ph=DEF.ph;goalR=DEF.rad;goalT.set(0,0.4,0);anim=true;};el('topview').onclick=function(){unIsolate();ph=0.16;goalR=6.4;goalT.set(0,0.4,0);anim=true;place();};
var dom=rnd.domElement,drag=false,moved=false,lx=0,ly=0,ptrs={},pinchD=0;dom.style.touchAction='none';
dom.addEventListener('pointerdown',function(e){ptrs[e.pointerId]=[e.clientX,e.clientY];drag=true;moved=false;lx=e.clientX;ly=e.clientY;anim=false;dom.setPointerCapture(e.pointerId);});
dom.addEventListener('pointermove',function(e){if(ptrs[e.pointerId])ptrs[e.pointerId]=[e.clientX,e.clientY];var k=Object.keys(ptrs);if(k.length>=2){var a=ptrs[k[0]],b=ptrs[k[1]];var d=Math.hypot(a[0]-b[0],a[1]-b[1]);if(pinchD)rad*=pinchD/d;rad=Math.max(2,Math.min(14,rad));goalR=rad;pinchD=d;place();moved=true;return;}if(drag){var dx=e.clientX-lx,dy=e.clientY-ly;lx=e.clientX;ly=e.clientY;if(Math.abs(dx)+Math.abs(dy)>2)moved=true;th-=dx*0.006;ph-=dy*0.006;ph=Math.max(0.14,Math.min(1.46,ph));place();return;}var r=dom.getBoundingClientRect();m2.x=((e.clientX-r.left)/r.width)*2-1;m2.y=-((e.clientY-r.top)/r.height)*2+1;rc.setFromCamera(m2,cam);var vis=units.filter(function(u){return u.visible;});dom.style.cursor=rc.intersectObjects(vis).length?'pointer':'grab';});
function up(e){delete ptrs[e.pointerId];if(Object.keys(ptrs).length<2)pinchD=0;drag=false;if(moved)return;var r=dom.getBoundingClientRect();m2.x=((e.clientX-r.left)/r.width)*2-1;m2.y=-((e.clientY-r.top)/r.height)*2+1;rc.setFromCamera(m2,cam);var vis=units.filter(function(u){return u.visible;});var hit=rc.intersectObjects(vis);if(hit.length){var o=hit[0].object;if(iso&&o===sel){o.userData.openst=!o.userData.openst;if(o.userData.content){o.userData.content.visible=o.userData.openst;if(o.userData.openst)refreshContent(o);}}else selectMesh(o);}else if(iso)unIsolate();}
dom.addEventListener('pointerup',up);
dom.addEventListener('wheel',function(e){e.preventDefault();rad*=1+(e.deltaY*0.0012);rad=Math.max(2,Math.min(14,rad));goalR=rad;anim=false;place();},{passive:false});
function tick(){requestAnimationFrame(tick);if(anim){live.lerp(goalT,0.16);rad+=(goalR-rad)*0.16;if(live.distanceTo(goalT)<0.015&&Math.abs(rad-goalR)<0.02)anim=false;}place();for(var i=0;i<units.length;i++){var u=units[i];if(u.userData.door){var d=u.userData.door;var tg=u.userData.openst?1:0;d.userData.t+=(tg-d.userData.t)*0.16;d.position.lerpVectors(d.userData.base,d.userData.open,d.userData.t);}}if(!iso){var _pl=[];var _ar=units.slice().sort(function(a,b){return a.position.distanceTo(cam.position)-b.position.distanceTo(cam.position);});for(var _q=0;_q<_ar.length;_q++){var _lb=_ar[_q].userData.label;if(!_lb)continue;var _pp=_lb.position.clone().project(cam);if(_pp.z>1){_lb.visible=false;continue;}var _sx=(_pp.x*0.5+0.5)*W,_sy=(-_pp.y*0.5+0.5)*H;var _hd=false;for(var _w=0;_w<_pl.length;_w++){if(Math.abs(_sx-_pl[_w][0])<92&&Math.abs(_sy-_pl[_w][1])<24){_hd=true;break;}}if(_hd){_lb.visible=false;}else{_lb.visible=true;_pl.push([_sx,_sy]);}}}rnd.render(scene,cam);}
tick();
window.addEventListener('resize',function(){var nw=wrap.clientWidth,nh=wrap.clientHeight;if(nw){W=nw;H=nh;cam.aspect=W/H;cam.updateProjectionMatrix();rnd.setSize(W,H);}});
}
