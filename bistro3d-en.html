 + 180 g parmesan + 240 g chopped calamari tentacles + 180 ml EVO oil + 90 g chopped parsley + 50 g finely chopped garlic + 30 g lemon zest + 60 ml lemon juice + 150 ml milk + 12 g salt + 6 g ground black pepper. Sweat the garlic in the EVO oil, add the calamari tentacles and sauté 2 minutes, let cool. Add everything to the other ingredients and form the stuffing that will be used to fill the calamari, which is then cooked sous-vide."},{"n":"Lemon burrata sauce","r":"400 g burrata + 100 ml cream + 20 g lemon juice + lemon zest + 5 g salt. Blend to a smooth sauce; put in a squeeze bottle and keep in the fridge. Dress under the calamari."},{"n":"Black olive powder","r":"Dry the black olives in the oven at 100°C overnight; once cold, blend in short pulses (otherwise they release their oil and turn to paste)."},{"n":"Green basil oil","r":"200 g blanched and cooled basil + 300 ml seed oil. Blend well, strain through a chinois and put in a squeeze bottle."}],"img":"data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAgGBgcGBQgHBwcJCQgKDBUODAsLDBkSEw8VHhsgHx4bHR0hJTApISMtJB0dKjkqLTEzNjY2ICg7Pzo0PjA1NjP/2wBDAQkJCQwLDBgODhgzIh0iMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzMzP/wAARCAU1A+gDASIAAhEBAxEB/8QAHAAAAgMBAQEBAAAAAAAAAAAAAQIAAwQFBgcI/8QAQxAAAgIBAwIEAwYFAwMEAQIHAQIAAxEEEiExQQUTUWEicYEGFDJCkaEjUrHB0WJy4RUz8AdDgvEkkhZTorI0VNJj/8QAGgEBAQEBAQEBAAAAAAAAAAAAAAECAwQFBv/EACYRAQEAAgMBAAIDAQEBAQEBAAABAhEDEiExBEETIlEyYRRxI0L/2gAMAwEAAhEDEQA/APCSQSZhDQGSSBU8x3CbXEy2rA5d4nOtE616zm3LAwOJWZfYJSRCgI4iRhKLVlqylTLVMqLBGiCMIBkkklQRGESMIFymXKZQplqwLRDiRRLAsBMRgI4WMFhCAQ4lgWHbArxJiW7YNsqK8SYlm2DEBMQ4jYhxATEBlmIhECl5ktE2OOJmsHEVYwuJS00WCUMJitRXCJMSCFMIwiiMJUCCNJiAkkbEmIAhxDiHEKXEmI+2TbATEmI+2HbArxDiWbIdkIq2wgS0VxhXApCxwstFftHFcBa1m7Tj4hKa6/abKayCOJKrdpxgidfTHkTm01EkTq6asZGZmrA1C4aY3HM6t6KQMLMFizMWsLCCWuOZURNxmnWwhcQFyYkMrIEmIRLMQbZRViELLNpk2yKTEOI+2TbAQ8xcS3bJtgVYkxLNsm2QV4hxGxJiFCGTEYSCARgJBCBAgEMOJMSAQyQyASQyYgLiDEfEmICYgj4gxCkkjYgxASSNiDEKXEMOJMQBJGxBiAhEGJZtk2wK8Q4 ickpea falafel","r":"VEGAN FALAFEL (quantities for 2 kg chickpeas): 2 kg dried chickpeas soaked 24 hours (NOT cooked: raw soaked chickpeas hold the fry and don't fall apart, cooked ones go soft) + 400 g onion + 50 g garlic + 120 g fresh parsley and coriander + 16 g cumin + 16 g ground coriander + 36 g salt + 6 g pepper + 20 g bicarbonate + 160 g flour (chickpea, or 00 flour, re-milled semolina or breadcrumbs — only to bind). Pass everything through the mincer with a fine plate (grainy mix, no eggs, they are vegan); rest the mix in the fridge and shape the patties. They can be frozen raw on a tray and fried straight from frozen at 170°C until golden."}],"img":""},{"name":"Kefir- and yuzu-marinated salmon with avocado guacamole, caramelised red onion bread crouton and mango-mint soup","comp":[{"n":"Kefir- and yuzu-marinated salmon","r":"600 g skinless salmon + 250 g kefir + 30 g yuzu juice + 8 g lime zest + 12 g salt + 8 g sugar + 5 g grated ginger + 2 g white pepper. Arrange the salmon vacuum-sealed with the marinade and marinate in the fridge for 4 hours (max range 6 hours, after which the acidity starts to cook it). Once the time is up, rinse and dry well, re-seal under vacuum and slice sashimi-style to order."},{"n":"Avocado guacamole","r":"1 kg avocado + 30 g lime juice + 50 g EVO oil + 10 g basil + 15 g salt + 15 g agave syrup + 200 g sweet-and-sour onion + 200 g confit cherry tomatoes + 50 g confit cherry tomato liquid. Mash the ripe avocado and add all the finely chopped ingredients (both onion and tomatoes); mix everything well and put in small Bormioli jars, gas out twice on the vacuum sealer. Keeps max 7 days sealed."},{"n":"Caramelised red onion bread crouton","r":"LOAF BREAD: 1 kg 0 flour (do gusto bread) + 650 ml water + 20 g salt + 8 g fresh yeast + 20 g EVO oil. Knead and let rise until doubled; work in 300 g caramelised red onion, shape into a loaf, let rise and bake at 220°C with steam for 25-30 min. CARAMELISED RED ONION: slowly stew the red onion with EVO oil, a pinch of salt, 30 g sugar and 30 g balsamic vinegar until caramelised. At service: slice the bread and toast. Enzyme at 1% of the total flour weight: ENZIMATICO or VIVO PLUS (use one or the other); tell the chef which gives the better result."},{"n":"Mango-mint soup","r":"SAUCE: 500 g mango purée + 50 g sugar + 30 g apple cider vinegar + 20 g lime juice + chilli to taste (or sriracha) + 1 g grated ginger + 1 pinch of salt + 0.5 g xanthan. Blend and strain through a chinois: sweet-and-sour profile, slightly spicy. At service add mango cubes and a julienne of mint."},{"n":"Yuzu tapioca caviar (yellow)","r":"YUZU TAPIOCA CAVIAR (yellow). Pearls: 100 g small tapioca pearls boiled in plenty of water 12-15 min until they turn transparent, drain and cool in cold water. YUZU REDUCTION: 200 g yuzu juice + 100 ml water + 80 g sugar, reduce to a light syrup; add water-soluble yellow food colouring to taste (or a pinch of turmeric for natural yellow). Marinate the pearls in the reduction: they absorb colour and flavour and become a yellow yuzu caviar. Store in a container/squeeze bottle and dress at service."}],"img":""},{"name":"Battered cauliflower with lemon hummus, grilled peach and dukkah (veg)","comp":[{"n":"Battered cauliflower (tempura)","r":"Break the cauliflower into medium florets, blanch 2 minutes in salted water, drain and dry well. Batter: 200 g 00 flour + 100 g rice starch + 4 g salt + 4 g turmeric + about 350 ml very cold sparkling water (add to a light coating consistency). Coat the florets and fry at 175°C until golden; drain on paper and salt."},{"n":"Light lemon hummus","r":"250 g cooked chickpeas + 40 g tahini + 40 g lemon juice + 1 garlic clove + 4 g salt + 3 g cumin + 40 g EVO oil + water (or chickpea liquid) to taste. Blend to a smooth, airy cream, adjusting with water; adjust salt and lemon. Keep in a squeeze bottle."},{"n":"Grilled peach","r":"Firm yellow peaches in wedges, brushed with a little oil and grilled on the cut side until well marked and lightly caramelised. A dash of lemon juice at service."},{"n":"Dukkah (spiced hazelnut and sesame crumble)","r":"80 g toasted hazelnuts + 40 g toasted sesame seeds + 10 g coriander seeds + 10 g cumin seeds + salt to taste. Toast the seeds and nuts separately, then chop coarsely by knife or in pulses: it must stay sandy and crunchy, not a paste."},{"n":"Finishing and plating","r":"A swirl of hummus at the base; on top the hot battered cauliflower florets and the grilled peach. Sprinkle with dukkah, finish with EVO oil, lemon zest and juice and fresh leaves (mint or basil)."}],"img":""}]},{"cat":"FIRST COURSES","dishes":[{"name":"Parsley risotto with grilled octopus, confit tomatoes, escabeche courgettes and cashew ricotta gelato","comp":[{"n":"Parsley risotto","r":"Pre-cook: toast the Carnaroli rice dry with a pinch of coarse salt, deglaze with white wine, moisten with hot vegetable stock and cook only 8 minutes. Spread on a tray, loosen the grains and cool immediately (stops the cooking). At service finish cooking with the stock and cream OFF the heat with parsley butter + parmesan and lemon zest; adjust the acidity with lemon juice (it must stay green and creamy).\nParsley butter (green): 250 g soft butter + 60 g blanched and squeezed parsley + 20 g EVO oil + zest of 1 lemon + 3 g salt -> blend to a smooth cream."},{"n":"Grilled octopus","r":"Cleaned octopus, sous-vide 72 °C x 7 h; blast-chill and hold on the line. At service: portion the tentacles, dress with oil and salt and mark them well on very hot embers/grill until a crisp crust forms. Finish with EVO oil and a few drops of lemon."},{"n":"Confit tomatoes","r":"Bought. Halved and used to garnish the plate."},{"n":"Escabeche courgettes","r":"Fried rounds + parsley/garlic/lemon oil. DECORATIVE: part as a finish in the final plating, part in creaming the risotto."},{"n":"Courgette purée","r":"1 kg courgettes sliced thin + 1 garlic clove + a tip of bicarbonate + salt + pepper + a little cooking water + EVO oil. Stew/blanch the courgettes keeping the green, blend in the Bimby with a little water and emulsify with EVO oil; pass through a chinois. Base of colour at the bottom of the plate."},{"n":"Cashew ricotta gelato","r":"800 g cashews (soaked for 2 hours then drained) + 25 g apple cider vinegar + 25 g lime juice + 570 ml water (270 + 300) + 20 g salt + 20 ml olive oil. After draining the cashews, first blend everything in the Bimby until smooth; then pour into the two pacojet beakers, freeze and blend twice in the pacojet."},{"n":"Caramelised cashews","r":"Toasted cashews then caramelised in a pan with icing sugar and a pinch of salt. To garnish the plate."}],"img":""},{"name":"Capricciosa raviolo: farmhouse cooked ham filling, fried artichokes, cold datterino sauce, mozzarella foam and pizza broth","comp":[{"n":"Raviolo (pasta + farmhouse cooked ham filling)","r":"Egg-yolk pasta: 1.4 kg 00 flour + 400 g semolina + 1500 g yolk + salt. Filling: 500 g ricotta + 300 g farmhouse ham + 150 g parmesan + nutmeg.\nPIZZA CRUST EFFECT: two-tone pasta -> over it a thin veil of grey pasta (same dough + a pinch of vegetable charcoal) to mimic the charred edge of the pizza.\nSHAPE: ravioli closed dome-shaped and served UPRIGHT (vertical) to give volume."},{"n":"Fried artichokes","r":"Wedges from the pizzeria, fried to order."},{"n":"Cold datterino sauce","r":"500 g ripe red datterino tomatoes (+100 g yellow, opt.) + 60 ml EVO oil + 1 garlic clove in its skin + 6-8 basil leaves + 4 g salt + 2 g sugar + a few drops of vinegar. Blend the datterino tomatoes raw, pass through a fine chinois, adjust the acidity. Squeeze bottle at +4, used cold."},{"n":"Mozzarella foam","r":"Buffalo mozzarella foam (hot, creamy). For a 0.5 l siphon: 250 g buffalo mozzarella + 250 ml milk + 150 ml cream + 2.5 g xanthan + salt. Heat milk and cream, blend with the mozzarella in pieces and the xanthan until smooth; adjust for salt and pass through a fine chinois. Siphon with 2 charges, hold at 54 °C (holding cabinet/bain-marie). Serve hot."},{"n":"Pizza broth","r":"It must taste of margherita PIZZA, not vegetable stock (no carrots/celery/onion). Base: 1.5 l water (better if tomato/mozzarella water) + 500 g San Marzano or datterino tomato. Toast WELL in the oven ~150 g pizza/bread bases (well-browned crust = 'oven' flavour). Heat water and tomato with: the toasted bases, 1 parmesan rind (~30 g), 2-3 garlic cloves, 3 g dried oregano, a sprig of basil, a drizzle of EVO oil, salt (opt. 1 anchovy for umami). Simmer ~25-30 min, then strain fine. Adjust oregano/salt until it tastes of pizza. Served hot around the raviolo."},{"n":"Roasted bread crisp","r":"Thin slices of bread (or pizza base) dressed with EVO oil and salt, toasted in the oven until crisp and well browned: recalls oven-baked pizza. To garnish."},{"n":"Watercress","r":"Fresh watercress to garnish, final touch."}],"img":""},{"name":"Spaghettone in parmesan water and green pepper (summer cacio e pepe)","comp":[{"n":"Spaghettone","r":"Water-and-flour pasta with GREEN PEPPER: 2 kg semolina + ~820 ml water at 50 °C (reduced, the pepper adds moisture) + 160 ml egg white + 40 g salt + 60 ml EVO oil + 50 g brined green pepper drained and blended (gives the flavour straight into the pasta). Colour: for a stronger green add chlorophyll (spinach/parsley extract) or a pinch of green colouring. Knead, rest, roll out and form the spaghettone. Nest/portion: 200 g per plate."},{"n":"Parmesan water","r":"1 l water + 300 g parmigiano reggiano 24 months + 0.5 g xanthan. Bring to 80°C at speed 3 in the Bimby and hold for 30 minutes without exceeding 85°C. Transfer to a container and rest 2 hours in the fridge: the fat rises and the protein part settles on the bottom. Recover the liquid part by passing through a chinois and discard the fat on the surface. Blend 500 g of parmesan water with the xanthan."},{"n":"Green pepper","r":"Brined green pepper: goes straight INTO the pasta DOUGH (~50 g drained and blended per 2 kg semolina). No longer chopped in during creaming."},{"n":"Finishing and plating","r":"Cook the spaghettone in water, then transfer it to a pan with the parmesan water and risotto it. Off the heat, cream with cold butter. Plate with lemon zest and a drizzle of EVO oil (the green pepper is already in the pasta)."},{"n":"Pecorino Romano DOP (microplane)","r":"Pecorino Romano DOP grated to order with the microplane, over the dish as a finish."},{"n":"Green pepper powder","r":"Maltodextrin method: 100 g brined green pepper drained -> blend to a paste (with 10-15 g EVO oil if needed). Work in 100 g maltodextrin a little at a time, mixing, until a dry 'sand' (if it stays moist add maltodextrin up to ~150 g, i.e. 1:1 -> 1:1.5). Spread and dry at ~60 °C until completely dry. Blend fine and sift. Salt to taste (opt). As a finish to the plate."}],"img":""},{"name":"Spoon mezze maniche with cannellini beans, mussels, prawns, clams, chilli and lemon","comp":[{"n":"Mezze maniche","r":"Mezze maniche (egg pasta extruded): 2 kg Manitoba flour + 1 kg semolina + 1 kg Rieper yellow flour + 800 ml water + 880 g yolk. Knead, rest, extrude through the die in the mezze maniche shape."},{"n":"Cannellini bean purée","r":"Cannellini bean purée: sweat in EVO oil a mirepoix (100 g carrot + 100 g celery + 100 g onion) with 1-2 garlic cloves; deglaze with 100 ml white wine. Add 800 g pre-cooked drained cannellini beans + 1 sprig of rosemary, cover with ~500 ml vegetable stock, salt and pepper; cook 15-20 min. Remove the rosemary, blend most of it to a smooth cream emulsifying with EVO oil and pass through a chinois; keep aside a portion of whole beans. Pairs well with fish."},{"n":"Mussels and clams","r":"Mussels and clams: open them in a pan with garlic, EVO oil and a splash of white wine; shell them (keep some in the shell for garnish). Strain and keep the opening liquid to flavour the creaming."},{"n":"Finishing: chilli and lemon","r":"Cook the mezze maniche and cream them in a pan with the cannellini purée, a little bisque and the mussel/clam liquid; off the heat add the C1 prawns, the mussels and the clams. Finish with fresh chilli, lemon zest and juice and a drizzle of EVO oil."},{"n":"C1 prawns (sous-vide)","r":"Cleaned C1 prawns (keep heads and shells for the bisque). Marinate lightly with EVO oil, salt and lemon zest; sous-vide at 50-52 °C for ~12-15 min, then blast-chill. At service add them while creaming the pasta, OFF the heat, so they don't overcook (they stay tender)."},{"n":"Spicy lemon bisque","r":"Lightly spicy, lemon-scented bisque (from the prawn shells): toast the heads and shells well in EVO oil; add a light soffritto (1 shallot or onion + a little carrot and celery) + 1 garlic clove + 1 chilli; deglaze with white wine (or a splash of brandy), add 1 tablespoon tomato paste, cover with water/fish stock and simmer 30-40 min. Strain fine pressing the shells well, then reduce to consistency. At the end of cooking scent with lemon zest and juice; adjust spiciness and salt. Use to cream the pasta or as a pool."}],"img":""}]},{"cat":"MAIN COURSES","dishes":[{"name":"Half poussin with grilled wild broccoli, fries and black garlic-miso mayonnaise","comp":[{"n":"Half poussin","r":"Sous-vide 64 °C for ~2 h (poultry, for safety). Blast-chill. REGENERATE: bring back to temperature (sous-vide bath 60-62 °C or oven) and finish on the embers/grill for crispy skin."},{"n":"Grilled wild broccoli","r":"Wild broccoli: simply blanched in salted water, then passed over the embers."},{"n":"Fries","r":"Fries: bought, fried to order."},{"n":"Black garlic-miso mayonnaise","r":"Black garlic-miso mayonnaise: awaiting the recipe from the cook."}],"img":""},{"name":"Beef sirloin with grilled wild broccoli, fries and black garlic-miso mayonnaise","comp":[{"n":"Beef sirloin","r":"Sous-vide 54 °C for ~1 h (medium-rare). Blast-chill. REGENERATE: bring back to ~50-52 °C, then sear well on the embers and let rest."},{"n":"Grilled wild broccoli","r":"Wild broccoli: simply blanched in salted water, then passed over the embers."},{"n":"Fries","r":"Fries: bought, fried to order."},{"n":"Black garlic-miso mayonnaise","r":"Black garlic-miso mayonnaise: awaiting the recipe from the cook."}],"img":""},{"name":"Beef fillet with grilled wild broccoli, fries and black garlic-miso mayonnaise","comp":[{"n":"Beef fillet","r":"Sous-vide 54 °C for ~45-60 min. Blast-chill. REGENERATE: bring back to ~50-52 °C, then sear on the embers and let rest."},{"n":"Grilled wild broccoli","r":"Wild broccoli: simply blanched in salted water, then passed over the embers."},{"n":"Fries","r":"Fries: bought, fried to order."},{"n":"Black garlic-miso mayonnaise","r":"Black garlic-miso mayonnaise: awaiting the recipe from the cook."}],"img":""},{"name":"BBQ pork ribs with spring onion and crispy onion, grilled wild broccoli, fries and black garlic-miso mayonnaise","comp":[{"n":"BBQ pork ribs","r":"Sous-vide 75 °C for 12-24 h (tender, falls off the bone). Blast-chill. REGENERATE: reheat, glaze with BBQ sauce and finish on the embers."},{"n":"Spring onion","r":"Recipe to be defined"},{"n":"Crispy onion","r":"Recipe to be defined"},{"n":"Grilled wild broccoli","r":"Wild broccoli: simply blanched in salted water, then passed over the embers."},{"n":"Fries","r":"Fries: bought, fried to order."},{"n":"Black garlic-miso mayonnaise","r":"Black garlic-miso mayonnaise: awaiting the recipe from the cook."}],"img":""},{"name":"Grilled sweet potato with smoked pepper sauce and grilled portobello mushroom (vegetarian)","comp":[{"n":"Grilled sweet potato","r":"Recipe to be defined"},{"n":"Smoked pepper sauce","r":"Recipe to be defined"},{"n":"Grilled portobello mushroom","r":"Recipe to be defined"}],"img":""},{"name":"Prinz cheeseburger","comp":[{"n":"Brioche bun","r":"Brioche burger bun, lightly toasted."},{"n":"Beef patty (150 g)","r":"150 g beef patty, cooked on the plancha."},{"n":"Burger sauce","r":"House burger sauce."},{"n":"Caramelised onions","r":"Onions slowly stewed until caramelised."},{"n":"Cheddar and Tilsiter","r":"Slices of cheddar and Tilsiter melted over the patty."},{"n":"Iceberg","r":"Iceberg lettuce."},{"n":"Fries and black garlic-miso mayonnaise","r":"Served with fries and black garlic and miso mayonnaise."}],"img":""}]},{"cat":"DESSERT","dishes":[{"name":"Tiramisù 2.0","comp":[{"n":"Tiramisù 2.0 (our recipe)","r":"Recipe to be defined"}],"img":""},{"name":"Tomato panna cotta with strawberry gazpacho and basil gelato","comp":[{"n":"Tomato panna cotta","r":"TOMATO WATER: 1500 g ripe ramato tomatoes + 8 g salt. Blend with the salt, pour into a muslin cloth and let it filter in the fridge for 12 h without pressing (yield ~500 g). PANNA COTTA: 250 g tomato water + 250 g fresh cream + 12 g leaf gelatine + 4 g salt + 6 g sugar. Soak the gelatine in cold water. Heat the cream with salt and sugar to 60°C, dissolve the squeezed gelatine; off the heat add the tomato water at room temperature, stir and pour into moulds. Rest in the fridge at least 4 h. Slightly more gelatine (12 g) so it holds up to thawing without releasing water."},{"n":"Strawberry gazpacho","r":"500 g strawberries + 400 g oxheart tomato + 100 g red pepper + 80 g peeled cucumber + 90 g sugar + 25 g lime juice + 1 sachet of vanilla baking powder (lievito vanigliato). Blend everything until smooth, pass through a fine chinois and chill well in the fridge. Serve cold."},{"n":"Basil gelato","r":"500 ml milk + 150 ml 35% cream + 60 g blanched basil + 110 g sugar + 55 g dextrose + 35 g milk powder + 3 g stabiliser (neutro) + 1 g salt + 20 g spinach (for colour). Mix the sugar, dextrose, milk powder and stabiliser dry; heat the milk and cream, add the powders and bring to ~85°C, then cool. Blend with the blanched basil and spinach until a smooth green; age and churn."}],"img":""},{"name":"Cold vanilla cheesecake, apricots, melon and mint","comp":[{"n":"Cold vanilla cheesecake","r":"COLD CREAM (no base, we don't use it): 1000 g Philadelphia + 200 g fresh cream + 200 g icing sugar + 10 g leaf gelatine + vanilla. Soak the gelatine in cold water, squeeze it and dissolve in a little warmed cream. WHIP the whole mixture well to a smooth, airy foam: it must be whipped BEFORE freezing. Pour into the moulds and freeze."},{"n":"Salted hazelnut crumble","r":"130 g butter + 130 g sugar + 100 g pastry flour + 100 g hazelnut flour. Make a classic crumble and bake it; add chopped natural hazelnuts, toasted hazelnuts and salted caramelised hazelnuts, then a little amaretto."},{"n":"Apricots","r":"GLAZE (freeze-thaw stable, glucose-free): 350 g apricot purée + 150 g melon juice (from the trimmings, blended and strained) + 110 g sugar + 40 g dextrose + 10 g NH pectin + 20 g lemon juice + 1 g salt. Heat the apricot purée and melon juice to 40°C. Mix the pectin + sugar + dextrose dry and sprinkle in while whisking; bring to the boil for 1 min. Off the heat add lemon and salt, blend with a hand blender without incorporating air. Use at 35–40°C on cold cheesecake portions, let it set and freeze. Thaw in the fridge for 3–4 h."},{"n":"Melon","r":"MARINADE: 200 g water + 100 g sugar + 80 g lime juice + 40 g apple cider vinegar + 3 g salt + zest of 1 lime + 10 g fresh ginger, sliced + 6 mint leaves. Bring water and sugar to the boil, turn off, add ginger and zest, infuse 15 min, cool completely. Add lime juice, vinegar, salt and mint. Cut the melon into portions, cover with the cold marinade in a bag and vacuum-seal at 100%. Rest at least 12 h; store at 0–2°C for up to 7 days, open the bag only at service."},{"n":"Mint","r":"Recipe to be defined"},{"n":"Vanilla gelato (pacojet)","r":"270 g cream + 990 g milk + 360 g sugar + 300 g yolks + vanilla. Bring everything to 85°C, pour into the pacojet beakers and blast-chill. Pacotise at service."}],"img":""}]}];

function mkTex(txt,bg,fg){var s=2,wpx=320,hpx=92;var c=document.createElement('canvas');c.width=wpx*s;c.height=hpx*s;var x=c.getContext('2d');x.scale(s,s);x.clearRect(0,0,wpx,hpx);x.font='700 27px -apple-system,Arial';var words=txt.split(' '),line='',lines=[];for(var i=0;i<words.length;i++){var t=line+words[i]+' ';if(x.measureText(t).width>wpx-30){lines.push(line);line=words[i]+' ';}else line=t;}lines.push(line);var lh=31,bh=lines.length*lh+16,bw=0;for(var j=0;j<lines.length;j++){bw=Math.max(bw,x.measureText(lines[j].trim()).width);}bw+=28;var bx=(wpx-bw)/2,by=(hpx-bh)/2,r=13;x.fillStyle=bg;x.beginPath();x.moveTo(bx+r,by);x.arcTo(bx+bw,by,bx+bw,by+bh,r);x.arcTo(bx+bw,by+bh,bx,by+bh,r);x.arcTo(bx,by+bh,bx,by,r);x.arcTo(bx,by,bx+bw,by,r);x.closePath();x.fill();x.lineWidth=1.5;x.strokeStyle='#00000033';x.stroke();x.fillStyle=fg;x.textAlign='center';x.textBaseline='middle';for(var k=0;k<lines.length;k++){x.fillText(lines[k].trim(),wpx/2,by+12+lh/2+k*lh);}var tex=new T.CanvasTexture(c);tex.anisotropy=4;return tex;}
