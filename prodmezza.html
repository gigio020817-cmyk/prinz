function isDone(id){return !!DONE[id];}
function normName(s){return (s||'').replace(/\s+/g,' ').trim().toLowerCase();}
function isoWeek(d){d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var dow=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-dow);var ys=new Date(Date.UTC(d.getUTCFullYear(),0,1));var wk=Math.ceil((((d-ys)/86400000)+1)/7);return d.getUTCFullYear()+'-W'+('0'+wk).slice(-2);}
function apKey(day,name){return (day||'').slice(0,3).toUpperCase()+'|'+normName(name);}
function fromAntiprod(id,name){if((''+id).slice(0,3)!=='an|')return false;var day=(''+id).split('|')[1];return !!PRODA[apKey(day,name)];}
function getQ(id){return SCORTA[id]||0;}
function daysBar(){el('days').innerHTML=DAYS.map(function(d){return '<button class="day'+(DAY===d?' on':'')+'" onclick="setDay(\''+d+'\')">'+d+'</button>';}).join('');}
function wkBar(){el('wk').innerHTML=[['1','Sett. 1'],['2','Sett. 2']].map(function(w){return '<button class="wkb'+(WK===w[0]?' on':'')+'" onclick="setWk(\''+w[0]+'\')">'+w[1]+'</button>';}).join('');}
function setDay(d){DAY=d;render();window.scrollTo(0,0);}
function setWk(w){WK=w;render();}
function toggleMode(){MODE=(MODE==='oggi')?'libero':'oggi';el('modeb').classList.toggle('on',MODE==='libero');render();window.scrollTo(0,0);}
async function toggleDone(id){var on=!isDone(id);if(on)DONE[id]=true;else delete DONE[id];render();
  try{var k='pmzchk|'+today+'|'+id;if(on)await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:k,v:{done:true,at:ciso()}})});else await sb('kitchen_meta?k=eq.'+encodeURIComponent(k),{method:'DELETE',headers:{Prefer:'return=minimal'}});}catch(e){toast('⚠️ Non salvato');}}
async function saveQ(id){try{await sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'pmz|'+id,v:{q:getQ(id),prod:PRODAT[id]||null}})});}catch(e){toast('⚠️ Non salvato');}}
function chg(id,d){var q=getQ(id)+d;SCORTA[id]=q<0?0:q;saveQ(id);render();}
function hoprod(id){var nm=NAMES[id]||'';var n=prompt('Quanto hai prodotto di "'+nm+'"? (lo aggiungo alla scorta)','');if(n===null)return;n=parseFloat((''+n).replace(',','.'));if(isNaN(n)||n<=0)return;SCORTA[id]=getQ(id)+n;PRODAT[id]=ciso();saveQ(id);render();toast('Aggiunto');}
function itemRow(id,name){NAMES[id]=name;var ap=fromAntiprod(id,name);var done=isDone(id)||ap;
  var btn='<button class="fbtn'+(done?' on':'')+'" onclick="toggleDone(\''+id+'\')">'+(done?'✓ Fatto':'Segna fatto')+'</button>';
  var note=ap?'<div class="apnote">✓ già prodotto in Produzioni Antipasti</div>':'';
  return '<div class="pcard'+(done?' done':'')+'"><div class="phead"><div class="pnm">'+esc(name)+'</div>'+btn+'</div>'+note+'</div>';
}
function fullT(t){return (t||'').replace(/^\s*\[VEG\]\s*/i,'\ud83c\udf31 ');}
function shortT(t){t=(t||'').replace(/^\s*\[VEG\]\s*/i,'');var seps=[',',' con ',' su '];var idx=t.length;for(var i=0;i<seps.length;i++){var k=t.indexOf(seps[i]);if(k>0&&k<idx)idx=k;}return t.slice(0,idx).trim();}
var LIB={Mattia:'Ven',Badr:'Sab'};var LIB_COOK='Mattia';
function nextDay(d){var i=DAYS.indexOf(d);return DAYS[(i+1)%7];}
function setLibCook(c){LIB_COOK=c;render();window.scrollTo(0,0);}
function sect(emoji,label,ids,names,note){var d=0;ids.forEach(function(id,i){if(isDone(id)||fromAntiprod(id,names[i]))d++;});
  var s='<div class="sec">'+emoji+' '+label+' <span class="cnt">'+d+'/'+ids.length+'</span></div>';
  if(note)s+='<div class="secnote">'+note+'</div>';
  s+=ids.length?ids.map(function(id,i){return itemRow(id,names[i]);}).join(''):'<div class="secnote">Niente.</div>';
  return s;}
function dayBlocks(day,wk,simple){
  var lp=simple?'Primi':'Primi — '+DAYFULL[day]+' · Sett. '+wk;
  var ls=simple?'Secondi':'Secondi — '+DAYFULL[day]+' · Sett. '+wk;
  var la=simple?'Antipasti':'Antipasti — '+DAYFULL[day];
  var primi=(PRIMI[wk]&&PRIMI[wk][day])||[];
  var sec=(SECONDI[wk]&&SECONDI[wk][day])||[];
  var a=ANTIP[day];
  var h=sect('🍝',lp,primi.map(function(_,i){return 'pr|'+wk+'|'+day+'|'+i;}),primi.map(fullT));
  h+=sect('🥩',ls,sec.map(function(_,i){return 'se|'+wk+'|'+day+'|'+i;}),sec.map(fullT));
  if(a){var ai=a.items.map(function(n,i){return {n:n,i:i};}).filter(function(x){return !/assembl|impiatt/i.test(x.n);});
    h+=sect('🥗',la,ai.map(function(x){return 'an|'+day+'|'+x.i;}),ai.map(function(x){return x.n;}),'mise en place del giorno — la sera la eroga Banu');}
  return h;}
function render(){daysBar();wkBar();var h='';
  if(MODE==='libero'){
    h+='<div class="ckrow">'+['Mattia','Badr'].map(function(c){return '<button class="ckbtn'+(LIB_COOK===c?' on':'')+'" onclick="setLibCook(\''+c+'\')">'+c+'</button>';}).join('')+'</div>';
    var off=LIB[LIB_COOK],nx=nextDay(off);
    h+='<div class="liberobox">⚠️ '+LIB_COOK+' va in libero <b>'+DAYFULL[off]+'</b> (+ mezzo '+DAYFULL[nx]+'). Da preparare prima (es. il giorno prima): tutta la linea di <b>'+DAYFULL[off]+'</b> e <b>'+DAYFULL[nx]+'</b>.</div>';
    [off,nx].forEach(function(dd){h+='<div class="sec2">📅 '+DAYFULL[dd]+' · Sett. '+WK+'</div>'+dayBlocks(dd,WK,true);});
    el('view').innerHTML=h;return;
  }
  h+=dayBlocks(DAY,WK,false);
  ['Mattia','Badr'].forEach(function(c){if(LIB[c]===nextDay(DAY)){var off=LIB[c],nx=nextDay(off);
    h+='<div class="liberobox">🔓 Domani <b>'+c+'</b> va in libero ('+DAYFULL[off]+' + mezzo '+DAYFULL[nx]+'): oggi prepara IN ANTICIPO anche la sua linea di '+DAYFULL[off]+' e '+DAYFULL[nx]+'.</div>';
    [off,nx].forEach(function(dd){h+='<div class="sec2">📅 '+DAYFULL[dd]+' · Sett. '+WK+' (anticipo per '+c+')</div>'+dayBlocks(dd,WK,true);});}});
  el('view').innerHTML=h;
}
</script>
</body></html>
