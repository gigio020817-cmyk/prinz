  :root{--red:#1c1c1c;--red-d:#000;--yellow:#c9a227;--yellow-d:#a8841f;--dark:#1c1c1c;--bg:#faf8f2;--paper:#fff;--ink:#1a1a1a;--muted:#8a8378;--line:#ececec;--ok:#2e9c5f;--ok-d:#1e7a47;--warn:#c0392b}

  html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.4;padding-bottom:env(safe-area-inset-bottom)}
  #lock{position:fixed;inset:0;z-index:50;background:linear-gradient(160deg,var(--red),var(--red-d));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff;text-align:center}
  #lock .mark{width:84px;height:84px;border-radius:24px;background:var(--yellow);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:46px;margin-bottom:18px;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  #lock h1{font-size:26px;margin:0 0 4px;font-weight:800}
  #lock p{opacity:.92;font-size:13px;margin:0 0 24px;letter-spacing:1px;font-weight:600}
  #lock .box{width:100%;max-width:320px}
  #lock input{width:100%;border:none;border-radius:14px;padding:16px;font-size:18px;text-align:center;color:var(--ink);margin-bottom:12px}
  #lock button{width:100%;border:none;border-radius:14px;padding:16px;font-size:18px;font-weight:800;background:var(--yellow);color:var(--red-d);cursor:pointer}
  #lock .err{color:#ffe1de;font-size:13px;height:18px;margin-top:10px;font-weight:600}
  #lock label{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;opacity:.95;margin-top:14px;cursor:pointer}

  header{position:sticky;top:0;z-index:20;background:var(--red);color:#fff;padding:calc(env(safe-area-inset-top) + 14px) 16px 0;box-shadow:0 3px 16px rgba(0,0,0,.2)}
  .brand{display:flex;align-items:center;gap:12px;padding-bottom:12px}
  .brand .mark{width:46px;height:46px;border-radius:14px;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--red);font-size:26px;flex:none}
  .brand h1{font-size:20px;margin:0;font-weight:800}
  .brand small{display:block;font-size:10px;opacity:.9;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
  .tabs{display:flex;gap:8px;overflow-x:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch}

  .tab{flex:none;border:none;background:rgba(255,255,255,.18);color:#fff;border-radius:30px;padding:9px 16px;font-size:14px;font-weight:800;cursor:pointer;white-space:nowrap}

  main{max-width:820px;margin:0 auto;padding:16px}
  #status{font-size:12px;color:var(--muted);margin-bottom:12px;text-align:center;font-weight:600}

  .alert.due{background:linear-gradient(135deg,var(--red),var(--red-d))}
  .alert.none{background:linear-gradient(135deg,var(--ok),var(--ok-d))}
  .alert .t{font-weight:900;font-size:18px;margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .alert .l{font-size:15px;font-weight:600;opacity:.97}
  .sec{font-size:13px;font-weight:900;letter-spacing:.5px;text-transform:uppercase;color:var(--red);margin:20px 4px 10px;display:flex;align-items:center;gap:8px}

  .card{background:var(--paper);border-radius:20px;margin-bottom:14px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.07);border:3px solid transparent}

  .card-h{padding:15px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;background:var(--dark)}

  .stepper .val{min-width:62px;text-align:center}

  .stepper .val small{font-size:11px;color:var(--muted);font-weight:700;display:block}

  .ing:last-child{border-bottom:none}
  .ing:first-letter{text-transform:uppercase}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--dark);color:#fff;padding:12px 18px;border-radius:14px;font-size:14px;font-weight:700;opacity:0;transition:opacity .2s;z-index:80;pointer-events:none;max-width:90%}
  #toast.show{opacity:.97}
  footer{text-align:center;font-size:11px;color:var(--muted);padding:18px;font-weight:600}
  .corrbox{margin-top:14px;background:#faf7f0;border:1px dashed var(--red);border-radius:12px;padding:10px;text-transform:none}
  .corrlbl{font-size:12px;font-weight:800;color:var(--red);margin-bottom:6px;text-transform:none}
  .corrta{width:100%;border:1px solid #f0d9b0;border-radius:8px;padding:9px;font-size:14px;font-family:inherit;min-height:54px;box-sizing:border-box;text-transform:none}
  .corrrow{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .corrbtn{border:none;border-radius:8px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;background:#eee;color:#333;text-transform:none}
  .corrbtn.save{background:var(--red);color:#fff}.corrbtn.exp{background:var(--dark);color:#fff}
  .corrmodal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center;padding:16px;text-transform:none}

  .corrmbox textarea{width:100%;height:280px;border:1px solid #ddd;border-radius:10px;padding:10px;font-size:12.5px;font-family:ui-monospace,Menlo,monospace;box-sizing:border-box}

.stockbar .lab{font-size:12px;font-weight:800;color:#7a3b00;margin-right:auto}
.prodbtn{border:none;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:900;background:#1f8a3b;color:#fff;cursor:pointer;white-space:nowrap}
.prodbtn:active{transform:scale(.97)}
.lastprod{font-size:11px;color:#7a6a3a;font-weight:700;width:100%}
</style>

const CATS=["COLAZIONI — buffet","PANE SERALE — bistro / ristorante","RICETTE UTILI — quando serve"];
const CATSHORT={"COLAZIONI — buffet":"Colazioni","PANE SERALE — bistro / ristorante":"Pane serale","RICETTE UTILI — quando serve":"Ricette utili"};
const CATNOTE={"RICETTE UTILI — quando serve":"Ricette di pane non in produzione fissa: si fanno quando c'è tempo o all'occorrenza."};

let CORR={},CTILE=null;const OPEN=new Set();
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),1800);}
function sb(path,opt){opt=opt||{};const h=Object.assign({apikey:SB_KEY,'Content-Type':'application/json'},opt.headers||{});return fetch(SB_URL+'/rest/v1/'+path,Object.assign({},opt,{headers:h})).then(async r=>{if(!r.ok){const t=await r.text();throw new Error('HTTP '+r.status+' '+t);}const t=await r.text();return t?JSON.parse(t):[];});}

function unlock(p,fromStore){
  const err=document.getElementById('err');
  if(p!==APP_PW){err.textContent='Password errata';document.getElementById('pw').value='';return;}
  if(document.getElementById('remember').checked||fromStore){try{localStorage.setItem('pr_panepw','1')}catch(e){}}
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='block';
  loadAll();
  if(!window._iv){window._iv=setInterval(function(){var ae=document.activeElement;if(!(ae&&(ae.tagName==='TEXTAREA'||ae.tagName==='INPUT')))loadAll();},180000);}
}
document.getElementById('enter').onclick=()=>unlock(document.getElementById('pw').value,false);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock(e.target.value,false)});
const APP_VER='16/07 23:35';
(async function selfUpdate(){try{if(sessionStorage.getItem('upd_pane'))return;var r=await fetch(location.pathname+'?chk='+Date.now(),{cache:'no-store'});if(!r.ok)return;var t=await r.text();var m=t.match(/>v (\d\d\/\d\d \d\d:\d\d)</);var latest=m&&m[1];if(latest&&latest!==APP_VER){sessionStorage.setItem('upd_pane','1');location.replace(location.pathname+'?v='+Date.now());}}catch(e){}})();
(function(){try{if(localStorage.getItem('pr_av_pane')!=='28/06 12:00'){localStorage.removeItem('pr_panepw');localStorage.setItem('pr_av_pane','28/06 12:00');}}catch(_e){}let s=null;try{s=localStorage.getItem('pr_panepw')}catch(e){}if(s)unlock(APP_PW,true);else setTimeout(()=>document.getElementById('pw').focus(),300);})();

async function loadAll(){
  document.getElementById('status').textContent='Caricamento dal cloud…';
  try{
    try{const crows=await sb('kitchen_meta?k=like.panecorr|*&select=*');CORR={};(crows||[]).forEach(r=>{CORR[r.k]=(r.v&&r.v.text)||'';});}catch(_){}
    document.getElementById('status').textContent='✓ Collegato · aggiornato '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    render();
  }catch(e){document.getElementById('status').textContent='⚠️ Problema di collegamento. Controlla internet e riapri.';console.error(e);}
}
function toggleRec(id){const c=document.getElementById('c_'+id);if(!c)return;c.classList.toggle('open');if(c.classList.contains('open'))OPEN.add(id);else OPEN.delete(id);}
function splitRic(ric){
  var parts=ric.split(/\s\+\s/);
  var last=parts[parts.length-1],proc='';
  var m=last.search(/\.\s+[A-ZÀ]/);
  if(m>-1){proc=last.slice(m+1).trim();parts[parts.length-1]=last.slice(0,m+1).trim();}
  return {ingr:parts,proc:proc};
}
const TILES=[
 {id:'colazioni',l:'Pane colazioni',e:'🥐',b:'#FAC775',fg:'#412402',a:'#633806'},
 {id:'serale',l:'Pane serale',e:'🍞',b:'#C0DD97',fg:'#173404',a:'#27500A'},
 {id:'pizze',l:'Pizze',e:'🍕',b:'#F4C0D1',fg:'#4B1528',a:'#72243E'},
 {id:'utili',l:'Ricette utili',e:'🧰',b:'#B5D4F4',fg:'#042C53',a:'#0C447C'}
];
function tileOf(p){if(/^pizza_/.test(p.id))return 'pizze';if(p.cat.indexOf('COLAZIONI')===0)return 'colazioni';if(p.cat.indexOf('PANE SERALE')===0)return 'serale';return 'utili';}
function recipeCard(p){
  const R=splitRic(p.ric);
  const ingr=R.ingr.map(x=>'<div class="ing">'+esc(x)+'</div>').join('');
  const procH=R.proc?'<div class="k">Procedimento</div><div class="v">'+esc(R.proc)+'</div>':'';
  return '<div class="card'+(OPEN.has(p.id)?' open':'')+'" id="c_'+p.id+'">'
   +'<div class="card-h" onclick="toggleRec(\''+p.id+'\')"><div class="info"><div class="nm">'+esc(p.nm)+'</div><div class="pz">'+esc(p.pz)+'</div></div><span class="chev">▸</span></div>'
   +'<div class="rec"><div class="k">📖 Ingredienti</div><div class="ingbox">'+ingr+'</div>'+procH+'<div class="k">Anticipo / cottura</div><div class="v">'+esc(p.cott)+'</div>'+corrBox(p.id)+'</div>'
   +'</div>';
}
function setPTile(id){CTILE=id;OPEN.clear();try{window.scrollTo(0,0);}catch(e){}render();}
function render(){
  if(!CTILE){
    var grid=TILES.map(function(t){var n=PROD.filter(function(p){return tileOf(p)===t.id;}).length;return '<div onclick="setPTile(\''+t.id+'\')" style="cursor:pointer;background:'+t.b+';border-radius:16px;padding:16px 12px;min-height:118px;display:flex;flex-direction:column;justify-content:space-between"><div style="font-size:34px;line-height:1">'+t.e+'</div><div><div style="font-size:17px;font-weight:800;color:'+t.fg+'">'+t.l+'</div><div style="font-size:12px;font-weight:700;color:'+t.a+'">'+n+' ricette</div></div></div>';}).join('');
    document.getElementById('view').innerHTML='<div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px">'+grid+'</div><button class="corrbtn exp" style="width:100%;margin-top:16px;padding:12px;border-radius:12px" onclick="exportCorr()">📤 Invia modifiche allo chef</button>';
    return;
  }
  var t=TILES.find(function(x){return x.id===CTILE;});
  var items=PROD.filter(function(p){return tileOf(p)===CTILE;});
  var note=(CTILE==='utili')?'<div style="margin:-2px 4px 10px;font-size:13px;color:var(--muted)">Ricette non in produzione fissa: si fanno quando c\'è tempo o all\'occorrenza.</div>':'';
  document.getElementById('view').innerHTML='<button class="tab on" style="background:var(--yellow);color:var(--red-d);margin-bottom:12px" onclick="setPTile(null)">‹ Indietro ai quadrati</button><div class="sec">'+esc(t.l)+'</div>'+note+items.map(recipeCard).join('');
}
function getCorr(id){return CORR['panecorr|'+id]||'';}
function corrBox(id){return '<div class="corrbox"><div class="corrlbl">✏️ Modifiche / ricetta da fare</div><textarea class="corrta" placeholder="Scrivi qui la ricetta o cosa cambiare…">'+esc(getCorr(id))+'</textarea><div class="corrrow"><button class="corrbtn save" onclick="saveCorr(\''+id+'\',this)">Salva</button></div></div>';}
function saveCorr(id,btn){var ta=btn.closest('.corrbox').querySelector('textarea');var v=ta.value;CORR['panecorr|'+id]=v;var _lab='';try{var _p=PROD.find(function(x){return x.id===id;});_lab=_p?_p.nm:'';}catch(e){}sb('kitchen_meta?on_conflict=k',{method:'POST',headers:{Prefer:'resolution=merge-duplicates,return=minimal'},body:JSON.stringify({k:'panecorr|'+id,v:{text:v,label:_lab,at:new Date().toISOString()}})}).catch(function(e){console.error(e);});var t=btn.textContent;btn.textContent='✓ Salvato';setTimeout(function(){btn.textContent=t;},1500);}
function exportCorr(){var out='MODIFICHE PANE — Prinz Rudolf\n\n';var any=false;PROD.forEach(function(p){var c=getCorr(p.id);if(c&&c.trim()){any=true;out+='• ['+(CATSHORT[p.cat]||p.cat)+'] '+p.nm+'\n  → '+c.trim()+'\n\n';}});if(!any)out+='(nessuna modifica scritta)';var m=document.getElementById('corrModal');m.querySelector('textarea').value=out;m.style.display='flex';}
function copyCorr(){var t=document.getElementById('corrModal').querySelector('textarea');t.select();t.setSelectionRange(0,99999);try{navigator.clipboard.writeText(t.value);}catch(e){try{document.execCommand('copy')}catch(_){}}var b=event&&event.target;if(b){var x=b.textContent;b.textContent='✓ Copiato';setTimeout(function(){b.textContent=x;},1500);}}
</script>
<div id="corrModal" class="corrmodal"><div class="corrmbox"><h3>📤 Modifiche da inviare</h3><p>Copia questo testo e mandalo a Gigio (o incollalo a Claude in chat).</p><textarea readonly></textarea><div class="corrmrow"><button class="corrbtn exp" onclick="copyCorr()">Copia</button><button class="corrbtn" onclick="document.getElementById('corrModal').style.display='none'">Chiudi</button></div></div></div>
<div id="verbadge" style="position:fixed;left:6px;bottom:6px;z-index:9999;background:rgba(0,0,0,.55);color:#fff;font-size:10px;padding:2px 7px;border-radius:10px;font-family:-apple-system,sans-serif;pointer-events:none">v 16/07 23:35</div>
